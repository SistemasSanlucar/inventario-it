        // ---- App ----
        function App() {
            const [state, setState] = useState({ user: null, isAdmin: false, accessDenied: false, inventory: [], technicians: [], history: [], assignments: [], catalogo: {}, catalogoTipos: {}, catalogoAccesorios: {}, activos: [], ubicaciones: [], ubicacionesAll: [], adminsAll: [], sociedades: [], proveedores: [], activeTab: 'dashboard', loading: true, syncing: false, lastSync: null, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null, stockMinimoDefault: parseInt(localStorage.getItem('stockMinimoDefault') || '2'), tabFilter: null, lang: currentLang, globalSearch: '', showGlobalResults: false, deepLinkEquipo: null });

            useEffect(() => { initializeApp(); }, []);

            // ── setDataState: única función que actualiza datos del estado ─────────
            // Evita duplicar el objeto en initializeApp, refreshData, syncData y handleConfirmAction
            const setDataState = (data, extra) => {
                setState(s => Object.assign({}, s, {
                    inventory:        data.inventory        || [],
                    technicians:      data.technicians      || [],
                    history:          data.history          || [],
                    assignments:      data.assignments      || [],
                    catalogo:         data.catalogo         || {},
                    catalogoTipos:    data.catalogoTipos    || {},
                    catalogoAccesorios: data.catalogoAccesorios || {},
                    activos:          data.activos          || [],
                    ubicaciones:      data.ubicaciones      || [],
                    ubicacionesAll:   data.ubicacionesAll   || [],
                    adminsAll:        data.adminsAll        || [],
                    sociedades:       data.sociedades       || [],
                    proveedores:      data.proveedores      || [],
                    lastSync:         new Date(),
                }, extra || {}));
            };

            const initializeApp = async () => {
                try {
                    const msalReady = await initializeMSAL();
                    if (!msalReady) throw new Error('MSAL init failed');
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length === 0) { setState(s => ({ ...s, loading: false })); return; }
                    const token = await getAccessToken();
                    if (!token) { setState(s => ({ ...s, loading: false })); return; }
                    graphClient = new GraphAPIClient(token);
                    dataManager = new DataManager(graphClient);
                    const currentUser = await graphClient.getCurrentUser();
                    const data = await dataManager.loadAllData();
                    const isAdmin = data.admins.some(a => a.Email && a.Email.toLowerCase() === currentUser.mail.toLowerCase() && (a.Activo === true || a.Activo === 'Yes'));
                    const isTechnician = data.technicians.some(t => t.email && t.email.toLowerCase() === currentUser.mail.toLowerCase() && t.activo);
                    if (!isAdmin && !isTechnician) {
                        setState(s => ({ ...s, loading: false, accessDenied: true, user: { name: currentUser.displayName, email: currentUser.mail } }));
                        return;
                    }
                    setDataState(data, { user: { name: currentUser.displayName, email: currentUser.mail }, isAdmin, loading: false, syncing: false });
                    showToast(T().welcome + ', ' + currentUser.displayName, 'success');
                    // Deep link: ?equipo=ID abre la ficha directamente
                    const urlParams = new URLSearchParams(window.location.search);
                    const equipoId = urlParams.get('equipo');
                    if (equipoId) {
                        const activo = (data.activos || []).find(function(a) { return a.idEtiqueta === equipoId.toUpperCase(); });
                        if (activo) setState(s => ({ ...s, activeTab: 'equipos', deepLinkEquipo: activo }));
                        else showToast('Equipo no encontrado: ' + equipoId, 'warning');
                        window.history.replaceState({}, '', window.location.pathname);
                    }
                } catch(error) { console.error('Error inicializando app:', error); showToast('Error cargando la aplicacion', 'error'); setState(s => ({ ...s, loading: false })); }
            };

            const handleLogin = async () => { try { await login(); await initializeApp(); } catch(e) { showToast('Error al iniciar sesion', 'error'); } };

            // refreshData: recarga datos sin toast. Usado en onRefresh de modales y AdminPanel.
            const refreshData = async () => {
                if (!dataManager) return;
                try { const data = await dataManager.loadAllData(); setDataState(data); }
                catch(e) { console.error('Error refreshing:', e); }
            };

            // handleLogout: reset COMPLETO del estado — sin residuos entre cuentas
            const handleLogout = async () => {
                await logout();
                setState({
                    user: null, isAdmin: false, accessDenied: false,
                    inventory: [], technicians: [], history: [], assignments: [],
                    catalogo: {}, catalogoTipos: {}, catalogoAccesorios: {},
                    activos: [], ubicaciones: [], ubicacionesAll: [], adminsAll: [],
                    sociedades: [], proveedores: [],
                    activeTab: 'dashboard', loading: false, syncing: false, lastSync: null,
                    modalType: null, selectedItem: null, showConfirm: false, confirmAction: null,
                    stockMinimoDefault: parseInt(localStorage.getItem('stockMinimoDefault') || '2'),
                    tabFilter: null, lang: currentLang, globalSearch: '', showGlobalResults: false, deepLinkEquipo: null
                });
                showToast('Sesion cerrada correctamente', 'success');
            };

            const syncData = async (showMsg) => {
                if (!dataManager || state.syncing) return;
                setState(s => ({ ...s, syncing: true }));
                try {
                    cache.clear(); // Forzar recarga fresca desde SharePoint
                    const data = await dataManager.loadAllData();
                    setDataState(data, { syncing: false });
                    if (showMsg) showToast('Sincronizado correctamente', 'success');
                } catch(e) { setState(s => ({ ...s, syncing: false })); }
            };

            // handleTabChange: solo cambia pestaña — NO hace sync (innecesario y lento)
            const handleTabChange = tab => setState(s => ({ ...s, activeTab: tab, tabFilter: null }));
            const handleNavigate = (tab, filter) => setState(s => ({ ...s, activeTab: tab, tabFilter: filter }));

            // handleOpenModal: solo abre el modal — NO hace sync (innecesario)
            const handleOpenModal = (type, item) => {
                const confirmTypes = ['eliminar-producto', 'eliminar-historial', 'toggle-tecnico', 'eliminar-asignacion'];
                if (confirmTypes.includes(type)) setState(s => ({ ...s, showConfirm: true, confirmAction: { type, item }, modalType: null, selectedItem: item }));
                else setState(s => ({ ...s, modalType: type, selectedItem: item }));
            };
            const handleCloseModal = () => setState(s => ({ ...s, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null }));

            const handleConfirmAction = async () => {
                const { confirmAction } = state;
                try {
                    if (confirmAction.type === 'eliminar-producto')  { await dataManager.deleteInventoryItem(confirmAction.item.id); showToast('Producto eliminado', 'success'); }
                    else if (confirmAction.type === 'eliminar-historial')  { await dataManager.deleteHistoryItem(confirmAction.item.id); showToast('Registro eliminado', 'success'); }
                    else if (confirmAction.type === 'toggle-tecnico')      { await dataManager.toggleTechnicianStatus(confirmAction.item.id, confirmAction.item.activo); showToast('Estado actualizado', 'success'); }
                    else if (confirmAction.type === 'eliminar-asignacion') { await dataManager.deleteAssignment(confirmAction.item.id); showToast('Asignacion eliminada', 'success'); }
                    setState(s => ({ ...s, showConfirm: false, confirmAction: null }));
                    const data = await dataManager.loadAllData();
                    setDataState(data);
                } catch(error) { console.error('Error:', error); showToast('Error: ' + error.message, 'error'); }
            };

            

            const getLastSyncText = () => { if (!state.lastSync) return ''; const diff = Math.floor((new Date() - state.lastSync) / 1000); if (diff < 60) return 'Hace un momento'; if (diff < 3600) return 'Hace ' + Math.floor(diff/60) + ' min'; return 'Hace ' + Math.floor(diff/3600) + 'h'; };

            // Detección móvil — pantalla < 768px
            const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

            if (state.loading) return e('div', { className: 'global-loading' }, e('div', { className: 'loading-spinner' }), e('p', { className: 'global-loading-text' }, T().loading));
            if (!state.user) return e(LoginScreen, { onLogin: handleLogin });

            // Interfaz móvil simplificada para técnicos
            if (isMobile && !state.isAdmin) return e(MobileView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal });

            // Acceso denegado
            if (state.accessDenied) return e('div', { className: 'login-screen' },
                e('div', { className: 'login-box', style: { borderColor: 'var(--accent-red)' } },
                    e('span', { style: { fontSize: '64px', display: 'block', marginBottom: '16px' } }, '🚫'),
                    e('h1', { style: { color: 'var(--accent-red)', marginBottom: '16px' } }, T().accessDenied),
                    e('p', { style: { marginBottom: '8px' } }, T().accessDeniedMsg),
                    e('p', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '32px' } }, T().accessDeniedSub),
                    e('p', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '24px' } }, state.user.email),
                    e('button', { className: 'button button-secondary', onClick: handleLogout, style: { width: '100%' } }, T().tryOtherAccount)
                )
            );

            const stats = { totalProductos: state.inventory.length, totalUnidades: state.inventory.reduce((s,i) => s+i.stock, 0), stockBajo: state.inventory.filter(i => i.stock > 0 && i.stock <= i.stockMinimo).length, movimientosHoy: state.history.filter(h => new Date(h.fecha).toDateString() === new Date().toDateString()).length };
            const formModalTypes = ['entrada', 'salida', 'editar', 'tecnico', 'nueva-asignacion', 'nuevo-prestamo', 'ver-asignacion', 'devolver-material', 'duplicar', 'baja-empleado'];

            const setLang = (newLang) => {
                currentLang = newLang;
                localStorage.setItem('inv_lang', newLang);
                setState(s => ({ ...s, lang: newLang }));
            };

            // Búsqueda global
            const globalResults = state.globalSearch.length >= 2 ? (function() {
                const q = state.globalSearch.toLowerCase();
                const results = [];
                (state.inventory || []).forEach(function(i) { if ((i.nombre||'').toLowerCase().includes(q)||(i.barcode||'').includes(q)) results.push({ type: 'inventory', icon: '📦', label: i.nombre, sub: i.barcode, tab: 'inventario' }); });
                (state.activos || []).forEach(function(a) { if ((a.idEtiqueta||'').toLowerCase().includes(q)||(a.numSerie||'').toLowerCase().includes(q)||(a.modelo||'').toLowerCase().includes(q)) results.push({ type: 'equipo', icon: '💻', label: a.tipo + ' · ' + a.modelo, sub: a.idEtiqueta, tab: 'equipos' }); });
                (state.assignments || []).filter(function(a){return a.estado==='Activo';}).forEach(function(a) { if ((a.nombreEmpleado||'').toLowerCase().includes(q)||(a.emailEmpleado||'').toLowerCase().includes(q)) results.push({ type: 'asignacion', icon: '📋', label: a.nombreEmpleado, sub: a.emailEmpleado, tab: 'asignaciones' }); });
                return results.slice(0, 8);
            })() : [];

            return e('div', { key: 'app-' + state.lang, className: 'app-container' },
                e('header', { className: 'header' },
                    e('div', { className: 'header-left' },
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
                            e('img', { src: 'https://sanlucar.com/wp-content/uploads/2023/03/SanLucar_LOGO_final.svg', alt: 'Sanlúcar', style: { height: '32px', width: 'auto', objectFit: 'contain', filter: 'brightness(0) invert(1)' }, onError: function(ev) { ev.target.style.display='none'; } }),
                            e('h1', null, T().appTitle),
                            e('span', { style: { fontSize: '12px', padding: '4px 8px', background: 'rgba(88,166,255,.15)', color: 'var(--accent-blue)', borderRadius: '6px', fontFamily: 'IBM Plex Mono,monospace', fontWeight: '600' } }, 'v' + CONFIG.version)
                        ),
                        e('div', { className: 'user-badges' }, e('span', { className: 'user-badge ' + (state.isAdmin ? 'admin' : 'technician') }, state.isAdmin ? '🛡️ Admin' : '🔧 Técnico', ': ', state.user.name))
                    ),
                    // Búsqueda global
                    e('div', { style: { flex: 1, maxWidth: '400px', position: 'relative', margin: '0 16px' } },
                        e('input', {
                            type: 'text', className: 'search-bar',
                            placeholder: T().globalSearch,
                            value: state.globalSearch,
                            onChange: function(ev) { setState(s => ({ ...s, globalSearch: ev.target.value, showGlobalResults: ev.target.value.length >= 2 })); },
                            onBlur: function() { setTimeout(function() { setState(s => ({ ...s, showGlobalResults: false })); }, 200); },
                            style: { width: '100%', paddingRight: '44px' }
                        }),
                        e('button', { style: { position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: '18px', color: 'var(--text-secondary)' }, onClick: function() { startBarcodeScanner(function(code) { setState(s => ({ ...s, globalSearch: code, showGlobalResults: true })); }); } }, '📷'),
                        state.showGlobalResults && globalResults.length > 0 && e('div', { className: 'user-search-dropdown', style: { top: '100%', zIndex: 9999 } },
                            globalResults.map(function(r, idx) {
                                return e('div', { key: idx, className: 'user-search-item', onMouseDown: function() {
                                    setState(s => ({ ...s, activeTab: r.tab, globalSearch: '', showGlobalResults: false, tabFilter: null }));
                                } },
                                    e('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
                                        e('span', { style: { fontSize: '16px' } }, r.icon),
                                        e('div', null,
                                            e('div', { style: { fontWeight: '600', fontSize: '14px' } }, r.label),
                                            e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', fontFamily: 'IBM Plex Mono,monospace' } }, r.sub)
                                        )
                                    )
                                );
                            })
                        )
                    ),
                    e('div', { className: 'header-stats' },
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, T().products), e('div', { className: 'stat-value blue' }, stats.totalProductos)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, T().units), e('div', { className: 'stat-value green' }, stats.totalUnidades)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, T().lowStock), e('div', { className: 'stat-value orange' }, stats.stockBajo)),
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: 'var(--bg-tertiary)', borderRadius: '8px' } },
                            state.lastSync && e('span', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, getLastSyncText()),
                            e('button', { onClick: () => syncData(true), disabled: state.syncing, style: { background: state.syncing ? 'var(--bg-secondary)' : 'var(--accent-blue)', border: 'none', color: 'white', padding: '6px 12px', borderRadius: '6px', cursor: state.syncing ? 'wait' : 'pointer', fontSize: '14px', fontWeight: '600' } }, state.syncing ? T().syncing : T().sync)
                        ),
                        e('select', {
                            value: state.lang,
                            onChange: function(ev) { setLang(ev.target.value); },
                            style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 10px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', fontWeight: '700', fontFamily: 'IBM Plex Mono,monospace', outline: 'none' }
                        },
                            e('option', { value: 'es' }, '🇪🇸 Español'),
                            e('option', { value: 'en' }, '🇬🇧 English')
                        ),
                        e('button', { className: 'button button-secondary', onClick: handleLogout }, T().logout)
                    )
                ),
                e('nav', { className: 'nav-tabs' },
                    ['dashboard', 'inventario', 'equipos', 'asignaciones', 'historial'].map(function(tab) {
                        const labels = { dashboard: T().dashboard, inventario: T().inventory, equipos: T().equipment, asignaciones: T().assignments, historial: T().history };
                        const pendientesCount = tab === 'equipos' ? (state.activos || []).filter(function(a) { return a.estado === 'Pendiente'; }).length : 0;
                        return e('button', { key: tab, className: 'tab-button ' + (state.activeTab === tab ? 'active' : ''), onClick: function() { handleTabChange(tab); } },
                            labels[tab],
                            pendientesCount > 0 ? e('span', { style: { background: 'var(--accent-orange)', color: 'white', borderRadius: '10px', padding: '1px 7px', fontSize: '11px', fontWeight: '700', marginLeft: '4px' } }, pendientesCount) : null
                        );
                    }),
                    e('button', { className: 'tab-button ' + (state.activeTab === 'admin' ? 'active' : ''), onClick: () => handleTabChange('admin'), style: { background: state.activeTab === 'admin' ? 'var(--accent-purple)' : '', borderColor: 'var(--accent-purple)', borderWidth: '1px', borderStyle: 'solid' } }, T().admin)
                ),
                e('div', { className: 'content-section' },
                    state.activeTab === 'dashboard' && e(Dashboard, { state, onNavigate: handleNavigate }),
                    state.activeTab === 'inventario' && e(InventoryView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal, initialFilter: state.tabFilter }),
                    state.activeTab === 'equipos' && e(EquiposView, { state, onRefresh: refreshData, initialFilter: state.tabFilter, deepLinkEquipo: state.deepLinkEquipo, onClearDeepLink: function() { setState(s => ({ ...s, deepLinkEquipo: null })); } }),
                    state.activeTab === 'asignaciones' && e(AssignmentsView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal, initialFilter: state.tabFilter }),
                    state.activeTab === 'historial' && e(HistoryView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal, initialFilter: state.tabFilter }),
                    state.activeTab === 'admin' && e(AdminPanel, {
                        state,
                        onRefresh: refreshData,
                        onSetStockMinimo: val => setState(s => ({ ...s, stockMinimoDefault: val })),
                        isAdmin: state.isAdmin
                    })
                ),
                state.modalType && !state.showConfirm && formModalTypes.includes(state.modalType) &&
                    e(FormModal, { state, modalType: state.modalType, selectedItem: state.selectedItem, onClose: handleCloseModal, onRefresh: refreshData }),
                state.showConfirm && e(ConfirmModal, {
                    message: state.confirmAction?.type === 'eliminar-producto' ? '¿Eliminar "' + state.selectedItem?.nombre + '"?' :
                             state.confirmAction?.type === 'eliminar-historial' ? '¿Eliminar el registro del ' + new Date(state.selectedItem?.fecha).toLocaleDateString() + '?' :
                             state.confirmAction?.type === 'eliminar-asignacion' ? '¿Eliminar la asignacion de ' + state.selectedItem?.nombreEmpleado + '?' :
                             '¿' + (state.selectedItem?.activo ? 'Desactivar' : 'Activar') + ' a ' + state.selectedItem?.nombre + '?',
                    onConfirm: handleConfirmAction, onCancel: handleCloseModal, loading: false
                })
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    });
    </script>
</body>
</html>
