    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e14; --bg-secondary: #151a23; --bg-tertiary: #1e252f;

        body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(135deg,var(--bg-primary) 0%,#0d1117 100%); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
        .login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; animation:fadeIn .5s ease; }

        .button { padding:14px 28px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s ease; display:inline-flex; align-items:center; gap:8px; justify-content:center; white-space:nowrap; }
        .button:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px var(--shadow); }

        .button-primary { background:var(--accent-blue); color:white; }
        .button-success { background:var(--accent-green); color:white; }
        .button-warning { background:var(--accent-orange); color:white; }
        .button-danger { background:var(--accent-red); color:white; }
        .button-purple { background:var(--accent-purple); color:white; }

        @keyframes spin { to{transform:rotate(360deg)} }
        .toast-container { position:fixed; top:20px; right:20px; z-index:10000; display:flex; flex-direction:column; gap:12px; max-width:400px; }
        .toast { background:var(--bg-secondary); border:2px solid; border-radius:12px; padding:16px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 24px var(--shadow); animation:slideIn .3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateX(100px)} to{opacity:1;transform:translateX(0)} }
        .toast.success { border-color:var(--accent-green); background:rgba(63,185,80,.1); }
        .toast.error { border-color:var(--accent-red); background:rgba(239,68,68,.1); }

        .toast .icon { font-size:20px; }

        .toast.success .text { color:var(--accent-green); }
        .toast.error .text { color:var(--accent-red); }
        .toast.warning .text { color:var(--accent-orange); }

        .header { background:var(--bg-secondary); padding:24px 32px; border-radius:16px; margin-bottom:24px; border:1px solid var(--border); box-shadow:0 8px 24px var(--shadow); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }

        .results-count strong { color:var(--accent-blue); font-family:'IBM Plex Mono',monospace; }
        .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-top:24px; }
        .dashboard-card { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:12px; padding:24px; transition:all .2s ease; }
        .dashboard-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px var(--shadow); }
        .dashboard-card h3 { font-size:14px; font-weight:600; color:var(--text-secondary); margin-bottom:16px; text-transform:uppercase; letter-spacing:.5px; }
        .inventory-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-top:24px; }
        .inventory-card { background:var(--bg-tertiary); border:2px solid var(--border); border-radius:12px; padding:20px; transition:all .2s ease; position:relative; overflow:hidden; }
        .inventory-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent-blue); }
        .inventory-card.low-stock::before { background:var(--accent-orange); }

        .history-table td { padding:16px; border-bottom:1px solid var(--border); font-size:14px; }
        .history-table tr:hover { background:var(--bg-tertiary); }
        .movement-badge { display:inline-block; padding:4px 12px; border-radius:6px; font-size:12px; font-weight:600; text-transform:uppercase; }
        .movement-badge.Entrada { background:rgba(63,185,80,.15); color:var(--accent-green); }
        .movement-badge.Salida { background:rgba(88,166,255,.15); color:var(--accent-blue); }
        .movement-badge.Devolucion { background:rgba(249,115,22,.15); color:var(--accent-orange); }

        .movement-badge.Prestamo { background:rgba(251,191,36,.15); color:var(--accent-yellow); }

        .global-loading { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,14,20,.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; gap:16px; }
        .global-loading .loading-spinner { width:50px; height:50px; border-width:4px; border-color:rgba(88,166,255,.3); border-top-color:var(--accent-blue); }
        .global-loading-text { color:var(--text-secondary); font-size:14px; }
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; animation:fadeIn .2s ease; }
        .modal { background:var(--bg-secondary); border-radius:16px; border:1px solid var(--border); max-width:700px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px var(--shadow); animation:slideUp .3s ease; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .modal-header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--bg-secondary); z-index:10; }

        .stock-result { padding:12px 16px; border-radius:8px; background:rgba(63,185,80,.1); border:1px solid var(--accent-green); color:var(--accent-green); font-weight:600; margin-bottom:16px; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="root"></div>
    <script>
    // ==========================================
    // CONFIGURACION GLOBAL
    // ==========================================
    const CONFIG = {
        sharepoint: {
            sitePath: 'sanlucarfruit.sharepoint.com:/sites/InformationSystems',
            lists: {
                inventario: 'StockControl_InventarioIT',
                tecnicos: 'StockControl_TecnicosIT',
                historial: 'StockControl_HistorialIT',
                admins: 'StockControl_Admins',
                asignaciones: 'StockControl_Asignaciones',
                catalogo: 'StockControl_Catalogo'
            }
        },
        msal: {
            clientId: '80ba264e-e1fc-4749-bf00-2c25b93b4ee5',
            authority: 'https://login.microsoftonline.com/f37778d8-59b2-4e5e-a56b-08eb8ad3c13a',
            redirectUri: window.location.href.split('?')[0].split('#')[0]
        },
        scopes: ['User.Read', 'Sites.ReadWrite.All'],
        version: '1.7.0'
    };

    let msalInstance, graphClient, dataManager;

    // ==========================================
    // CACHE MANAGER
    // ==========================================
    class CacheManager {
        constructor(ttlMinutes = 5) { this.ttl = ttlMinutes * 60 * 1000; this.prefix = 'inv_cache_'; }
        set(key, data) { try { localStorage.setItem(this.prefix + key, JSON.stringify({ data, timestamp: Date.now() })); } catch(e) {} }
        get(key) { try { const item = localStorage.getItem(this.prefix + key); if (!item) return null; const parsed = JSON.parse(item); if (Date.now() - parsed.timestamp > this.ttl) { localStorage.removeItem(this.prefix + key); return null; } return parsed.data; } catch(e) { return null; } }
        clear() { Object.keys(localStorage).filter(k => k.startsWith(this.prefix)).forEach(k => localStorage.removeItem(k)); }
    }
    const cache = new CacheManager(5);

    // ==========================================
    // MICROSOFT GRAPH API CLIENT
    // ==========================================
    class GraphAPIClient {
        constructor(accessToken) { this.accessToken = accessToken; this.baseUrl = 'https://graph.microsoft.com/v1.0'; }
        async request(endpoint, options = {}) {
            const url = this.baseUrl + endpoint;
            const headers = { 'Authorization': 'Bearer ' + this.accessToken, 'Content-Type': 'application/json', ...options.headers };
            try {
                const response = await fetch(url, { ...options, headers });
                if (!response.ok) { const error = await response.json(); throw new Error(error.error?.message || 'HTTP ' + response.status); }
                if (response.status === 204) return null;
                return await response.json();
            } catch(error) { console.error('Graph API Error:', error); throw error; }
        }
        async getListItems(listName) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items?expand=fields&$top=5000';
            const result = await this.request(endpoint);
            return result.value.map(item => ({ ...item.fields, sharePointId: item.id }));
        }
        async createListItem(listName, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items';
            const result = await this.request(endpoint, { method: 'POST', body: JSON.stringify({ fields: data }) });
            return { ...result.fields, sharePointId: result.id };
        }
        async updateListItem(listName, itemId, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId + '/fields';
            await this.request(endpoint, { method: 'PATCH', body: JSON.stringify(data) });
            return true;
        }
        async deleteListItem(listName, itemId) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId;
            await this.request(endpoint, { method: 'DELETE' });
            return true;
        }
        async getCurrentUser() { return await this.request('/me'); }
        async searchUsers(searchTerm) {
            if (!searchTerm || searchTerm.length < 2) return [];
            try {
                const endpoint = "/users?$filter=startswith(displayName,'" + searchTerm + "') or startswith(givenName,'" + searchTerm + "') or startswith(surname,'" + searchTerm + "')&$select=id,displayName,mail,department,jobTitle&$top=10";
                const result = await this.request(endpoint);
                return result.value || [];
            } catch(error) {
                try {
                    const result = await this.request('/users?$search="displayName:' + searchTerm + '"&$select=id,displayName,mail,department,jobTitle&$top=10', { headers: { 'ConsistencyLevel': 'eventual' } });
                    return result.value || [];
                } catch(e) { return []; }
            }
        }
    }

    // ==========================================
    // DATA MANAGER
    // ==========================================
    class DataManager {
        constructor(graphClient) { this.graph = graphClient; }
        async loadAllData() {
            try {
                const [inventario, tecnicos, historial, admins, asignaciones, catalogo] = await Promise.all([
                    this.graph.getListItems(CONFIG.sharepoint.lists.inventario),
                    this.graph.getListItems(CONFIG.sharepoint.lists.tecnicos),
                    this.graph.getListItems(CONFIG.sharepoint.lists.historial),
                    this.graph.getListItems(CONFIG.sharepoint.lists.admins),
                    this.graph.getListItems(CONFIG.sharepoint.lists.asignaciones).catch(() => []),
                    this.graph.getListItems(CONFIG.sharepoint.lists.catalogo).catch(() => [])
                ]);
                const catalogoProcessed = {};
                catalogo.forEach(item => {
                    const tipo = item.Title, modelo = item.Modelo;
                    const activo = item.Activo !== false && item.Activo !== 'No';
                    if (activo && tipo && modelo) { if (!catalogoProcessed[tipo]) catalogoProcessed[tipo] = []; catalogoProcessed[tipo].push(modelo); }
                });
                return {
                    inventory: inventario.map(item => ({ id: item.sharePointId, nombre: item.Nombre || item.Title, categoria: item.Categoria, barcode: item.CodigoBarras, stock: parseInt(item.Stock) || 0, stockMinimo: parseInt(item.StockMinimo) || 0, ubicacion: item.Ubicacion || '', estado: item.Estado || 'Nuevo' })),
                    technicians: tecnicos.map(item => ({ id: item.sharePointId, nombre: item.NombreTecnico || item.Title, codigo: item.CodigoTecnico, email: item.Email, activo: item.Activo === true || item.Activo === 'Yes' })),
                    history: historial.map(item => ({ id: item.sharePointId, fecha: item.FechaHora || item.Created, tipo: item.TipoMovimiento, producto: item.Producto, cantidad: parseInt(item.Cantidad) || 0, ticket: item.Ticket || '', usuario: item.Usuario || '', tecnico: item.Tecnico || '', firma: item.Firma || null })).sort((a,b) => new Date(b.fecha) - new Date(a.fecha)),
                    assignments: asignaciones.map(item => ({ id: item.sharePointId, nombreEmpleado: item.NombreEmpleado, emailEmpleado: item.EmailEmpleado, departamento: item.Departamento, puesto: item.Puesto, fechaIncorporacion: item.FechaIncorporacion, productosAsignados: JSON.parse(item.ProductosAsignados || '[]'), cantidadProductos: parseInt(item.CantidadProductos) || 0, firmaEmpleado: item.FirmaEmpleado, tecnicoResponsable: item.TecnicoResponsable, fechaAsignacion: item.FechaAsignacion, estado: item.Estado, observaciones: item.Observaciones || '', esPrestamo: item.EsPrestamo === 'Si' })).sort((a,b) => new Date(b.fechaAsignacion) - new Date(a.fechaAsignacion)),
                    admins, catalogo: catalogoProcessed
                };
            } catch(error) { console.error('Error cargando datos:', error); throw error; }
        }
        async checkBarcodeExists(barcode) {
            try { const items = await this.graph.getListItems(CONFIG.sharepoint.lists.inventario); return items.some(item => item.CodigoBarras === barcode); } catch(e) { return false; }
        }
        async createInventoryItem(data) {
            return await this.graph.createListItem(CONFIG.sharepoint.lists.inventario, { Title: data.nombre, Nombre: data.nombre, Categoria: data.categoria, CodigoBarras: data.barcode, Stock: data.stock, StockMinimo: data.stockMinimo, Ubicacion: data.ubicacion, Estado: data.estado || 'Nuevo' });
        }
        async updateInventoryItem(itemId, data) { await this.graph.updateListItem(CONFIG.sharepoint.lists.inventario, itemId, data); }
        async deleteInventoryItem(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.inventario, itemId); }
        async addToHistory(data) {
            await this.graph.createListItem(CONFIG.sharepoint.lists.historial, { Title: data.tipo + ' - ' + data.producto, TipoMovimiento: data.tipo, Producto: data.producto, Cantidad: data.cantidad, Ticket: data.ticket || '', Usuario: data.usuario || '', Tecnico: data.tecnico || '', FechaHora: new Date().toISOString(), Firma: data.firma || '' });
        }
        async createTechnician(data) {
            return await this.graph.createListItem(CONFIG.sharepoint.lists.tecnicos, { Title: data.nombre, NombreTecnico: data.nombre, CodigoTecnico: data.codigo, Email: data.email, Activo: true });
        }
        async toggleTechnicianStatus(itemId, currentStatus) { await this.graph.updateListItem(CONFIG.sharepoint.lists.tecnicos, itemId, { Activo: !currentStatus }); }
        async deleteHistoryItem(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.historial, itemId); }
        async addToCatalog(tipo, modelo) { return await this.graph.createListItem(CONFIG.sharepoint.lists.catalogo, { Title: tipo, Modelo: modelo, Activo: true }); }
        async createAssignment(data) {
            const titulo = data.esPrestamo ? 'Prestamo - ' + data.nombreEmpleado : 'Asignacion - ' + data.nombreEmpleado + ' - ' + new Date().toLocaleDateString('es-ES');
            const detalleProductos = (data.productosAsignados || []).map((p, i) => (i + 1) + '. ' + p.nombre + ' (Cod: ' + p.barcode + ')').join('\n');
            return await this.graph.createListItem(CONFIG.sharepoint.lists.asignaciones, { Title: titulo, NombreEmpleado: data.nombreEmpleado, EmailEmpleado: data.emailEmpleado, Departamento: data.departamento, Puesto: data.puesto, FechaIncorporacion: data.fechaIncorporacion, ProductosAsignados: JSON.stringify(data.productosAsignados), CantidadProductos: data.productosAsignados.length, FirmaEmpleado: data.firmaEmpleado, TecnicoResponsable: data.tecnicoResponsable, FechaAsignacion: new Date().toISOString(), Estado: 'Activo', Observaciones: data.observaciones || '', EsPrestamo: data.esPrestamo ? 'Si' : 'No', DetalleProductos: detalleProductos, Foto1: data.foto1 || '', Foto2: data.foto2 || '', Foto3: data.foto3 || '' });
        }
        async updateAssignmentStatus(itemId, nuevoEstado) { await this.graph.updateListItem(CONFIG.sharepoint.lists.asignaciones, itemId, { Estado: nuevoEstado }); }
        async deleteAssignment(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.asignaciones, itemId); }
        async searchUsers(searchTerm) { return await this.graph.searchUsers(searchTerm); }
        async returnMaterial(assignmentId, returnedProducts, allProducts, observaciones, tecnico) {
            const fullyReturned = returnedProducts.length === allProducts.length;
            const newState = fullyReturned ? 'Devuelto' : 'Parcial';
            await this.graph.updateListItem(CONFIG.sharepoint.lists.asignaciones, assignmentId, { Estado: newState, Observaciones: observaciones });
            for (const prod of returnedProducts) {
                const inventoryItem = await this.findProductByBarcode(prod.barcode);
                if (inventoryItem) await this.graph.updateListItem(CONFIG.sharepoint.lists.inventario, inventoryItem.id, { Stock: (inventoryItem.stock || 0) + 1 });
                await this.graph.createListItem(CONFIG.sharepoint.lists.historial, { Title: 'Devolucion - ' + prod.nombre, TipoMovimiento: 'Devolucion', Producto: prod.nombre, Cantidad: 1, Usuario: '', Tecnico: tecnico, FechaHora: new Date().toISOString() });
            }
            return newState;
        }
        async findProductByBarcode(barcode) {
            const items = await this.graph.getListItems(CONFIG.sharepoint.lists.inventario);
            const item = items.find(i => i.CodigoBarras === barcode);
            if (item) return { id: item.sharePointId, nombre: item.Nombre || item.Title, stock: parseInt(item.Stock) || 0, barcode: item.CodigoBarras };
            return null;
        }
    }

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    async function initializeMSAL() {
        try {
            msalInstance = new msal.PublicClientApplication({ auth: CONFIG.msal, cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false } });
            await msalInstance.initialize();
            return true;
        } catch(error) { console.error('Error inicializando MSAL:', error); return false; }
    }
    async function getAccessToken() {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length === 0) return null;
        try { const response = await msalInstance.acquireTokenSilent({ scopes: CONFIG.scopes, account: accounts[0] }); return response.accessToken; } catch(error) { return null; }
    }
    async function login() {
        const response = await msalInstance.loginPopup({ scopes: CONFIG.scopes });
        msalInstance.setActiveAccount(response.account);
        return { name: response.account.name, email: response.account.username, token: response.accessToken };
    }
    async function logout() { try { cache.clear(); await msalInstance.logoutPopup(); } catch(e) {} }
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        const icons = { success: '✓', error: '✕', warning: '⚠' };
        toast.innerHTML = '<span class="icon">' + (icons[type] || '•') + '</span><span class="text">' + message + '</span>';
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'slideIn .3s ease reverse'; setTimeout(() => toast.remove(), 300); }, 4000);
    }
    function exportToCSV(data, filename) {
        if (!data || data.length === 0) { showToast('No hay datos para exportar', 'warning'); return; }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        data.forEach(row => { const values = headers.map(field => { let value = row[field] || ''; if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) value = '"' + value.replace(/"/g, '""') + '"'; return value; }); csvRows.push(values.join(',')); });
        const blob = new Blob(['\ufeff' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename + '_' + new Date().toISOString().split('T')[0] + '.csv';
        link.click();
        showToast('Archivo exportado correctamente', 'success');
    }
    function generateBarcode(code) {
        const canvas = document.createElement('canvas');
        JsBarcode(canvas, code, { format: 'CODE128', width: 2, height: 100, displayValue: true });
        return canvas.toDataURL('image/png');
    }
    function printTechnicianCard(tech) {
        const printWindow = window.open('', '_blank');
        const barcodeImage = generateBarcode(tech.codigo);
        printWindow.document.write('<!DOCTYPE html><html><head><title>Tecnico - ' + tech.nombre + '</title><style>body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f0f0f0}.card{background:white;padding:40px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);text-align:center;max-width:400px}h1{color:#333;margin-bottom:10px;font-size:24px}.codigo{color:#666;font-size:18px;font-weight:bold;margin-bottom:20px}.email{color:#999;font-size:14px;margin-bottom:30px}img{max-width:100%;height:auto}.footer{margin-top:30px;padding-top:20px;border-top:2px solid #eee;color:#999;font-size:12px}@media print{body{background:white}.card{box-shadow:none}}</style></head><body><div class="card"><h1>' + tech.nombre + '</h1><div class="codigo">Codigo: ' + tech.codigo + '</div><div class="email">' + tech.email + '</div><img src="' + barcodeImage + '" alt="Codigo de barras"><div class="footer">Sistema de Inventario IT<br>Escanea este codigo para identificarte</div></div></body></html>');
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 250);
    }
    function exportAssignmentToPDF(assignment) {
        if (typeof jspdf === 'undefined' || !jspdf.jsPDF) { showToast('PDF no disponible', 'error'); return; }
        try {
            const doc = new jspdf.jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let y = 20;
            doc.setFontSize(18); doc.setFont(undefined, 'bold');
            doc.text('SANLUCAR FRUIT', pageWidth / 2, y, { align: 'center' }); y += 8;
            doc.setFontSize(12);
            doc.text(assignment.esPrestamo ? 'ACTA DE PRESTAMO DE MATERIAL IT' : 'ACTA DE ASIGNACION DE MATERIAL IT', pageWidth / 2, y, { align: 'center' }); y += 15;
            doc.setFontSize(11); doc.setFont(undefined, 'bold'); doc.text('DATOS DEL EMPLEADO', margin, y); y += 8;
            doc.setFont(undefined, 'normal'); doc.setFontSize(10);
            doc.text('Nombre: ' + assignment.nombreEmpleado, margin, y); y += 6;
            doc.text('Email: ' + assignment.emailEmpleado, margin, y); y += 6;
            doc.text('Departamento: ' + assignment.departamento, margin, y); y += 6;
            doc.text('Puesto: ' + assignment.puesto, margin, y); y += 6;
            if (assignment.fechaIncorporacion) { doc.text('Fecha Alta: ' + new Date(assignment.fechaIncorporacion).toLocaleDateString('es-ES'), margin, y); y += 6; }
            y += 6;
            doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.text('MATERIAL ' + (assignment.esPrestamo ? 'EN PRESTAMO' : 'ASIGNADO'), margin, y); y += 8;
            doc.setFont(undefined, 'normal'); doc.setFontSize(10);
            (assignment.productosAsignados || []).forEach((prod, idx) => {
                doc.text((idx + 1) + '. ' + prod.nombre + ' (Cod: ' + prod.barcode + ')', margin, y); y += 6;
                if (y > 270) { doc.addPage(); y = 20; }
            });
            y += 10;
            doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.text('CONDICIONES DE USO', margin, y); y += 8;
            doc.setFont(undefined, 'normal'); doc.setFontSize(9);
            const conditions = ['El empleado declara haber recibido el material en perfecto estado.', 'Se compromete a hacer un uso adecuado del mismo.', 'Mantendra el material en buen estado de conservacion.', 'Lo devolvera cuando finalice su relacion laboral o cuando se solicite.'];
            conditions.forEach(cond => { doc.text('- ' + cond, margin, y); y += 5; });
            if (assignment.observaciones) { y += 5; doc.setFont(undefined, 'bold'); doc.text('OBSERVACIONES:', margin, y); y += 6; doc.setFont(undefined, 'normal'); doc.text(assignment.observaciones, margin, y); y += 10; }
            y += 15;
            doc.setFontSize(10);
            doc.text('Empleado: ' + assignment.nombreEmpleado, margin, y);
            doc.text('Tecnico IT: ' + assignment.tecnicoResponsable, pageWidth / 2 + 10, y);
            y += 15;
            doc.setFontSize(8);
            doc.text('Fecha: ' + new Date(assignment.fechaAsignacion).toLocaleString('es-ES') + ' | Sanlucar Fruit', pageWidth / 2, y, { align: 'center' });
            doc.save('Asignacion_' + assignment.nombreEmpleado.replace(/\s+/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.pdf');
            showToast('PDF generado correctamente', 'success');
        } catch(e) { console.error('Error generando PDF:', e); showToast('Error generando PDF', 'error'); }
    }

    // ==========================================
    // BARCODE SCANNER
    // ==========================================
    let html5QrcodeScanner = null, scannerCallback = null, currentScanMode = 'barcode';
    function startBarcodeScanner(callback) {
        if (typeof Html5Qrcode === 'undefined') { showToast('Escaner no disponible', 'error'); return; }
        scannerCallback = callback;
        const modal = document.createElement('div');
        modal.id = 'barcode-scanner-modal';
        modal.className = 'scanner-modal';
        modal.innerHTML = '<div class="scanner-container" onclick="event.stopPropagation()"><div class="scanner-header"><div class="scanner-title">Escaner</div><button class="modal-close" id="scanner-close-btn" type="button">×</button></div><div class="scanner-viewport" id="scanner-viewport"><div id="scanner-reader"></div></div><div class="scanner-info"><div class="scanner-mode-toggle"><button class="mode-button active" data-mode="barcode">Codigo de Barras</button><button class="mode-button" data-mode="qr">Codigo QR</button></div><div class="scanner-instruction" id="scanner-instruction">Enfoca el codigo en la camara</div><div id="scanner-status"></div></div></div>';
        document.body.appendChild(modal);
        const escHandler = e => { if (e.key === 'Escape') stopBarcodeScanner(); };
        document.addEventListener('keydown', escHandler);
        setTimeout(() => { modal.addEventListener('click', e => { if (e.target === modal) stopBarcodeScanner(); }); }, 100);
        setTimeout(() => { const closeBtn = document.getElementById('scanner-close-btn'); if (closeBtn) closeBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); stopBarcodeScanner(); }; }, 100);
        setTimeout(() => {
            document.querySelectorAll('.mode-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentScanMode = btn.dataset.mode;
                    document.querySelectorAll('.mode-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const instr = document.getElementById('scanner-instruction');
                    if (instr) instr.textContent = currentScanMode === 'qr' ? 'Enfoca el codigo QR en la camara' : 'Enfoca el codigo de barras en la camara';
                });
            });
        }, 100);
        setTimeout(() => {
            const html5QrCode = new Html5Qrcode("scanner-reader");
            html5QrcodeScanner = html5QrCode;
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                (decodedText) => {
                    const statusEl = document.getElementById('scanner-status');
                    if (statusEl) statusEl.innerHTML = '<div class="scanner-result">✓ Detectado: ' + decodedText + '</div>';
                    try { new Audio('data:audio/wav;base64,UklGRl9vT1dBVkVmbXQAEAAAAA==').play().catch(() => {}); } catch(e) {}
                    if (navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => { if (scannerCallback) scannerCallback(decodedText); stopBarcodeScanner(); }, 500);
                },
                () => {}
            ).then(() => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-instruction" style="color:var(--accent-green)">Camara lista</div>';
            }).catch(err => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-result scanner-error">Error: ' + err + '</div>';
            });
        }, 200);
    }
    function stopBarcodeScanner() {
        if (html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }).catch(() => { html5QrcodeScanner = null; }); }
        const modal = document.getElementById('barcode-scanner-modal');
        if (modal) modal.remove();
        scannerCallback = null;
    }

    // ==========================================
    // REACT COMPONENTS
    // ==========================================
    window.addEventListener('load', function() {
        if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
            document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:white;"><p>React no se pudo cargar. Recarga la página.</p></div>';
            return;
        }

        const { useState, useEffect, useRef } = React;
        const e = React.createElement;

        // ---- LoginScreen ----
        function LoginScreen({ onLogin }) {
            const [loading, setLoading] = useState(false);
            const handleLogin = async () => { setLoading(true); try { await onLogin(); } catch(err) { showToast('Error al iniciar sesion', 'error'); } finally { setLoading(false); } };
            return e('div', { className: 'login-screen' },
                e('div', { className: 'login-box' },
                    e('span', { className: 'login-icon' }, '📦'),

                                    e('div', { className: 'action-icon', onClick: () => exportAssignmentToPDF(a), title: 'PDF' }, '📥'),
                                    a.estado === 'Activo' && e('div', { className: 'action-icon', onClick: () => onOpenModal('devolver-material', a), title: 'Devolver' }, '↩️'),
                                    e('div', { className: 'action-icon danger', onClick: () => onOpenModal('eliminar-asignacion', a), title: 'Eliminar' }, '🗑️')
                                ))
                            );
                        }))
                    ) :
                    e('div', { className: 'empty-state' }, e('div', { className: 'empty-state-icon' }, '📋'), e('div', { className: 'empty-state-title' }, 'No hay asignaciones'), e('div', { className: 'empty-state-text' }, 'Crea la primera asignacion de material'))
            );
        }

        // ==========================================
        // FORM MODAL - COMPLETO v1.7.0
        // ==========================================
        function FormModal({ state, modalType, selectedItem, onClose, onRefresh }) {
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                nombre: selectedItem ? selectedItem.nombre : '',
                categoria: selectedItem ? selectedItem.categoria : '',
                barcode: (selectedItem && modalType !== 'duplicar') ? selectedItem.barcode : '',
                stock: selectedItem ? String(selectedItem.stock) : '1',
                stockMinimo: selectedItem ? String(selectedItem.stockMinimo) : '2',
                ubicacion: selectedItem ? (selectedItem.ubicacion || '') : '',
                estado: selectedItem ? (selectedItem.estado || 'Nuevo') : 'Nuevo',
                cantidad: '1',
                ticket: '',
                usuario: '',
                tecnico: (state.technicians.filter(t => t.activo)[0] || {}).nombre || '',
                nombreEmpleado: '',
                emailEmpleado: '',
                departamento: '',
                puesto: '',
                fechaIncorporacion: new Date().toISOString().split('T')[0],
                observaciones: '',
                esPrestamo: modalType === 'nuevo-prestamo',
                nombreTecnico: '',
                emailTecnico: ''
            });
            const [signature, setSignature] = useState(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [lastPos, setLastPos] = useState(null);
            const [userSearchQuery, setUserSearchQuery] = useState('');
            const [userSearchResults, setUserSearchResults] = useState([]);
            const [userSearchLoading, setUserSearchLoading] = useState(false);
            const [selectedProducts, setSelectedProducts] = useState([]);
            const [barcodeInput, setBarcodeInput] = useState('');
            const [barcodeError, setBarcodeError] = useState('');
            const [returnSelections, setReturnSelections] = useState({});
            const canvasRef = useRef(null);
            const searchTimeoutRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    const canvas = canvasRef.current;
                    canvas.width = canvas.offsetWidth || 600;
                    canvas.height = 200;
                }
            });

            const upd = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));

            // Canvas drawing
            const getCanvasPos = (ev) => {
                const canvas = canvasRef.current;
                if (!canvas) return { x: 0, y: 0 };
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
                const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
                const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
                return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
            };
            const onCanvasDown = ev => { ev.preventDefault(); setIsDrawing(true); setLastPos(getCanvasPos(ev)); };
            const onCanvasMove = ev => {
                ev.preventDefault();
                if (!isDrawing || !lastPos || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getCanvasPos(ev);
                ctx.beginPath(); ctx.moveTo(lastPos.x, lastPos.y); ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                setLastPos(pos);
            };
            const onCanvasUp = ev => {
                if (ev) ev.preventDefault();
                setIsDrawing(false); setLastPos(null);
                if (canvasRef.current) setSignature(canvasRef.current.toDataURL());
            };
            const clearSignature = () => {
                if (canvasRef.current) { const ctx = canvasRef.current.getContext('2d'); ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); }
                setSignature(null);
            };

            // User search AD
            const handleUserSearch = query => {
                setUserSearchQuery(query);
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                if (!query || query.length < 2) { setUserSearchResults([]); return; }
                setUserSearchLoading(true);
                searchTimeoutRef.current = setTimeout(async () => {
                    try { const results = await dataManager.searchUsers(query); setUserSearchResults(results); }
                    catch(err) { setUserSearchResults([]); }
                    finally { setUserSearchLoading(false); }
                }, 400);
            };
            const selectUser = user => {
                setFormData(prev => ({ ...prev, nombreEmpleado: user.displayName || '', emailEmpleado: user.mail || '', departamento: user.department || '', puesto: user.jobTitle || '' }));
                setUserSearchQuery(''); setUserSearchResults([]);
            };

            // Products for assignment
            const addProductByBarcode = barcode => {
                if (!barcode) return;
                const item = state.inventory.find(i => i.barcode === barcode);
                if (!item) { setBarcodeError('Producto no encontrado: ' + barcode); return; }
                if (item.stock <= 0) { setBarcodeError('Sin stock: ' + item.nombre); return; }
                if (selectedProducts.find(p => p.barcode === barcode)) { setBarcodeError('Producto ya añadido'); return; }
                setSelectedProducts(prev => [...prev, { nombre: item.nombre, barcode: item.barcode, id: item.id, categoria: item.categoria }]);
                setBarcodeInput(''); setBarcodeError('');
                showToast('Añadido: ' + item.nombre, 'success');
            };

            const genBarcode = () => { const ts = Date.now().toString().slice(-8); const rnd = Math.floor(Math.random()*100).toString().padStart(2,'0'); upd('barcode', 'SL' + ts + rnd); };

            // SUBMIT
            const handleSubmit = async () => {
                setLoading(true);
                try {
                    // ---- ENTRADA NUEVO PRODUCTO ----
                    if (modalType === 'entrada' && !selectedItem) {
                        if (!formData.nombre.trim() || !formData.categoria.trim() || !formData.barcode.trim()) { showToast('Nombre, categoría y código son obligatorios', 'error'); setLoading(false); return; }
                        const exists = await dataManager.checkBarcodeExists(formData.barcode);
                        if (exists) { showToast('El código de barras ya existe', 'error'); setLoading(false); return; }
                        await dataManager.createInventoryItem({ nombre: formData.nombre, categoria: formData.categoria, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });
                        if (parseInt(formData.stock) > 0) await dataManager.addToHistory({ tipo: 'Entrada', producto: formData.nombre, cantidad: parseInt(formData.stock) || 1, ticket: '', usuario: '', tecnico: formData.tecnico, firma: signature || '' });
                        showToast('Producto creado: ' + formData.nombre, 'success');

                    // ---- ENTRADA AÑADIR STOCK ----
                    } else if (modalType === 'entrada' && selectedItem) {
                        const addCant = parseInt(formData.cantidad) || 1;
                        const newStock = selectedItem.stock + addCant;
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: newStock });
                        await dataManager.addToHistory({ tipo: 'Entrada', producto: selectedItem.nombre, cantidad: addCant, ticket: formData.ticket || '', usuario: '', tecnico: formData.tecnico, firma: signature || '' });
                        showToast('+' + addCant + ' unidades → Stock: ' + newStock, 'success');

                    // ---- SALIDA ----
                    } else if (modalType === 'salida') {
                        const cant = parseInt(formData.cantidad) || 1;
                        if (selectedItem.stock < cant) { showToast('Stock insuficiente (' + selectedItem.stock + ' disponibles)', 'error'); setLoading(false); return; }
                        if (!formData.tecnico) { showToast('Selecciona un técnico', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: selectedItem.stock - cant });
                        await dataManager.addToHistory({ tipo: 'Salida', producto: selectedItem.nombre, cantidad: cant, ticket: formData.ticket || '', usuario: formData.usuario || '', tecnico: formData.tecnico, firma: signature || '' });
                        showToast('Salida: ' + cant + ' x ' + selectedItem.nombre, 'success');

                    // ---- EDITAR ----
                    } else if (modalType === 'editar') {
                        if (!formData.nombre.trim()) { showToast('El nombre es obligatorio', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Title: formData.nombre, Nombre: formData.nombre, Categoria: formData.categoria, CodigoBarras: formData.barcode, Stock: parseInt(formData.stock) || 0, StockMinimo: parseInt(formData.stockMinimo) || 0, Ubicacion: formData.ubicacion, Estado: formData.estado });
                        showToast('Producto actualizado: ' + formData.nombre, 'success');

                    // ---- DUPLICAR ----
                    } else if (modalType === 'duplicar') {
                        if (!formData.barcode.trim()) { showToast('Genera un nuevo código de barras', 'error'); setLoading(false); return; }
                        const dupExists = await dataManager.checkBarcodeExists(formData.barcode);
                        if (dupExists) { showToast('El código ya existe, genera uno nuevo', 'error'); setLoading(false); return; }
                        await dataManager.createInventoryItem({ nombre: formData.nombre, categoria: formData.categoria, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });
                        showToast('Producto duplicado correctamente', 'success');

                    // ---- NUEVO TÉCNICO ----
                    } else if (modalType === 'tecnico') {
                        if (!formData.nombreTecnico.trim() || !formData.emailTecnico.trim()) { showToast('Nombre y email son obligatorios', 'error'); setLoading(false); return; }
                        const codigo = 'TEC' + Date.now().toString().slice(-6);
                        await dataManager.createTechnician({ nombre: formData.nombreTecnico, codigo, email: formData.emailTecnico });
                        showToast('Técnico creado. Código: ' + codigo, 'success');

                    // ---- ASIGNACION / PRESTAMO ----
                    } else if (modalType === 'nueva-asignacion' || modalType === 'nuevo-prestamo') {
                        if (!formData.nombreEmpleado.trim()) { showToast('Selecciona un empleado', 'error'); setLoading(false); return; }
                        if (selectedProducts.length === 0) { showToast('Añade al menos un producto', 'error'); setLoading(false); return; }
                        if (!formData.tecnico) { showToast('Selecciona un técnico responsable', 'error'); setLoading(false); return; }
                        for (const prod of selectedProducts) {
                            const invItem = state.inventory.find(inv => inv.id === prod.id);
                            if (invItem) await dataManager.updateInventoryItem(invItem.id, { Stock: invItem.stock - 1 });
                            await dataManager.addToHistory({ tipo: formData.esPrestamo ? 'Prestamo' : 'Asignacion', producto: prod.nombre, cantidad: 1, ticket: '', usuario: formData.nombreEmpleado, tecnico: formData.tecnico, firma: signature || '' });
                        }
                        await dataManager.createAssignment({ nombreEmpleado: formData.nombreEmpleado, emailEmpleado: formData.emailEmpleado, departamento: formData.departamento, puesto: formData.puesto, fechaIncorporacion: formData.fechaIncorporacion, productosAsignados: selectedProducts, firmaEmpleado: signature || '', tecnicoResponsable: formData.tecnico, observaciones: formData.observaciones, esPrestamo: formData.esPrestamo, foto1: '', foto2: '', foto3: '' });
                        showToast(formData.esPrestamo ? 'Préstamo registrado correctamente' : 'Asignación creada correctamente', 'success');

                    // ---- DEVOLUCION ----
                    } else if (modalType === 'devolver-material') {
                        const toReturn = (selectedItem.productosAsignados || []).filter(p => returnSelections[p.barcode]);
                        if (toReturn.length === 0) { showToast('Selecciona al menos un producto', 'warning'); setLoading(false); return; }
                        await dataManager.returnMaterial(selectedItem.id, toReturn, selectedItem.productosAsignados || [], formData.observaciones || '', formData.tecnico);
                        showToast('Devolución registrada: ' + toReturn.length + ' producto(s)', 'success');
                    }
                    onClose();
                    await onRefresh();
                } catch(error) {
                    console.error('Error en formulario:', error);
                    showToast('Error: ' + (error.message || 'Error desconocido'), 'error');
                } finally { setLoading(false); }
            };

            // Helpers render
            const activeTechs = state.technicians.filter(t => t.activo);
            const catalogCategories = Object.keys(state.catalogo || {});
            const defaultCategories = ['Portatiles', 'Ratones', 'Teclados', 'Auriculares', 'iPads', 'iPhones', 'Cables', 'Monitores', 'Webcams', 'Docking Stations', 'Tablets', 'Otros'];
            const allCategories = catalogCategories.length > 0 ? catalogCategories : defaultCategories;

            const fld = (label, input, required) => e('div', { className: 'form-group' },
                e('label', { className: 'form-label' }, label, required && e('span', { className: 'required-asterisk' }, ' *')),
                input
            );
            const inp = (field, placeholder, type) => e('input', { type: type || 'text', className: 'form-input', value: formData[field], placeholder: placeholder || '', onChange: ev => upd(field, ev.target.value) });
            const catSelect = (fieldName) => e('select', { className: 'form-select', value: formData[fieldName || 'categoria'], onChange: ev => upd(fieldName || 'categoria', ev.target.value) },
                e('option', { value: '' }, '-- Selecciona categoria --'),
                allCategories.map(cat => e('option', { key: cat, value: cat }, cat))
            );
            const techSelect = () => e('select', { className: 'form-select', value: formData.tecnico, onChange: ev => upd('tecnico', ev.target.value) },
                e('option', { value: '' }, '-- Selecciona tecnico --'),
                activeTechs.map(t => e('option', { key: t.id, value: t.nombre }, t.nombre))
            );
            const signatureBlock = () => e('div', { className: 'signature-container' },
                e('div', { className: 'signature-label' }, '✍️ Firma'),
                e('canvas', {
                    ref: canvasRef, className: 'signature-canvas',
                    onMouseDown: onCanvasDown, onMouseMove: onCanvasMove, onMouseUp: onCanvasUp, onMouseLeave: onCanvasUp,
                    onTouchStart: onCanvasDown, onTouchMove: onCanvasMove, onTouchEnd: onCanvasUp,
                    style: { cursor: 'crosshair', touchAction: 'none' }
                }),
                e('div', { className: 'signature-actions' },
                    e('button', { type: 'button', className: 'button button-secondary', onClick: clearSignature, style: { fontSize: '13px', padding: '8px 16px' } }, '🗑️ Limpiar firma'),
                    signature && e('span', { style: { color: 'var(--accent-green)', fontSize: '13px', alignSelf: 'center' } }, '✓ Firma capturada')
                )
            );
            const barcodeField = () => fld('Codigo de Barras',
                e('div', { style: { display: 'flex', gap: '8px' } },
                    e('input', { type: 'text', className: 'form-input', value: formData.barcode, placeholder: 'Escanea o introduce manualmente', onChange: ev => upd('barcode', ev.target.value), style: { flex: 1 } }),
                    e('button', { type: 'button', className: 'button button-primary', onClick: () => startBarcodeScanner(code => upd('barcode', code)) }, '📷'),
                    e('button', { type: 'button', className: 'button button-secondary', onClick: genBarcode, title: 'Generar código automático' }, '⚡ Gen')
                ), true);

            // ---- RENDER BODY ----
            const renderBody = () => {

                // ENTRADA - NUEVO PRODUCTO
                if (modalType === 'entrada' && !selectedItem) return e('div', null,
                    e('div', { className: 'form-row' }, fld('Nombre del producto', inp('nombre', 'Ej: Laptop Dell XPS 13'), true), fld('Categoria', catSelect(), true)),
                    barcodeField(),
                    e('div', { className: 'form-row' },
                        fld('Stock Inicial', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stock, onChange: ev => upd('stock', ev.target.value) })),
                        fld('Stock Minimo', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stockMinimo, onChange: ev => upd('stockMinimo', ev.target.value) }))
                    ),
                    e('div', { className: 'form-row' },
                        fld('Ubicacion', inp('ubicacion', 'Ej: Estanteria A, Cajon 2')),
                        fld('Estado', e('select', { className: 'form-select', value: formData.estado, onChange: ev => upd('estado', ev.target.value) }, e('option', { value: 'Nuevo' }, 'Nuevo'), e('option', { value: 'Usado' }, 'Usado')))
                    ),
                    fld('Tecnico responsable', techSelect())
                );

                // ENTRADA - AÑADIR STOCK
                if (modalType === 'entrada' && selectedItem) return e('div', null,
                    e('div', { style: { background: 'var(--bg-tertiary)', padding: '16px', borderRadius: '8px', marginBottom: '20px' } },
                        e('div', { style: { fontWeight: '700', fontSize: '18px', marginBottom: '8px' } }, selectedItem.nombre),
                        e('div', { style: { display: 'flex', gap: '24px', flexWrap: 'wrap' } },
                            e('span', null, 'Stock actual: ', e('strong', { style: { color: 'var(--accent-green)' } }, selectedItem.stock + ' uds')),
                            e('span', null, 'Codigo: ', e('strong', { style: { color: 'var(--accent-blue)', fontFamily: 'IBM Plex Mono,monospace' } }, selectedItem.barcode))
                        )
                    ),
                    e('div', { className: 'form-row' },
                        fld('Unidades a anadir', e('input', { type: 'number', min: '1', className: 'form-input', value: formData.cantidad, onChange: ev => upd('cantidad', ev.target.value) }), true),
                        fld('Ticket (opcional)', inp('ticket', 'Ej: INC-123456'))
                    ),
                    fld('Tecnico responsable', techSelect()),
                    e('div', { className: 'stock-result' }, '✓ Stock resultante: ' + (selectedItem.stock + (parseInt(formData.cantidad) || 0)) + ' unidades'),
                    signatureBlock()
                );

                // SALIDA
                if (modalType === 'salida') return e('div', null,
                    e('div', { style: { background: 'var(--bg-tertiary)', padding: '16px', borderRadius: '8px', marginBottom: '20px' } },
                        e('div', { style: { fontWeight: '700', fontSize: '18px', marginBottom: '8px' } }, selectedItem.nombre),
                        e('div', { style: { display: 'flex', gap: '24px', flexWrap: 'wrap' } },
                            e('span', null, 'Stock disponible: ', e('strong', { style: { color: selectedItem.stock > 0 ? 'var(--accent-green)' : 'var(--accent-red)' } }, selectedItem.stock + ' uds')),
                            e('span', null, 'Categoria: ', e('strong', null, selectedItem.categoria))
                        )
                    ),
                    e('div', { className: 'form-row' },
                        fld('Cantidad', e('input', { type: 'number', min: '1', max: String(selectedItem.stock), className: 'form-input', value: formData.cantidad, onChange: ev => upd('cantidad', ev.target.value) }), true),
                        fld('Numero de Ticket', inp('ticket', 'Ej: INC-123456'))
                    ),
                    e('div', { className: 'form-row' },
                        fld('Usuario / Destinatario', inp('usuario', 'Nombre del empleado o destino'), true),
                        fld('Tecnico responsable', techSelect(), true)
                    ),

                );

                if (modalType === 'editar') return e('div', null,
                    e('div', { className: 'form-row' }, fld('Nombre', inp('nombre', 'Nombre del producto'), true), fld('Categoria', catSelect(), true)),
                    fld('Codigo de Barras', inp('barcode', 'Codigo de barras'), true),
                    e('div', { className: 'form-row' },
                        fld('Stock Actual', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stock, onChange: ev => upd('stock', ev.target.value) })),
                        fld('Stock Minimo', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stockMinimo, onChange: ev => upd('stockMinimo', ev.target.value) }))
                    ),
                    e('div', { className: 'form-row' },
                        fld('Ubicacion', inp('ubicacion', 'Ej: Estanteria A')),
                        fld('Estado', e('select', { className: 'form-select', value: formData.estado, onChange: ev => upd('estado', ev.target.value) }, e('option', { value: 'Nuevo' }, 'Nuevo'), e('option', { value: 'Usado' }, 'Usado')))
                    )

                    e('div', { className: 'form-row' }, fld('Nombre', inp('nombre', 'Nombre del producto')), fld('Categoria', catSelect())),

                        e('div', { style: { display: 'flex', gap: '8px' } },

                            e('button', { type: 'button', className: 'button button-primary', onClick: () => startBarcodeScanner(code => upd('barcode', code)) }, '📷'),
                            e('button', { type: 'button', className: 'button button-secondary', onClick: genBarcode }, '⚡ Generar')
                        ), true),
                    e('div', { className: 'form-row' },
                        fld('Stock', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stock, onChange: ev => upd('stock', ev.target.value) })),
                        fld('Stock Minimo', e('input', { type: 'number', min: '0', className: 'form-input', value: formData.stockMinimo, onChange: ev => upd('stockMinimo', ev.target.value) }))
                    ),

                    ),
