    <style>

        .info-banner { padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px; }
        .info-banner.blue { background:rgba(88,166,255,.1); border:1px solid var(--accent-blue); color:var(--accent-blue); }
        .info-banner.orange { background:rgba(249,115,22,.1); border:1px solid var(--accent-orange); color:var(--accent-orange); }
        .info-banner.green { background:rgba(63,185,80,.1); border:1px solid var(--accent-green); color:var(--accent-green); }
        .stock-result { padding:12px 16px; border-radius:8px; background:rgba(63,185,80,.1); border:1px solid var(--accent-green); color:var(--accent-green); font-weight:600; margin-bottom:16px; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="root"></div>
    <script>
    // ==========================================
    // CONFIGURACION GLOBAL
    // ==========================================
    const CONFIG = {
        sharepoint: {
            sitePath: 'sanlucarfruit.sharepoint.com:/sites/InformationSystems',
            lists: {
                inventario: 'StockControl_InventarioIT',
                tecnicos: 'StockControl_TecnicosIT',
                historial: 'StockControl_HistorialIT',
                admins: 'StockControl_Admins',
                asignaciones: 'StockControl_Asignaciones',
                catalogo: 'StockControl_Catalogo',
                ubicaciones: 'StockControl_Ubicaciones',
                activos: 'StockControl_Activos'
            }
        },
        msal: {
            clientId: '80ba264e-e1fc-4749-bf00-2c25b93b4ee5',
            authority: 'https://login.microsoftonline.com/f37778d8-59b2-4e5e-a56b-08eb8ad3c13a',
            redirectUri: window.location.href.split('?')[0].split('#')[0]
        },
        etiquetas: { pais: 'SP' },
        scopes: ['User.Read', 'Sites.ReadWrite.All'],
        version: '2.0.2'
    };

    let msalInstance, graphClient, dataManager;

    // ==========================================
    // CACHE MANAGER
    // ==========================================
    class CacheManager {
        constructor(ttlMinutes = 5) { this.ttl = ttlMinutes * 60 * 1000; this.prefix = 'inv_cache_'; }
        set(key, data) { try { localStorage.setItem(this.prefix + key, JSON.stringify({ data, timestamp: Date.now() })); } catch(e) {} }
        get(key) { try { const item = localStorage.getItem(this.prefix + key); if (!item) return null; const parsed = JSON.parse(item); if (Date.now() - parsed.timestamp > this.ttl) { localStorage.removeItem(this.prefix + key); return null; } return parsed.data; } catch(e) { return null; } }
        clear() { Object.keys(localStorage).filter(k => k.startsWith(this.prefix)).forEach(k => localStorage.removeItem(k)); }
    }
    const cache = new CacheManager(5);

    // ==========================================
    // MICROSOFT GRAPH API CLIENT
    // ==========================================
    class GraphAPIClient {
        constructor(accessToken) { this.accessToken = accessToken; this.baseUrl = 'https://graph.microsoft.com/v1.0'; }
        async request(endpoint, options = {}) {
            const url = this.baseUrl + endpoint;
            const headers = { 'Authorization': 'Bearer ' + this.accessToken, 'Content-Type': 'application/json', ...options.headers };
            try {
                const response = await fetch(url, { ...options, headers });
                if (!response.ok) { const error = await response.json(); throw new Error(error.error?.message || 'HTTP ' + response.status); }
                if (response.status === 204) return null;
                return await response.json();
            } catch(error) { console.error('Graph API Error:', error); throw error; }
        }
        async getListItems(listName) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items?expand=fields&$top=5000';
            const result = await this.request(endpoint);
            return result.value.map(item => ({ ...item.fields, sharePointId: item.id }));
        }
        async createListItem(listName, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items';
            const result = await this.request(endpoint, { method: 'POST', body: JSON.stringify({ fields: data }) });
            return { ...result.fields, sharePointId: result.id };
        }
        async updateListItem(listName, itemId, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId + '/fields';
            await this.request(endpoint, { method: 'PATCH', body: JSON.stringify(data) });
            return true;
        }
        async deleteListItem(listName, itemId) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId;
            await this.request(endpoint, { method: 'DELETE' });
            return true;
        }
        async getCurrentUser() { return await this.request('/me'); }
        async searchUsers(searchTerm) {
            if (!searchTerm || searchTerm.length < 2) return [];
            try {
                const endpoint = "/users?$filter=startswith(displayName,'" + searchTerm + "') or startswith(givenName,'" + searchTerm + "') or startswith(surname,'" + searchTerm + "')&$select=id,displayName,mail,department,jobTitle&$top=10";
                const result = await this.request(endpoint);
                return result.value || [];
            } catch(error) {
                try {
                    const result = await this.request('/users?$search="displayName:' + searchTerm + '"&$select=id,displayName,mail,department,jobTitle&$top=10', { headers: { 'ConsistencyLevel': 'eventual' } });
                    return result.value || [];
                } catch(e) { return []; }
            }
        }
    }

    // ==========================================
    // DATA MANAGER
    // ==========================================
    class DataManager {
        constructor(graphClient) { this.graph = graphClient; }
        async loadAllData() {
            try {
                const [inventario, tecnicos, historial, admins, asignaciones, catalogo, ubicacionesRaw, activosRaw] = await Promise.all([
                    this.graph.getListItems(CONFIG.sharepoint.lists.inventario),
                    this.graph.getListItems(CONFIG.sharepoint.lists.tecnicos),
                    this.graph.getListItems(CONFIG.sharepoint.lists.historial),
                    this.graph.getListItems(CONFIG.sharepoint.lists.admins),
                    this.graph.getListItems(CONFIG.sharepoint.lists.asignaciones).catch(() => []),
                    this.graph.getListItems(CONFIG.sharepoint.lists.catalogo).catch(() => []),
                    this.graph.getListItems(CONFIG.sharepoint.lists.ubicaciones).catch(() => []),
                    this.graph.getListItems(CONFIG.sharepoint.lists.activos).catch(() => [])
                ]);
                // Catálogo: modelos por tipo + metadatos del tipo (LlevaEtiqueta)
                const catalogoProcessed = {};
                const catalogoTipos = {}; // tipo -> { llevaEtiqueta }
                catalogo.forEach(item => {
                    const tipo = item.Title, modelo = item.Modelo;
                    const activo = item.Activo !== 'No' && item.Activo !== false;
                    const llevaEtiqueta = item.LlevaEtiqueta === 'Si';
                    if (!catalogoTipos[tipo]) catalogoTipos[tipo] = { llevaEtiqueta };
                    if (llevaEtiqueta) catalogoTipos[tipo].llevaEtiqueta = true;
                    if (activo && tipo && modelo) {
                        if (!catalogoProcessed[tipo]) catalogoProcessed[tipo] = [];
                        catalogoProcessed[tipo].push(modelo);
                    }
                });
                return {
                    inventory: inventario.map(item => ({ id: item.sharePointId, nombre: item.Nombre || item.Title, categoria: item.Categoria, barcode: item.CodigoBarras, stock: parseInt(item.Stock) || 0, stockMinimo: parseInt(item.StockMinimo) || 0, ubicacion: item.Ubicacion || '', estado: item.Estado || 'Nuevo' })),
                    technicians: tecnicos.map(item => ({ id: item.sharePointId, nombre: item.NombreTecnico || item.Title, codigo: item.CodigoTecnico, email: item.Email, activo: item.Activo === 'Si' || item.Activo === true || item.Activo === 'Yes' })),
                    history: historial.map(item => ({ id: item.sharePointId, fecha: item.FechaHora || item.Created, tipo: item.TipoMovimiento, producto: item.Producto, cantidad: parseInt(item.Cantidad) || 0, ticket: item.Ticket || '', usuario: item.Usuario || '', tecnico: item.Tecnico || '', firma: item.Firma || null })).sort((a,b) => new Date(b.fecha) - new Date(a.fecha)),
                    assignments: asignaciones.map(item => ({ id: item.sharePointId, nombreEmpleado: item.NombreEmpleado, emailEmpleado: item.EmailEmpleado, departamento: item.Departamento, puesto: item.Puesto, fechaIncorporacion: item.FechaIncorporacion, productosAsignados: JSON.parse(item.ProductosAsignados || '[]'), cantidadProductos: parseInt(item.CantidadProductos) || 0, firmaEmpleado: item.FirmaEmpleado, tecnicoResponsable: item.TecnicoResponsable, fechaAsignacion: item.FechaAsignacion, estado: item.Estado, observaciones: item.Observaciones || '', esPrestamo: item.EsPrestamo === 'Si' })).sort((a,b) => new Date(b.fechaAsignacion) - new Date(a.fechaAsignacion)),
                    activos: activosRaw.map(item => ({ id: item.sharePointId, idEtiqueta: item.IDEtiqueta || '', tipo: item.TipoMaterial || '', modelo: item.ModeloMaterial || '', estado: item.EstadoActivo || 'Almacen', ubicacion: item.UbicacionActivo || '', numSerie: item.NumSerie || '', notas: item.Notas || '' })),
                    admins, catalogo: catalogoProcessed, catalogoTipos,
                    ubicaciones: ubicacionesRaw.map(item => ({ id: item.sharePointId, nombre: item.Title, activo: item.Activo === 'Si' || item.Activo === true || item.Activo === 'Yes' })).filter(u => u.activo).sort((a,b) => a.nombre.localeCompare(b.nombre)),
                    ubicacionesAll: ubicacionesRaw.map(item => ({ id: item.sharePointId, nombre: item.Title, activo: item.Activo === 'Si' || item.Activo === true || item.Activo === 'Yes' })),
                    adminsAll: admins.map(item => ({ id: item.sharePointId, email: item.Email, activo: item.Activo === 'Si' || item.Activo === true || item.Activo === 'Yes' }))
                };
            } catch(error) { console.error('Error cargando datos:', error); throw error; }
        }
        async checkBarcodeExists(barcode) {
            try { const items = await this.graph.getListItems(CONFIG.sharepoint.lists.inventario); return items.some(item => item.CodigoBarras === barcode); } catch(e) { return false; }
        }
        async createInventoryItem(data) {
            return await this.graph.createListItem(CONFIG.sharepoint.lists.inventario, { Title: data.nombre, Nombre: data.nombre, Categoria: data.categoria, CodigoBarras: data.barcode, Stock: data.stock, StockMinimo: data.stockMinimo, Ubicacion: data.ubicacion, Estado: data.estado || 'Nuevo' });
        }
        async updateInventoryItem(itemId, data) { await this.graph.updateListItem(CONFIG.sharepoint.lists.inventario, itemId, data); }
        async deleteInventoryItem(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.inventario, itemId); }
        async addToHistory(data) {
            await this.graph.createListItem(CONFIG.sharepoint.lists.historial, { Title: data.tipo + ' - ' + data.producto, TipoMovimiento: data.tipo, Producto: data.producto, Cantidad: data.cantidad, Ticket: data.ticket || '', Usuario: data.usuario || '', Tecnico: data.tecnico || '', FechaHora: new Date().toISOString(), Firma: data.firma || '' });
        }
        // UBICACIONES CRUD
        async createUbicacion(nombre) { return await this.graph.createListItem(CONFIG.sharepoint.lists.ubicaciones, { Title: nombre, Activo: 'Si' }); }
        async toggleUbicacion(itemId, activo) { await this.graph.updateListItem(CONFIG.sharepoint.lists.ubicaciones, itemId, { Activo: activo ? 'No' : 'Si' }); }
        async deleteUbicacion(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.ubicaciones, itemId); }
        // CATALOGO CRUD completo
        async deleteCatalogItem(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.catalogo, itemId); }
        async getCatalogoRaw() {
            const items = await this.graph.getListItems(CONFIG.sharepoint.lists.catalogo);
            return items.map(item => ({ id: item.sharePointId, tipo: item.Title, modelo: item.Modelo, activo: item.Activo !== 'No' && item.Activo !== false, llevaEtiqueta: item.LlevaEtiqueta === 'Si' }));
        }
        async addToCatalog(tipo, modelo) {
            const fields = { Title: tipo, Activo: 'Si' };
            if (modelo && modelo.trim()) fields.Modelo = modelo.trim();
            return await this.graph.createListItem(CONFIG.sharepoint.lists.catalogo, fields);
        }
        async updateCatalogLlevaEtiqueta(itemId, llevaEtiqueta) {
            await this.graph.updateListItem(CONFIG.sharepoint.lists.catalogo, itemId, { LlevaEtiqueta: llevaEtiqueta ? 'Si' : 'No' });
        }
        // ADMINS CRUD
        async createAdmin(email) { return await this.graph.createListItem(CONFIG.sharepoint.lists.admins, { Title: email, Email: email, Activo: 'Si' }); }
        async toggleAdmin(itemId, activo) { await this.graph.updateListItem(CONFIG.sharepoint.lists.admins, itemId, { Activo: activo ? 'No' : 'Si' }); }
        async deleteAdmin(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.admins, itemId); }
        async createTechnician(data) {
            return await this.graph.createListItem(CONFIG.sharepoint.lists.tecnicos, { Title: data.nombre, NombreTecnico: data.nombre, CodigoTecnico: data.codigo, Email: data.email, Activo: 'Si' });
        }
        async toggleTechnicianStatus(itemId, currentStatus) { await this.graph.updateListItem(CONFIG.sharepoint.lists.tecnicos, itemId, { Activo: currentStatus ? 'No' : 'Si' }); }
        async deleteHistoryItem(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.historial, itemId); }
        // ACTIVOS (etiquetas individuales)
        async getNextEtiquetaId() {
            const items = await this.graph.getListItems(CONFIG.sharepoint.lists.activos).catch(() => []);
            const anyo = new Date().getFullYear().toString().slice(-2);
            const pais = CONFIG.etiquetas.pais;
            const prefix = 'SLF-' + pais + '-' + anyo + '-';
            let maxNum = 0;
            items.forEach(item => {
                const id = item.IDEtiqueta || '';
                if (id.startsWith(prefix)) {
                    const num = parseInt(id.replace(prefix, '')) || 0;
                    if (num > maxNum) maxNum = num;
                }
            });
            return prefix + String(maxNum + 1).padStart(5, '0');
        }
        async createActivo(data) {
            return await this.graph.createListItem(CONFIG.sharepoint.lists.activos, {
                Title: data.idEtiqueta,
                IDEtiqueta: data.idEtiqueta,
                TipoMaterial: data.tipo,
                ModeloMaterial: data.modelo,
                EstadoActivo: data.estado || 'Almacen',
                UbicacionActivo: data.ubicacion || '',
                NumSerie: data.numSerie || '',
                Notas: data.notas || ''
            });
        }
        async updateActivoEstado(itemId, estado, ubicacion) {
            await this.graph.updateListItem(CONFIG.sharepoint.lists.activos, itemId, { EstadoActivo: estado, UbicacionActivo: ubicacion || '' });
        }
        async deleteActivo(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.activos, itemId); }
        async createAssignment(data) {
            const titulo = data.esPrestamo ? 'Prestamo - ' + data.nombreEmpleado : 'Asignacion - ' + data.nombreEmpleado + ' - ' + new Date().toLocaleDateString('es-ES');
            const detalleProductos = (data.productosAsignados || []).map((p, i) => (i + 1) + '. ' + p.nombre + ' (Cod: ' + p.barcode + ')').join('\n');
            return await this.graph.createListItem(CONFIG.sharepoint.lists.asignaciones, { Title: titulo, NombreEmpleado: data.nombreEmpleado, EmailEmpleado: data.emailEmpleado, Departamento: data.departamento, Puesto: data.puesto, FechaIncorporacion: data.fechaIncorporacion, ProductosAsignados: JSON.stringify(data.productosAsignados), CantidadProductos: data.productosAsignados.length, FirmaEmpleado: data.firmaEmpleado, TecnicoResponsable: data.tecnicoResponsable, FechaAsignacion: new Date().toISOString(), Estado: 'Activo', Observaciones: data.observaciones || '', EsPrestamo: data.esPrestamo ? 'Si' : 'No', DetalleProductos: detalleProductos, Foto1: data.foto1 || '', Foto2: data.foto2 || '', Foto3: data.foto3 || '' });
        }
        async updateAssignmentStatus(itemId, nuevoEstado) { await this.graph.updateListItem(CONFIG.sharepoint.lists.asignaciones, itemId, { Estado: nuevoEstado }); }
        async deleteAssignment(itemId) { await this.graph.deleteListItem(CONFIG.sharepoint.lists.asignaciones, itemId); }
        async searchUsers(searchTerm) { return await this.graph.searchUsers(searchTerm); }
        async returnMaterial(assignmentId, returnedProducts, allProducts, observaciones, tecnico) {
            const fullyReturned = returnedProducts.length === allProducts.length;
            const newState = fullyReturned ? 'Devuelto' : 'Parcial';
            await this.graph.updateListItem(CONFIG.sharepoint.lists.asignaciones, assignmentId, { Estado: newState, Observaciones: observaciones });
            for (const prod of returnedProducts) {
                const inventoryItem = await this.findProductByBarcode(prod.barcode);
                if (inventoryItem) await this.graph.updateListItem(CONFIG.sharepoint.lists.inventario, inventoryItem.id, { Stock: (inventoryItem.stock || 0) + 1 });
                await this.graph.createListItem(CONFIG.sharepoint.lists.historial, { Title: 'Devolucion - ' + prod.nombre, TipoMovimiento: 'Devolucion', Producto: prod.nombre, Cantidad: 1, Usuario: '', Tecnico: tecnico, FechaHora: new Date().toISOString() });
            }
            return newState;
        }
        async findProductByBarcode(barcode) {
            const items = await this.graph.getListItems(CONFIG.sharepoint.lists.inventario);
            const item = items.find(i => i.CodigoBarras === barcode);
            if (item) return { id: item.sharePointId, nombre: item.Nombre || item.Title, stock: parseInt(item.Stock) || 0, barcode: item.CodigoBarras };
            return null;
        }
    }

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    async function initializeMSAL() {
        try {
            msalInstance = new msal.PublicClientApplication({ auth: CONFIG.msal, cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false } });
            await msalInstance.initialize();
            return true;
        } catch(error) { console.error('Error inicializando MSAL:', error); return false; }
    }
    async function getAccessToken() {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length === 0) return null;
        try { const response = await msalInstance.acquireTokenSilent({ scopes: CONFIG.scopes, account: accounts[0] }); return response.accessToken; } catch(error) { return null; }
    }
    async function login() {
        const response = await msalInstance.loginPopup({ scopes: CONFIG.scopes });
        msalInstance.setActiveAccount(response.account);
        return { name: response.account.name, email: response.account.username, token: response.accessToken };
    }
    async function logout() { try { cache.clear(); await msalInstance.logoutPopup(); } catch(e) {} }
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        const icons = { success: '✓', error: '✕', warning: '⚠' };
        toast.innerHTML = '<span class="icon">' + (icons[type] || '•') + '</span><span class="text">' + message + '</span>';
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'slideIn .3s ease reverse'; setTimeout(() => toast.remove(), 300); }, 4000);
    }
    function exportToCSV(data, filename) {
        if (!data || data.length === 0) { showToast('No hay datos para exportar', 'warning'); return; }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        data.forEach(row => { const values = headers.map(field => { let value = row[field] || ''; if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) value = '"' + value.replace(/"/g, '""') + '"'; return value; }); csvRows.push(values.join(',')); });
        const blob = new Blob(['\ufeff' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename + '_' + new Date().toISOString().split('T')[0] + '.csv';
        link.click();
        showToast('Archivo exportado correctamente', 'success');
    }
    function generateBarcode(code) {
        const canvas = document.createElement('canvas');
        JsBarcode(canvas, code, { format: 'CODE128', width: 2, height: 100, displayValue: true });
        return canvas.toDataURL('image/png');
    }
    function printTechnicianCard(tech) {
        const printWindow = window.open('', '_blank');
        const barcodeImage = generateBarcode(tech.codigo);
        printWindow.document.write('<!DOCTYPE html><html><head><title>Tecnico - ' + tech.nombre + '</title><style>body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f0f0f0}.card{background:white;padding:40px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);text-align:center;max-width:400px}h1{color:#333;margin-bottom:10px;font-size:24px}.codigo{color:#666;font-size:18px;font-weight:bold;margin-bottom:20px}.email{color:#999;font-size:14px;margin-bottom:30px}img{max-width:100%;height:auto}.footer{margin-top:30px;padding-top:20px;border-top:2px solid #eee;color:#999;font-size:12px}@media print{body{background:white}.card{box-shadow:none}}</style></head><body><div class="card"><h1>' + tech.nombre + '</h1><div class="codigo">Codigo: ' + tech.codigo + '</div><div class="email">' + tech.email + '</div><img src="' + barcodeImage + '" alt="Codigo de barras"><div class="footer">Sistema de Inventario IT<br>Escanea este codigo para identificarte</div></div></body></html>');
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 250);
    }
    function exportEtiquetaPDF(activos) {
        if (typeof jspdf === 'undefined' || !jspdf.jsPDF) { showToast('PDF no disponible', 'error'); return; }
        try {
            const doc = new jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: [89, 25] });
            activos.forEach(function(activo, idx) {
                if (idx > 0) doc.addPage([89, 25], 'landscape');
                doc.setFillColor(255, 255, 255);
                doc.rect(0, 0, 89, 25, 'F');
                // Código de barras
                try {
                    const canvas = document.createElement('canvas');
                    JsBarcode(canvas, activo.idEtiqueta, { format: 'CODE128', width: 1.2, height: 30, displayValue: false, margin: 0 });
                    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 1, 1, 30, 10);
                } catch(e) {}
                // ID grande
                doc.setFontSize(8); doc.setFont(undefined, 'bold'); doc.setTextColor(0, 0, 0);
                doc.text(activo.idEtiqueta, 1, 16);
                // Tipo - Modelo
                doc.setFontSize(6.5); doc.setFont(undefined, 'normal');
                doc.text(activo.tipo + (activo.modelo ? ' · ' + activo.modelo : ''), 1, 20.5);
                // N/S si tiene
                if (activo.numSerie) { doc.setFontSize(5.5); doc.setTextColor(80, 80, 80); doc.text('N/S: ' + activo.numSerie, 1, 24); }
                // Logo SLF esquina derecha
                doc.setFontSize(5.5); doc.setTextColor(150, 150, 150);
                doc.text('SLF', 82, 6); doc.text('IT', 83, 10);
            });
            doc.save('Etiquetas_' + new Date().toISOString().split('T')[0] + '.pdf');
            showToast(activos.length + ' etiqueta(s) generada(s)', 'success');
        } catch(e) { console.error(e); showToast('Error generando etiquetas', 'error'); }
    }
    function exportAssignmentToPDF(assignment) {
        if (typeof jspdf === 'undefined' || !jspdf.jsPDF) { showToast('PDF no disponible', 'error'); return; }
        try {
            const doc = new jspdf.jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let y = 20;
            doc.setFontSize(18); doc.setFont(undefined, 'bold');
            doc.text('SANLUCAR FRUIT', pageWidth / 2, y, { align: 'center' }); y += 8;
            doc.setFontSize(12);

    // BARCODE SCANNER

    let html5QrcodeScanner = null, scannerCallback = null, currentScanMode = 'barcode';
    function startBarcodeScanner(callback) {
        if (typeof Html5Qrcode === 'undefined') { showToast('Escaner no disponible', 'error'); return; }
        scannerCallback = callback;
        const modal = document.createElement('div');
        modal.id = 'barcode-scanner-modal';
        modal.className = 'scanner-modal';
        modal.innerHTML = '<div class="scanner-container" onclick="event.stopPropagation()"><div class="scanner-header"><div class="scanner-title">Escaner</div><button class="modal-close" id="scanner-close-btn" type="button">×</button></div><div class="scanner-viewport" id="scanner-viewport"><div id="scanner-reader"></div></div><div class="scanner-info"><div class="scanner-mode-toggle"><button class="mode-button active" data-mode="barcode">Codigo de Barras</button><button class="mode-button" data-mode="qr">Codigo QR</button></div><div class="scanner-instruction" id="scanner-instruction">Enfoca el codigo en la camara</div><div id="scanner-status"></div></div></div>';
        document.body.appendChild(modal);
        const escHandler = e => { if (e.key === 'Escape') stopBarcodeScanner(); };
        document.addEventListener('keydown', escHandler);
        setTimeout(() => { modal.addEventListener('click', e => { if (e.target === modal) stopBarcodeScanner(); }); }, 100);
        setTimeout(() => { const closeBtn = document.getElementById('scanner-close-btn'); if (closeBtn) closeBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); stopBarcodeScanner(); }; }, 100);
        setTimeout(() => {
            document.querySelectorAll('.mode-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentScanMode = btn.dataset.mode;
                    document.querySelectorAll('.mode-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const instr = document.getElementById('scanner-instruction');
                    if (instr) instr.textContent = currentScanMode === 'qr' ? 'Enfoca el codigo QR en la camara' : 'Enfoca el codigo de barras en la camara';
                });
            });
        }, 100);
        setTimeout(() => {
            const html5QrCode = new Html5Qrcode("scanner-reader");
            html5QrcodeScanner = html5QrCode;
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                (decodedText) => {
                    const statusEl = document.getElementById('scanner-status');
                    if (statusEl) statusEl.innerHTML = '<div class="scanner-result">✓ Detectado: ' + decodedText + '</div>';
                    try { new Audio('data:audio/wav;base64,UklGRl9vT1dBVkVmbXQAEAAAAA==').play().catch(() => {}); } catch(e) {}
                    if (navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => { if (scannerCallback) scannerCallback(decodedText); stopBarcodeScanner(); }, 500);
                },
                () => {}
            ).then(() => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-instruction" style="color:var(--accent-green)">Camara lista</div>';
            }).catch(err => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-result scanner-error">Error: ' + err + '</div>';
            });
        }, 200);
    }
    function stopBarcodeScanner() {
        if (html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }).catch(() => { html5QrcodeScanner = null; }); }
        const modal = document.getElementById('barcode-scanner-modal');
        if (modal) modal.remove();
        scannerCallback = null;
    }

    </BarcodeObject>

  </ObjectInfo>
  <ObjectInfo>
    <TextObject>
      <Name>ID</Name>
      <ForeColor Alpha="255" Red="0" Green="0" Blue="0"/>
      <BackColor Alpha="0" Red="255" Green="255" Blue="255"/>
      <LinkedObjectName></LinkedObjectName>

        try {

            const printersXml = await printersResp.text();
            // Extraer primera impresora LabelWriter
            const match = printersXml.match(/<Name>([^<]*LabelWriter[^<]*)<\/Name>/i);
            const printerName = match ? match[1] : '';
            if (!printerName) throw new Error('No se encontró ninguna LabelWriter conectada');

                    canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                }
                setSignature(null);
            };

            useEffect(function() {
                if (canvasRef.current) {
                    const canvas = canvasRef.current;
                    // Solo inicializar dimensiones si no están ya establecidas
                    if (!canvas.width || canvas.width !== (canvas.offsetWidth || 600)) {
                        canvas.width = canvas.offsetWidth || 600;
                        canvas.height = 200;
                    }
                    const opts = { passive: false };
                    canvas.addEventListener('touchstart', onCanvasDownRef.current, opts);
                    canvas.addEventListener('touchmove', onCanvasMoveRef.current, opts);
                    canvas.addEventListener('touchend', onCanvasUpRef.current, opts);
                    return function() {
                        canvas.removeEventListener('touchstart', onCanvasDownRef.current, opts);
                        canvas.removeEventListener('touchmove', onCanvasMoveRef.current, opts);
                        canvas.removeEventListener('touchend', onCanvasUpRef.current, opts);
                    };
                }
            }, []); // [] = solo ejecutar al montar, nunca más

            // Búsqueda AD asignación
            const handleUserSearch = function(query) {
                setUserSearchQuery(query);
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                if (!query || query.length < 2) { setUserSearchResults([]); return; }
                setUserSearchLoading(true);
                searchTimeoutRef.current = setTimeout(async function() {
                    try {
                        const results = await dataManager.searchUsers(query);
                        setUserSearchResults(results);
                    } catch(err) { setUserSearchResults([]); }
                    finally { setUserSearchLoading(false); }
                }, 400);
            };
            const selectUser = function(user) {
                setFormData(function(prev) {
                    return Object.assign({}, prev, { nombreEmpleado: user.displayName || '', emailEmpleado: user.mail || '', departamento: user.department || '', puesto: user.jobTitle || '' });
                });
                setUserSearchQuery(''); setUserSearchResults([]);
            };

            // Búsqueda AD salida
            const handleSalidaSearch = function(query) {
                setSalidaUserQuery(query);
                if (salidaSearchRef.current) clearTimeout(salidaSearchRef.current);
                if (!query || query.length < 2) { setSalidaUserResults([]); return; }
                setSalidaUserLoading(true);
                salidaSearchRef.current = setTimeout(async function() {
                    try {
                        const results = await dataManager.searchUsers(query);
                        setSalidaUserResults(results);
                    } catch(err) { setSalidaUserResults([]); }
                    finally { setSalidaUserLoading(false); }
                }, 400);
            };
            const selectSalidaUser = function(user) {
                setFormData(function(prev) {

                setSalidaUserQuery(''); setSalidaUserResults([]);
            };

            // Añadir producto
            const addProductByBarcode = function(barcode) {
                if (!barcode) return;
                const item = state.inventory.find(function(i) { return i.barcode === barcode; });
                if (!item) { setBarcodeError('Producto no encontrado: ' + barcode); return; }
                if (item.stock <= 0) { setBarcodeError('Sin stock: ' + item.nombre); return; }
                if (selectedProducts.find(function(p) { return p.barcode === barcode; })) { setBarcodeError('Producto ya añadido'); return; }
                setSelectedProducts(function(prev) { return prev.concat([{ nombre: item.nombre, barcode: item.barcode, id: item.id, categoria: item.categoria }]); });
                setBarcodeInput(''); setBarcodeError('');
                showToast('Añadido: ' + item.nombre, 'success');
            };

            const genBarcode = function() {
                const ts = Date.now().toString().slice(-8);
                const rnd = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                upd('barcode', 'SL' + ts + rnd);
            };

            // Guardar catálogo
            const saveTipoNuevo = async function() {
                if (!formData.tipoNuevo.trim()) return;
                setSavingCatalog(true);

                    await dataManager.addToCatalog(formData.tipoNuevo.trim(), '');
                    showToast('Tipo añadido al catálogo', 'success');
                    upd('tipo', formData.tipoNuevo.trim());

                finally { setSavingCatalog(false); }
            };
            const saveModeloNuevo = async function() {
                if (!formData.tipo || !formData.modeloNuevo.trim()) return;
                setSavingCatalog(true);
                try {
                    await dataManager.addToCatalog(formData.tipo, formData.modeloNuevo.trim());

                    upd('modelo', formData.modeloNuevo.trim());
                    upd('modeloNuevo', '');

                finally { setSavingCatalog(false); }

            // Submit
            const handleSubmit = async function() {
                setLoading(true);
                try {
                    const nombreProducto = (formData.tipo && formData.modelo) ? (formData.tipo + ' - ' + formData.modelo) : (formData.tipo || '');

                    if (modalType === 'entrada' && !selectedItem) {
                        if (!formData.tipo || !formData.modelo) { showToast('Selecciona tipo y modelo', 'error'); setLoading(false); return; }

                        const tipoLlevaEtiqueta = formData.tipo ? ((state.catalogoTipos || {})[formData.tipo] || {}).llevaEtiqueta : false;
                        if (tipoLlevaEtiqueta && !formData.numSerie.trim()) { showToast('El número de serie es obligatorio para este tipo de material', 'error'); setLoading(false); return; }

                        // Detectar si ya existe un producto con este tipo+modelo
                        const productoExistente = state.inventory.find(function(item) { return item.nombre === nombreProducto; });
                        if (productoExistente) {
                            // Sumar stock al existente
                            const addCant = parseInt(formData.stock) || 1;

                            await dataManager.updateInventoryItem(productoExistente.id, { Stock: newStock });
                            await dataManager.addToHistory({ tipo: 'Entrada', producto: nombreProducto, cantidad: addCant, ticket: '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                            // Si lleva etiqueta, crear activo igualmente
                            if (tipoLlevaEtiqueta) {
                                const idEtiqueta = await dataManager.getNextEtiquetaId();
                                await dataManager.createActivo({ idEtiqueta, tipo: formData.tipo, modelo: formData.modelo, ubicacion: formData.ubicacion, numSerie: formData.numSerie, notas: '' });
                                showToast('Stock actualizado (' + newStock + ' uds) + Etiqueta: ' + idEtiqueta, 'success');
                                printDymoLabel({ idEtiqueta, tipo: formData.tipo, modelo: formData.modelo, numSerie: formData.numSerie });
                            } else {
                                showToast('Stock actualizado: ' + newStock + ' uds de ' + nombreProducto, 'success');
                            }
                        } else {
                            // Producto nuevo
                            if (!formData.barcode.trim()) { showToast('El código de barras es obligatorio', 'error'); setLoading(false); return; }
                            const exists = await dataManager.checkBarcodeExists(formData.barcode);
                            if (exists) { showToast('El código de barras ya existe', 'error'); setLoading(false); return; }
                            await dataManager.createInventoryItem({ nombre: nombreProducto, categoria: formData.tipo, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });

                                await dataManager.addToHistory({ tipo: 'Entrada', producto: nombreProducto, cantidad: parseInt(formData.stock) || 1, ticket: '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                            }
                            if (tipoLlevaEtiqueta) {
                                const idEtiqueta = await dataManager.getNextEtiquetaId();
                                await dataManager.createActivo({ idEtiqueta, tipo: formData.tipo, modelo: formData.modelo, ubicacion: formData.ubicacion, numSerie: formData.numSerie, notas: '' });
                                showToast('Producto creado + Etiqueta: ' + idEtiqueta, 'success');
                                printDymoLabel({ idEtiqueta, tipo: formData.tipo, modelo: formData.modelo, numSerie: formData.numSerie });
                            } else {
                                showToast('Producto creado: ' + nombreProducto, 'success');
                            }
                        }

                    } else if (modalType === 'entrada' && selectedItem) {
                        const addCant = parseInt(formData.cantidad) || 1;
                        const newStock = selectedItem.stock + addCant;
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: newStock });
                        await dataManager.addToHistory({ tipo: 'Entrada', producto: selectedItem.nombre, cantidad: addCant, ticket: formData.ticket || '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                        showToast('+' + addCant + ' uds → Stock: ' + newStock, 'success');

                    } else if (modalType === 'salida') {
                        const cant = parseInt(formData.cantidad) || 1;
                        if (selectedItem.stock < cant) { showToast('Stock insuficiente (' + selectedItem.stock + ' disponibles)', 'error'); setLoading(false); return; }
                        if (!formData.usuario) { showToast('Selecciona el destinatario', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: selectedItem.stock - cant });
                        await dataManager.addToHistory({ tipo: 'Salida', producto: selectedItem.nombre, cantidad: cant, ticket: formData.ticket || '', usuario: formData.usuario, tecnico: tecnicoActual, firma: signature || '' });
                        showToast('Salida: ' + cant + ' x ' + selectedItem.nombre, 'success');

                    } else if (modalType === 'editar') {
                        if (!formData.tipo || !formData.modelo) { showToast('Selecciona tipo y modelo', 'error'); setLoading(false); return; }
                        if (!formData.ubicacion) { showToast('Selecciona una ubicación', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Title: nombreProducto, Nombre: nombreProducto, Categoria: formData.tipo, CodigoBarras: formData.barcode, Stock: parseInt(formData.stock) || 0, StockMinimo: parseInt(formData.stockMinimo) || 0, Ubicacion: formData.ubicacion, Estado: formData.estado });
                        showToast('Producto actualizado: ' + nombreProducto, 'success');

                    } else if (modalType === 'duplicar') {
                        if (!formData.barcode.trim()) { showToast('Genera un nuevo código', 'error'); setLoading(false); return; }
                        if (!formData.ubicacion) { showToast('Selecciona una ubicación', 'error'); setLoading(false); return; }
                        const dupExists = await dataManager.checkBarcodeExists(formData.barcode);
                        if (dupExists) { showToast('El código ya existe', 'error'); setLoading(false); return; }
                        await dataManager.createInventoryItem({ nombre: nombreProducto, categoria: formData.tipo, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });

                        if (selectedProducts.length === 0) { showToast('Añade al menos un producto', 'error'); setLoading(false); return; }
                        for (var i = 0; i < selectedProducts.length; i++) {
                            const prod = selectedProducts[i];
                            const invItem = state.inventory.find(function(inv) { return inv.id === prod.id; });
                            if (invItem) await dataManager.updateInventoryItem(invItem.id, { Stock: invItem.stock - 1 });
                            await dataManager.addToHistory({ tipo: formData.esPrestamo ? 'Prestamo' : 'Asignacion', producto: prod.nombre, cantidad: 1, ticket: '', usuario: formData.nombreEmpleado, tecnico: tecnicoActual, firma: signature || '' });
                        }
                        await dataManager.createAssignment({ nombreEmpleado: formData.nombreEmpleado, emailEmpleado: formData.emailEmpleado, departamento: formData.departamento, puesto: formData.puesto, fechaIncorporacion: formData.fechaIncorporacion, productosAsignados: selectedProducts, firmaEmpleado: signature || '', tecnicoResponsable: tecnicoActual, observaciones: formData.observaciones, esPrestamo: formData.esPrestamo, foto1: '', foto2: '', foto3: '' });
                        showToast(formData.esPrestamo ? 'Préstamo registrado' : 'Asignación creada', 'success');

                    } else if (modalType === 'devolver-material') {
                        const toReturn = (selectedItem.productosAsignados || []).filter(function(p) { return returnSelections[p.barcode]; });
                        if (toReturn.length === 0) { showToast('Selecciona al menos un producto', 'warning'); setLoading(false); return; }
                        await dataManager.returnMaterial(selectedItem.id, toReturn, selectedItem.productosAsignados || [], formData.observaciones || '', tecnicoActual);
                        showToast('Devolución registrada: ' + toReturn.length + ' producto(s)', 'success');
                    }

                    onClose();
                    await onRefresh();
                } catch(error) {
                    console.error('Error en formulario:', error);
                    showToast('Error: ' + (error.message || 'Error desconocido'), 'error');
                } finally { setLoading(false); }
            };

            // Helpers de render
            const catalogo = state.catalogo || {};
            const tiposDisponibles = Object.keys(catalogo);
            const modelosDisponibles = formData.tipo ? (catalogo[formData.tipo] || []) : [];

            const fld = function(label, input, required) {
                return e('div', { className: 'form-group' },
                    e('label', { className: 'form-label' }, label, required ? e('span', { className: 'required-asterisk' }, ' *') : null),
                    input
                );
            };
            const inp = function(field, placeholder, type) {

                );

            const estadoSelect = function() {

                                state.isAdmin ? e('button', { type: 'button', className: 'button button-secondary', onClick: function() { upd('showAddTipo', !formData.showAddTipo); }, style: { padding: '10px 14px', fontSize: '18px' } }, formData.showAddTipo ? '✕' : '+') : null
                            ),
                            state.isAdmin && formData.showAddTipo ? e('div', { style: { display: 'flex', gap: '8px', marginTop: '8px' } },
                                e('input', { type: 'text', className: 'form-input', placeholder: 'Nombre del nuevo tipo...', value: formData.tipoNuevo, onChange: function(ev) { upd('tipoNuevo', ev.target.value); }, style: { flex: 1 } }),
                                e('button', { type: 'button', className: 'button button-success', onClick: saveTipoNuevo, disabled: savingCatalog || !formData.tipoNuevo.trim(), style: { padding: '10px 16px' } }, savingCatalog ? e('span', { className: 'loading-spinner' }) : '✓ Guardar')
                            ) : null
                        ), true
                    ),
                    formData.tipo ? fld('Modelo',
                        e('div', null,

                                e('select', { className: 'form-select', value: formData.modelo, style: { flex: 1 }, onChange: function(ev) { upd('modelo', ev.target.value); } },
                                    e('option', { value: '' }, '-- Selecciona modelo --'),
                                    modelosDisponibles.map(function(m) { return e('option', { key: m, value: m }, m); })
                                ),
                                state.isAdmin ? e('button', { type: 'button', className: 'button button-secondary', onClick: function() { upd('showAddModelo', !formData.showAddModelo); }, style: { padding: '10px 14px', fontSize: '18px' } }, formData.showAddModelo ? '✕' : '+') : null
                            ),

                                e('input', { type: 'text', className: 'form-input', placeholder: 'Nombre del nuevo modelo...', value: formData.modeloNuevo, onChange: function(ev) { upd('modeloNuevo', ev.target.value); }, style: { flex: 1 } }),

                            ) : null
                        ), true
                    ) : null
                );

            const signatureBlock = function() {
                return e('div', { className: 'signature-container' },

                    e('div', { className: 'signature-actions' },

                    ? available.filter(function(item) { return item.nombre.toLowerCase().includes(prodSearch.toLowerCase()) || item.categoria.toLowerCase().includes(prodSearch.toLowerCase()); })

                const matchTipo = filterTipo === 'all' || a.tipo === filterTipo;

                if (!newForm.tipo || !newForm.modelo || !newForm.ubicacion) { showToast('Tipo, modelo y ubicación son obligatorios', 'error'); return; }

                    for (let i = 0; i < cant; i++) {
                        const idEtiqueta = await dataManager.getNextEtiquetaId();

                                await dataManager.createTechnician({ nombre: selectedTecnico.displayName, codigo, email: selectedTecnico.mail });
                                setSelectedTecnico(null); setTecnicoQuery('');
                            }, 'Técnico creado'),
                            disabled: loading || !selectedTecnico,
                            style: { width: '100%' }
                        }, '+ Crear Técnico')
                    ),
                    state.technicians.length === 0 ? e('div', { style: { color: 'var(--text-secondary)', textAlign: 'center', padding: '20px' } }, 'No hay técnicos') :
                    state.technicians.map(t => e('div', { key: t.id, style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 14px', background: t.activo ? 'var(--bg-primary)' : 'rgba(239,68,68,.05)', borderRadius: '8px', marginBottom: '6px', opacity: t.activo ? 1 : 0.6 } },
                        e('div', { style: { flex: 1 } },
                            e('div', { style: { fontWeight: '600', fontSize: '14px' } }, t.nombre),
                            e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, t.email),
                            e('div', { style: { fontSize: '11px', color: 'var(--accent-blue)', fontFamily: 'IBM Plex Mono,monospace' } }, t.codigo)
                        ),
                        e('button', { className: 'button button-primary', onClick: () => printTechnicianCard(t), style: { padding: '6px 12px', fontSize: '12px' } }, '🖨️'),
                        e('button', { className: 'button ' + (t.activo ? 'button-warning' : 'button-success'), onClick: () => act(() => dataManager.toggleTechnicianStatus(t.id, t.activo), t.activo ? 'Técnico desactivado' : 'Técnico activado'), disabled: loading, style: { padding: '6px 12px', fontSize: '12px' } }, t.activo ? 'Desactivar' : 'Activar')
                    ))
                )
            );

            const renderAdmins = () => card('🛡️ Administradores',
                e('div', null,
                    e('div', { style: { marginBottom: '16px' } },
                        e('div', { className: 'form-label', style: { marginBottom: '8px' } }, 'Nuevo Administrador — buscar en Active Directory'),
                        e('div', { style: { position: 'relative', marginBottom: '8px' } },
                            e('input', {
                                type: 'text', className: 'form-input',
                                placeholder: 'Buscar por nombre en Active Directory...',
                                value: selectedAdmin ? selectedAdmin.displayName : adminQuery,
                                onChange: ev => {
                                    if (selectedAdmin) setSelectedAdmin(null);
                                    setAdminQuery(ev.target.value);
                                    searchAD(ev.target.value, setAdminResults, setAdminSearching, adminSearchRef);
                                }
                            }),
                            selectedAdmin && e('div', { style: { marginTop: '6px', color: 'var(--accent-green)', fontSize: '13px' } }, '✓ ' + selectedAdmin.displayName + ' · ' + selectedAdmin.mail),
                            (adminSearching || adminResults.length > 0) && !selectedAdmin && e('div', { className: 'user-search-dropdown' },
                                adminSearching && e('div', { style: { padding: '12px', color: 'var(--text-secondary)' } }, '⏳ Buscando...'),
                                adminResults.map(u => e('div', { key: u.id, className: 'user-search-item', onClick: () => { setSelectedAdmin(u); setAdminQuery(''); setAdminResults([]); } },
                                    e('div', { style: { fontWeight: '600' } }, u.displayName),
                                    e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, u.mail),
                                    (u.department || u.jobTitle) && e('div', { style: { fontSize: '12px', color: 'var(--accent-blue)' } }, [u.department, u.jobTitle].filter(Boolean).join(' · '))
                                ))
                            )
                        ),
                        e('button', {
                            className: 'button button-success',
                            onClick: () => act(async () => {
                                if (!selectedAdmin) throw new Error('Selecciona un usuario del AD');
                                await dataManager.createAdmin(selectedAdmin.mail);
                                setSelectedAdmin(null); setAdminQuery('');
                            }, 'Admin añadido'),
                            disabled: loading || !selectedAdmin,
                            style: { width: '100%' }
                        }, '+ Añadir Admin')
                    ),
                    e('div', { className: 'info-banner orange', style: { marginBottom: '16px' } }, '⚠️ Ten cuidado al modificar admins. No te elimines a ti mismo.'),
                    state.adminsAll.length === 0 ?
                        e('div', { style: { color: 'var(--text-secondary)', textAlign: 'center', padding: '20px' } }, 'No hay admins') :
                        state.adminsAll.map(a => e('div', { key: a.id, style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 14px', background: a.activo ? 'var(--bg-primary)' : 'rgba(239,68,68,.05)', borderRadius: '8px', marginBottom: '6px', opacity: a.activo ? 1 : 0.6 } },
                            e('span', { style: { flex: 1, fontSize: '14px', fontWeight: '500' } }, a.email),
                            a.email.toLowerCase() === state.user?.email.toLowerCase() && e('span', { style: { fontSize: '11px', color: 'var(--accent-purple)', background: 'rgba(168,85,247,.1)', padding: '2px 8px', borderRadius: '4px' } }, 'Tú'),
                            e('button', { className: 'button ' + (a.activo ? 'button-warning' : 'button-success'), onClick: () => act(() => dataManager.toggleAdmin(a.id, a.activo), a.activo ? 'Admin desactivado' : 'Admin activado'), disabled: loading || a.email.toLowerCase() === state.user?.email.toLowerCase(), style: { padding: '6px 12px', fontSize: '12px' } }, a.activo ? 'Desactivar' : 'Activar'),
                            e('button', { className: 'button button-danger', onClick: () => act(() => dataManager.deleteAdmin(a.id), 'Admin eliminado'), disabled: loading || a.email.toLowerCase() === state.user?.email.toLowerCase(), style: { padding: '6px 10px', fontSize: '12px' } }, '🗑️')
                        ))
                )
            );

            const renderAjustes = () => card('⚙️ Ajustes Globales',
                e('div', null,
                    e('div', { className: 'form-group' },
                        e('label', { className: 'form-label' }, 'Stock Mínimo por Defecto'),
                        e('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
                            e('input', { type: 'number', min: '0', className: 'form-input', value: stockMinimoInput, onChange: ev => setStockMinimoInput(ev.target.value), style: { maxWidth: '120px' } }),
                            e('button', { className: 'button button-success', onClick: () => { const val = parseInt(stockMinimoInput) || 2; localStorage.setItem('stockMinimoDefault', val); onSetStockMinimo(val); showToast('Stock mínimo por defecto: ' + val, 'success'); }, style: { padding: '12px 20px' } }, '✓ Guardar'),
                            e('span', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, 'Se aplica al crear nuevos productos')
                        )
                    )
                )
            );

            return e('div', null,
                e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' } },
                    e('h2', { style: { fontSize: '24px', fontWeight: '700' } }, '🛠️ Panel de Administración')
                ),
                e('div', { style: { display: 'flex', gap: '20px', flexWrap: 'wrap' } },
                    // Sidebar
                    e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px', minWidth: '180px' } },
                        sectionBtn('ubicaciones', 'Ubicaciones', '📍'),
                        sectionBtn('catalogo', 'Catálogo', '📦'),
                        sectionBtn('tecnicos', 'Técnicos', '👤'),
                        sectionBtn('admins', 'Administradores', '🛡️'),
                        sectionBtn('ajustes', 'Ajustes', '⚙️'),
                        sectionBtn('log', 'Log de Acciones', '📋')
                    ),
                    // Content
                    e('div', { style: { flex: 1, minWidth: '300px' } },
                        activeSection === 'ubicaciones' && renderUbicaciones(),
                        activeSection === 'catalogo' && renderCatalogo(),
                        activeSection === 'tecnicos' && renderTecnicos(),
                        activeSection === 'admins' && renderAdmins(),
                        activeSection === 'ajustes' && renderAjustes(),
                        activeSection === 'log' && e('div', { style: { background: 'var(--bg-tertiary)', borderRadius: '12px', border: '1px solid var(--border)', overflow: 'hidden' } },
                            e('div', { style: { padding: '16px 20px', borderBottom: '1px solid var(--border)', fontWeight: '700', fontSize: '16px' } }, '📋 Log de Acciones'),
                            e('div', { style: { padding: '20px' } },
                                e('div', { style: { display: 'flex', gap: '12px', marginBottom: '16px', flexWrap: 'wrap' } },
                                    e('select', { className: 'filter-select', style: { flex: 1 }, defaultValue: 'all', onChange: ev => { window._logTecnico = ev.target.value; } },
                                        e('option', { value: 'all' }, 'Todos los técnicos'),
                                        state.technicians.map(t => e('option', { key: t.id, value: t.nombre }, t.nombre))
                                    ),
                                    e('select', { className: 'filter-select', defaultValue: 'all', onChange: ev => { window._logTipo = ev.target.value; } },
                                        e('option', { value: 'all' }, 'Todos los tipos'),
                                        ['Entrada', 'Salida', 'Asignacion', 'Prestamo', 'Devolucion'].map(t => e('option', { key: t, value: t }, t))
                                    )
                                ),
                                e('div', { style: { maxHeight: '500px', overflowY: 'auto' } },
                                    state.history.slice(0, 100).map(h => e('div', { key: h.id, style: { display: 'flex', gap: '12px', padding: '10px 0', borderBottom: '1px solid var(--border)', alignItems: 'center' } },
                                        e('span', { style: { fontSize: '11px', color: 'var(--text-secondary)', whiteSpace: 'nowrap', minWidth: '120px', fontFamily: 'IBM Plex Mono,monospace' } }, new Date(h.fecha).toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })),
                                        e('span', { className: 'movement-badge ' + h.tipo, style: { minWidth: '80px', textAlign: 'center' } }, h.tipo),
                                        e('span', { style: { flex: 1, fontSize: '13px', fontWeight: '500' } }, h.producto),
                                        e('span', { style: { fontSize: '12px', color: 'var(--accent-green)' } }, h.tecnico || '-'),
                                        h.usuario ? e('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, '→ ' + h.usuario) : null
                                    ))
                                )
                            )
                        )
                    )
                )
            );
        }


        function ConfirmModal({ message, onConfirm, onCancel, loading }) {
            return e('div', { className: 'modal-overlay', onClick: ev => { if (ev.target === ev.currentTarget) onCancel(); } },
                e('div', { className: 'modal', style: { maxWidth: '500px' }, onClick: ev => ev.stopPropagation() },
                    e('div', { className: 'modal-header' }, e('h2', { className: 'modal-title' }, 'Confirmar Accion'), e('button', { className: 'modal-close', onClick: onCancel }, '×')),
                    e('div', { className: 'modal-body' },
                        e('div', { className: 'confirm-modal-icon' }, '⚠️'),
                        e('p', { style: { fontSize: '16px', color: 'var(--text-primary)', marginBottom: '24px', textAlign: 'center' } }, message),
                        e('div', { style: { background: 'rgba(239,68,68,.1)', padding: '12px', borderRadius: '8px', fontSize: '14px', color: 'var(--accent-red)', textAlign: 'center' } }, 'Esta accion es permanente y no se puede deshacer')
                    ),
                    e('div', { className: 'modal-footer' },
                        e('button', { type: 'button', className: 'button button-secondary', onClick: onCancel }, 'Cancelar'),
                        e('button', { className: 'button button-danger', onClick: onConfirm, disabled: loading }, loading ? e('span', { className: 'loading-spinner' }) : null, loading ? ' Eliminando...' : '🗑️ Si, Eliminar')
                    )
                )
            );
        }

        // ---- App ----
        function App() {
            const [state, setState] = useState({ user: null, isAdmin: false, inventory: [], technicians: [], history: [], assignments: [], catalogo: {}, catalogoTipos: {}, activos: [], ubicaciones: [], ubicacionesAll: [], adminsAll: [], activeTab: 'dashboard', loading: true, syncing: false, lastSync: null, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null, stockMinimoDefault: parseInt(localStorage.getItem('stockMinimoDefault') || '2') });

            useEffect(() => { initializeApp(); }, []);

            const initializeApp = async () => {
                try {
                    const msalReady = await initializeMSAL();
                    if (!msalReady) throw new Error('MSAL init failed');
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length === 0) { setState(s => ({ ...s, loading: false })); return; }
                    const token = await getAccessToken();
                    if (!token) { setState(s => ({ ...s, loading: false })); return; }
                    graphClient = new GraphAPIClient(token);
                    dataManager = new DataManager(graphClient);
                    const currentUser = await graphClient.getCurrentUser();
                    const data = await dataManager.loadAllData();
                    const isAdmin = data.admins.some(a => a.Email && a.Email.toLowerCase() === currentUser.mail.toLowerCase() && (a.Activo === true || a.Activo === 'Yes'));
                    setState(s => ({ ...s, user: { name: currentUser.displayName, email: currentUser.mail }, isAdmin, inventory: data.inventory, technicians: data.technicians, history: data.history, assignments: data.assignments, catalogo: data.catalogo || {}, catalogoTipos: data.catalogoTipos || {}, activos: data.activos || [], ubicaciones: data.ubicaciones || [], ubicacionesAll: data.ubicacionesAll || [], adminsAll: data.adminsAll || [], loading: false, syncing: false, lastSync: new Date() }));
                    showToast('Bienvenido, ' + currentUser.displayName, 'success');
                } catch(error) { console.error('Error inicializando app:', error); showToast('Error cargando la aplicacion', 'error'); setState(s => ({ ...s, loading: false })); }
            };

            const handleLogin = async () => { try { await login(); await initializeApp(); } catch(e) { showToast('Error al iniciar sesion', 'error'); } };

            // refreshData: recarga datos SIN toast de bienvenida. Se usa en onRefresh de modales.
            const refreshData = async () => {
                if (!dataManager) return;
                try {
                    const data = await dataManager.loadAllData();
                    setState(s => ({ ...s, inventory: data.inventory, technicians: data.technicians, history: data.history, assignments: data.assignments, catalogo: data.catalogo || {}, catalogoTipos: data.catalogoTipos || {}, activos: data.activos || [], ubicaciones: data.ubicaciones || [], ubicacionesAll: data.ubicacionesAll || [], adminsAll: data.adminsAll || [], lastSync: new Date() }));
                } catch(e) { console.error('Error refreshing:', e); }
            };
            const handleLogout = async () => { await logout(); setState({ user: null, isAdmin: false, inventory: [], technicians: [], history: [], assignments: [], catalogo: {}, catalogoTipos: {}, activos: [], ubicaciones: [], ubicacionesAll: [], adminsAll: [], activeTab: 'dashboard', loading: false, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null, stockMinimoDefault: 2 }); showToast('Sesion cerrada correctamente', 'success'); };

            const syncData = async (showMsg) => {
                if (!dataManager || state.syncing) return;
                setState(s => ({ ...s, syncing: true }));
                try {
                    const data = await dataManager.loadAllData();
                    setState(s => ({ ...s, inventory: data.inventory, technicians: data.technicians, history: data.history, assignments: data.assignments, catalogo: data.catalogo || {}, catalogoTipos: data.catalogoTipos || {}, activos: data.activos || [], ubicaciones: data.ubicaciones || [], ubicacionesAll: data.ubicacionesAll || [], adminsAll: data.adminsAll || [], syncing: false, lastSync: new Date() }));
                    if (showMsg) showToast('Sincronizado correctamente', 'success');
                } catch(e) { setState(s => ({ ...s, syncing: false })); }
            };

            const handleTabChange = async tab => { setState(s => ({ ...s, activeTab: tab })); await syncData(false); };
            const handleOpenModal = (type, item) => { syncData(false); setState(s => ({ ...s, modalType: type, selectedItem: item })); };
            const handleCloseModal = () => setState(s => ({ ...s, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null }));

            const handleConfirmAction = async () => {
                const { confirmAction, selectedItem } = state;
                try {
                    if (confirmAction.type === 'eliminar-producto') { await dataManager.deleteInventoryItem(confirmAction.item.id); showToast('Producto eliminado', 'success'); }
                    else if (confirmAction.type === 'eliminar-historial') { await dataManager.deleteHistoryItem(confirmAction.item.id); showToast('Registro eliminado', 'success'); }
                    else if (confirmAction.type === 'toggle-tecnico') { await dataManager.toggleTechnicianStatus(confirmAction.item.id, confirmAction.item.activo); showToast('Estado actualizado', 'success'); }
                    else if (confirmAction.type === 'eliminar-asignacion') { await dataManager.deleteAssignment(confirmAction.item.id); showToast('Asignacion eliminada', 'success'); }
                    setState(s => ({ ...s, showConfirm: false, confirmAction: null }));
                    const data = await dataManager.loadAllData();
                    setState(s => ({ ...s, inventory: data.inventory, history: data.history, technicians: data.technicians, assignments: data.assignments, catalogo: data.catalogo || {} }));
                } catch(error) { console.error('Error:', error); showToast('Error: ' + error.message, 'error'); }
            };

            useEffect(() => {
                if (!state.modalType) return;
                const confirmTypes = { 'eliminar-producto': 'eliminar-producto', 'eliminar-historial': 'eliminar-historial', 'toggle-tecnico': 'toggle-tecnico', 'eliminar-asignacion': 'eliminar-asignacion' };
                if (confirmTypes[state.modalType]) {
                    setState(s => ({ ...s, showConfirm: true, confirmAction: { type: confirmTypes[s.modalType], item: s.selectedItem }, modalType: null }));
                }
            }, [state.modalType]);

            const getLastSyncText = () => { if (!state.lastSync) return ''; const diff = Math.floor((new Date() - state.lastSync) / 1000); if (diff < 60) return 'Hace un momento'; if (diff < 3600) return 'Hace ' + Math.floor(diff/60) + ' min'; return 'Hace ' + Math.floor(diff/3600) + 'h'; };

            if (state.loading) return e('div', { className: 'global-loading' }, e('div', { className: 'loading-spinner' }), e('p', { className: 'global-loading-text' }, 'Cargando sistema...'));
            if (!state.user) return e(LoginScreen, { onLogin: handleLogin });

            const stats = { totalProductos: state.inventory.length, totalUnidades: state.inventory.reduce((s,i) => s+i.stock, 0), stockBajo: state.inventory.filter(i => i.stock > 0 && i.stock <= i.stockMinimo).length, movimientosHoy: state.history.filter(h => new Date(h.fecha).toDateString() === new Date().toDateString()).length };
            const formModalTypes = ['entrada', 'salida', 'editar', 'tecnico', 'nueva-asignacion', 'nuevo-prestamo', 'ver-asignacion', 'devolver-material', 'duplicar'];

            return e('div', { className: 'app-container' },
                e('header', { className: 'header' },
                    e('div', { className: 'header-left' },
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
                            e('span', { className: 'header-icon' }, '📦'),
                            e('h1', null, 'Sistema de Inventario IT'),
                            e('span', { style: { fontSize: '12px', padding: '4px 8px', background: 'rgba(88,166,255,.15)', color: 'var(--accent-blue)', borderRadius: '6px', fontFamily: 'IBM Plex Mono,monospace', fontWeight: '600' } }, 'v' + CONFIG.version)
                        ),
                        e('div', { className: 'user-badges' }, e('span', { className: 'user-badge ' + (state.isAdmin ? 'admin' : 'technician') }, state.isAdmin ? '🛡️ Admin' : '🔧 Tecnico', ': ', state.user.name))
                    ),
                    e('div', { className: 'header-stats' },
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Productos'), e('div', { className: 'stat-value blue' }, stats.totalProductos)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Unidades'), e('div', { className: 'stat-value green' }, stats.totalUnidades)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Stock Bajo'), e('div', { className: 'stat-value orange' }, stats.stockBajo)),
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: 'var(--bg-tertiary)', borderRadius: '8px' } },
                            state.lastSync && e('span', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, getLastSyncText()),
                            e('button', { onClick: () => syncData(true), disabled: state.syncing, style: { background: state.syncing ? 'var(--bg-secondary)' : 'var(--accent-blue)', border: 'none', color: 'white', padding: '6px 12px', borderRadius: '6px', cursor: state.syncing ? 'wait' : 'pointer', fontSize: '14px', fontWeight: '600' } }, state.syncing ? '⏳ Sync...' : '🔄 Sync')
                        ),
                        e('button', { className: 'button button-secondary', onClick: handleLogout }, 'Salir')
                    )
                ),
                e('nav', { className: 'nav-tabs' },
                    ['dashboard', 'inventario', 'asignaciones', 'historial'].map(tab =>
                        e('button', { key: tab, className: 'tab-button ' + (state.activeTab === tab ? 'active' : ''), onClick: () => handleTabChange(tab) }, { dashboard: '📊 Dashboard', inventario: '📦 Inventario', asignaciones: '📋 Asignaciones', historial: '📜 Historial' }[tab])
                    ),
                    state.isAdmin && e('button', { className: 'tab-button ' + (state.activeTab === 'admin' ? 'active' : ''), onClick: () => handleTabChange('admin'), style: { background: state.activeTab === 'admin' ? 'var(--accent-purple)' : '', borderColor: state.isAdmin ? 'var(--accent-purple)' : '' } }, '🛠️ Admin')
                ),
                e('div', { className: 'content-section' },
                    state.activeTab === 'dashboard' && e(Dashboard, { state }),
                    state.activeTab === 'inventario' && e(InventoryView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal }),
                    state.activeTab === 'asignaciones' && e(AssignmentsView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal }),
                    state.activeTab === 'historial' && e(HistoryView, { state, onRefresh: refreshData, onOpenModal: handleOpenModal }),
                    state.activeTab === 'admin' && state.isAdmin && e(AdminPanel, {
                        state,
                        onRefresh: refreshData,
                        onSetStockMinimo: val => setState(s => ({ ...s, stockMinimoDefault: val }))
                    })
                ),
                state.modalType && !state.showConfirm && formModalTypes.includes(state.modalType) &&
                    e(FormModal, { state, modalType: state.modalType, selectedItem: state.selectedItem, onClose: handleCloseModal, onRefresh: refreshData }),
                state.showConfirm && e(ConfirmModal, {
                    message: state.confirmAction?.type === 'eliminar-producto' ? '¿Eliminar "' + state.selectedItem?.nombre + '"?' :
                             state.confirmAction?.type === 'eliminar-historial' ? '¿Eliminar el registro del ' + new Date(state.selectedItem?.fecha).toLocaleDateString() + '?' :
                             state.confirmAction?.type === 'eliminar-asignacion' ? '¿Eliminar la asignacion de ' + state.selectedItem?.nombreEmpleado + '?' :
                             '¿' + (state.selectedItem?.activo ? 'Desactivar' : 'Activar') + ' a ' + state.selectedItem?.nombre + '?',
                    onConfirm: handleConfirmAction, onCancel: handleCloseModal, loading: false
                })
            );
        }

        ReactDOM.render(e(App), document.getElementById('root'));
    });
    </script>
</body>
</html>
