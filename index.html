    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e14; --bg-secondary: #151a23; --bg-tertiary: #1e252f;
            --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent-green: #3fb950; --accent-blue: #58a6ff; --accent-orange: #f97316;
            --accent-red: #ef4444; --accent-purple: #a855f7; --accent-yellow: #fbbf24;
            --border: #30363d; --shadow: rgba(0,0,0,0.5);
        }
        body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(135deg,var(--bg-primary) 0%,#0d1117 100%); color: var(--text-primary); min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
        .login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; min-height:100dvh; padding:20px; animation:fadeIn .5s ease; }
        .login-box { background:var(--bg-secondary); padding:60px 50px; border-radius:20px; border:1px solid var(--border); box-shadow:0 20px 60px var(--shadow); text-align:center; max-width:500px; width:100%; }
        .login-box h1 { font-size:32px; margin-bottom:16px; }
        .login-icon { font-size:64px; margin-bottom:16px; display:block; animation:bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
        .login-box p { color:var(--text-secondary); margin-bottom:32px; line-height:1.6; }
        .button { padding:14px 28px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s ease; display:inline-flex; align-items:center; gap:8px; justify-content:center; white-space:nowrap; -webkit-tap-highlight-color:transparent; min-height:44px; }
        .button:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px var(--shadow); }
        .button:active:not(:disabled) { transform:translateY(0); opacity:.85; }
        .button:disabled { opacity:.5; cursor:not-allowed; }
        .button-primary { background:var(--accent-blue); color:white; }
        .button-success { background:var(--accent-green); color:white; }
        .button-warning { background:var(--accent-orange); color:white; }
        .button-danger { background:var(--accent-red); color:white; }
        .button-purple { background:var(--accent-purple); color:white; }
        .button-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }

    const PacksManager = {

        getAll() {
            try { return JSON.parse(localStorage.getItem(this.key) || '[]'); } catch(e) { return []; }
        },
        save(packs) {
            try { localStorage.setItem(this.key, JSON.stringify(packs)); } catch(e) {}
        },
        create(pack) {
            const packs = this.getAll();
            packs.push({ id: Date.now().toString(), ...pack });
            this.save(packs);
        },
        update(id, pack) {
            const packs = this.getAll().map(p => p.id === id ? { ...p, ...pack } : p);
            this.save(packs);
        },
        delete(id) {
            this.save(this.getAll().filter(p => p.id !== id));
        }
    };

    // ==========================================
    // CACHE MANAGER
    // ==========================================
    class CacheManager {
        constructor(ttlMinutes = 5) { this.ttl = ttlMinutes * 60 * 1000; this.prefix = 'inv_cache_'; }
        set(key, data) { try { localStorage.setItem(this.prefix + key, JSON.stringify({ data, timestamp: Date.now() })); } catch(e) {} }
        get(key) { try { const item = localStorage.getItem(this.prefix + key); if (!item) return null; const parsed = JSON.parse(item); if (Date.now() - parsed.timestamp > this.ttl) { localStorage.removeItem(this.prefix + key); return null; } return parsed.data; } catch(e) { return null; } }
        clearKey(key) { try { localStorage.removeItem(this.prefix + key); } catch(e) {} }
        clear() { Object.keys(localStorage).filter(k => k.startsWith(this.prefix)).forEach(k => localStorage.removeItem(k)); }
    }
    const cache = new CacheManager(5);

    // ==========================================
    // MICROSOFT GRAPH API CLIENT
    // ==========================================
    class GraphAPIClient {
        constructor(accessToken) { this.accessToken = accessToken; this.baseUrl = 'https://graph.microsoft.com/v1.0'; }
        async request(endpoint, options = {}) {
            const url = this.baseUrl + endpoint;
            const headers = { 'Authorization': 'Bearer ' + this.accessToken, 'Content-Type': 'application/json', ...options.headers };
            try {
                const response = await fetch(url, { ...options, headers });
                if (!response.ok) { const error = await response.json(); throw new Error(error.error?.message || 'HTTP ' + response.status); }
                if (response.status === 204) return null;
                return await response.json();
            } catch(error) { console.error('Graph API Error:', error); throw error; }
        }
        async getListItems(listName, forceRefresh = false) {
            if (!forceRefresh) {
                const cached = cache.get(listName);
                if (cached) return cached;
            }
            let endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items?expand=fields&$top=500';
            let allItems = [];
            // Paginación con @odata.nextLink
            while (endpoint) {
                const result = await this.request(endpoint);
                const page = (result.value || []).map(item => ({ ...item.fields, sharePointId: item.id }));
                allItems = allItems.concat(page);
                const nextLink = result['@odata.nextLink'];
                if (nextLink) {
                    // nextLink es una URL completa, extraer solo el path+query relativo
                    endpoint = nextLink.replace(this.baseUrl, '');
                } else {
                    endpoint = null;
                }
            }
            cache.set(listName, allItems);
            return allItems;
        }
        async createListItem(listName, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items';
            const result = await this.request(endpoint, { method: 'POST', body: JSON.stringify({ fields: data }) });
            cache.clearKey(listName); // Invalida la caché de esta lista
            return { ...result.fields, sharePointId: result.id };
        }
        async updateListItem(listName, itemId, data) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId + '/fields';
            await this.request(endpoint, { method: 'PATCH', body: JSON.stringify(data) });
            cache.clearKey(listName); // Invalida la caché de esta lista
            return true;
        }
        async deleteListItem(listName, itemId) {
            const endpoint = '/sites/' + CONFIG.sharepoint.sitePath + ':/lists/' + listName + '/items/' + itemId;
            await this.request(endpoint, { method: 'DELETE' });
            cache.clearKey(listName); // Invalida la caché de esta lista
            return true;
        }
        async getCurrentUser() { return await this.request('/me'); }
        async searchUsers(searchTerm) {
            if (!searchTerm || searchTerm.length < 2) return [];
            try {
                const endpoint = "/users?$filter=startswith(displayName,'" + searchTerm + "') or startswith(givenName,'" + searchTerm + "') or startswith(surname,'" + searchTerm + "')&$select=id,displayName,mail,department,jobTitle&$top=10";
                const result = await this.request(endpoint);
                return result.value || [];
            } catch(error) {
                try {
                    const result = await this.request('/users?$search="displayName:' + searchTerm + '"&$select=id,displayName,mail,department,jobTitle&$top=10', { headers: { 'ConsistencyLevel': 'eventual' } });
                    return result.value || [];
                } catch(e) { return []; }
            }
        }
    }

                    activos: activosRaw.map(item => ({ id: item.sharePointId, idEtiqueta: item.IDEtiqueta || '', tipo: item.TipoMaterial || '', modelo: item.ModeloMaterial || '', estado: item.EstadoActivo || 'Almacen', ubicacion: item.UbicacionActivo || '', numSerie: item.NumSerie || '', notas: item.Notas || '', sociedad: item.Sociedad || '', asignadoA: item.AsignadoA || '', emailAsignadoA: item.EmailAsignadoA || '', fechaAsignacion: item.FechaAsignacion || null, transitoDestino: item.TransitoDestino || '', motivoIncidencia: item.MotivoIncidencia || '', proveedor: item.Proveedor || '', numAlbaran: item.NumAlbaran || '', fechaCompra: item.FechaCompra || null, fechaGarantia: item.FechaGarantia || null, accesorios: item.Accesorios || '' })),
                    sociedades: sociedadesRaw.map(item => ({ id: item.sharePointId, nombre: item.Title, codigo: (item.Codigo || '').toUpperCase(), pais: item.Pais || '', activo: item.Activo === 'Si' || item.Activo === true || item.Activo === 'Yes' })).sort((a,b) => a.nombre.localeCompare(b.nombre)),

        async returnMaterial(assignmentId, returnedProducts, allProducts, observaciones, tecnico, inventoryData, activosData) {
            const fullyReturned = returnedProducts.length === allProducts.length;
            const newState = fullyReturned ? 'Devuelto' : 'Parcial';
            await this.graph.updateListItem(CONFIG.sharepoint.lists.asignaciones, assignmentId, { Estado: newState, Observaciones: observaciones });
            // Agrupar productos fungibles por barcode para sumar cantidades correctamente
            const fungibleMap = {};
            for (const prod of returnedProducts) {
                if (prod.esEquipo) {
                    // Equipo etiquetado — vuelve a Almacén
                    const activo = (activosData || []).find(a => a.idEtiqueta === prod.idEtiqueta);
                    if (activo) await this.cambiarEstadoActivo(activo.id, 'Almacen', {});
                    await this.addToHistory({ tipo: 'Devolucion', producto: prod.nombre, cantidad: 1, usuario: '', tecnico, idEtiqueta: prod.idEtiqueta || '' });
                } else {
                    // Agrupar fungibles — puede devolver varias unidades del mismo producto
                    const key = prod.barcode || prod.nombre;
                    if (!fungibleMap[key]) fungibleMap[key] = { prod, cantidad: 0 };
                    fungibleMap[key].cantidad += (parseInt(prod.cantidad) || 1);
                }
            }
            // Actualizar stock de fungibles con cantidad real
            for (const key of Object.keys(fungibleMap)) {
                const { prod, cantidad } = fungibleMap[key];
                const inventoryItem = (inventoryData || []).find(i => i.barcode === prod.barcode);
                if (inventoryItem) await this.graph.updateListItem(CONFIG.sharepoint.lists.inventario, inventoryItem.id, { Stock: (inventoryItem.stock || 0) + cantidad });
                await this.addToHistory({ tipo: 'Devolucion', producto: prod.nombre, cantidad, usuario: '', tecnico });
            }
            return newState;
        }
        async findProductByBarcode(barcode) {
            const items = await this.graph.getListItems(CONFIG.sharepoint.lists.inventario, "$filter=fields/CodigoBarras eq '" + barcode + "'");
            const item = items[0];
            if (item) return { id: item.sharePointId, nombre: item.Nombre || item.Title, stock: parseInt(item.Stock) || 0, barcode: item.CodigoBarras };
            return null;
        }
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        const icons = { success: '✓', error: '✕', warning: '⚠' };
        toast.innerHTML = '<span class="icon">' + (icons[type] || '•') + '</span><span class="text">' + message + '</span>';

    function exportToCSV(data, filename) {
        if (!data || data.length === 0) { showToast('No hay datos para exportar', 'warning'); return; }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        data.forEach(row => { const values = headers.map(field => { let value = row[field] || ''; if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) value = '"' + value.replace(/"/g, '""') + '"'; return value; }); csvRows.push(values.join(',')); });
        const blob = new Blob(['\ufeff' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename + '_' + new Date().toISOString().split('T')[0] + '.csv';
        link.click();
        showToast('Archivo exportado correctamente', 'success');
    }

    // jsPDF usa Helvetica que no soporta caracteres latinos extendidos.
    // Esta función normaliza el texto para evitar caracteres corruptos en los PDFs.
    function safePdfText(str) {
        if (!str) return '';
        return String(str)
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '') // elimina diacríticos: á→a, é→e, etc.
            .replace(/[Ññ]/g, function(c) { return c === 'ñ' ? 'n' : 'N'; })
            .replace(/[^\x00-\x7E]/g, '?'); // reemplaza cualquier otro no-ASCII
    }

    // Envía XML a la API REST de DYMO Connect 1.6
    async function sendDymoPrint(labelXml) {
        const body = JSON.stringify({ printerName: DYMO_PRINTER, labelXml, copies: 1 });
        const resp = await fetch(DYMO_URL + '/dcd/api/print-label', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body
        });
        const text = await resp.text();
        let data; try { data = JSON.parse(text); } catch(e) { data = { status: resp.ok }; }
        if (!resp.ok || data.status === false) {
            throw new Error(data.error || text.slice(0, 300));
        }
        return true;
    }

    // LabelNames a probar en orden
    const DYMO_LABEL_FALLBACKS = ['WhiteNameBadgeS0722560'];

    async function printDymoLabel(activo) {
        const detectedName = await detectDymoLabelName();
        const namesToTry = detectedName
            ? [detectedName, ...DYMO_LABEL_FALLBACKS.filter(function(n) { return n !== detectedName; })]
            : DYMO_LABEL_FALLBACKS;
        var lastError = null;
        for (var i = 0; i < namesToTry.length; i++) {
            var labelName = namesToTry[i];
            try {
                console.log('[DYMO] Intentando LabelName:', labelName);
                var labelXml = buildDymoLabelXml(activo, labelName);
                await sendDymoPrint(labelXml);
                console.log('[DYMO] ✅ OK con LabelName:', labelName);
                try { localStorage.setItem('dymo_label_name', labelName); } catch(e) {}
                return true;
            } catch(e) {
                console.warn('[DYMO] ❌ Falló "' + labelName + '":', e.message.slice(0, 150));
                lastError = e;
                var msg = e.message || '';
                if (!msg.includes('not declared') && !msg.includes('Invalid label') &&
                    !msg.includes('LabelName') && !msg.includes('not found') &&
                    !msg.includes('DesktopLabel') && !msg.includes('DYMOLabel')) break;
            }
        }
        throw new Error('No se pudo imprimir. Último error: ' + (lastError ? lastError.message.slice(0, 200) : 'desconocido'));
    }

    // Genera QR como data URL — usa librería embebida, sin CDN
    function generateQRDataUrl(text) {
        return new Promise(function(resolve) {
            try {
                const QRLib = window.QRCode;
                if (QRLib && QRLib.toDataURL) {
                    QRLib.toDataURL(text, { margin: 1, width: 256, color: { dark: '#000000', light: '#FFFFFF' } }, function(err, url) {
                        if (err) { console.error('QR error:', err); resolve(null); }
                        else resolve(url);
                    });
                } else {
                    console.warn('QRCode lib not available');
                    resolve(null);
                }
            } catch(e) {
                console.error('QR exception:', e);
                resolve(null);
            }
        });
    }

    async function exportEtiquetaPDF(activos) {
        if (_dymoprinting) return;
        _dymoprinting = true;
        try {
            // Intenta DYMO directo primero; si falla, fallback a PDF
            if (activos.length === 1) {
                try {
                    await printDymoLabel(activos[0]);
                    showToast('✓ Etiqueta enviada a DYMO LabelWriter 550', 'success');

                } catch(e) {
                    console.error('DYMO directo falló:', e.message, e);
                    showToast('⚠️ DYMO no disponible. Generando PDF...', 'warning');

            }
            // PDF fallback (también para lotes de >1)
            if (typeof jspdf === 'undefined' || !jspdf.jsPDF) { showToast('PDF no disponible', 'error'); return; }

                doc.line(41, 3, 41, H - 3);
                const xT = 44;
                doc.setFontSize(6); doc.setFont(undefined, 'bold'); doc.setTextColor(120, 120, 120);
                doc.text('SANLUCAR FRUIT  ·  IT DEPT', xT, 7);

                doc.text(safePdfText(activo.tipo), xT, 22);

            }
            doc.autoPrint();
            const pdfBlob = doc.output('blob');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            window.open(pdfUrl, '_blank');
            showToast(activos.length + ' etiqueta(s) lista(s) — Ctrl+P para imprimir', 'success');

    // BARCODE SCANNER
    // ==========================================
    let html5QrcodeScanner = null, scannerCallback = null, currentScanMode = 'barcode';
    function startBarcodeScanner(callback) {
        if (typeof Html5Qrcode === 'undefined') { showToast('Escaner no disponible', 'error'); return; }
        scannerCallback = callback;
        const modal = document.createElement('div');
        modal.id = 'barcode-scanner-modal';
        modal.className = 'scanner-modal';
        modal.innerHTML = '<div class="scanner-container" onclick="event.stopPropagation()"><div class="scanner-header"><div class="scanner-title">Escaner</div><button class="modal-close" id="scanner-close-btn" type="button">×</button></div><div class="scanner-viewport" id="scanner-viewport"><div id="scanner-reader"></div></div><div class="scanner-info"><div class="scanner-mode-toggle"><button class="mode-button active" data-mode="barcode">Codigo de Barras</button><button class="mode-button" data-mode="qr">Codigo QR</button></div><div class="scanner-instruction" id="scanner-instruction">Enfoca el codigo en la camara</div><div id="scanner-status"></div></div></div>';
        document.body.appendChild(modal);
        const escHandler = e => { if (e.key === 'Escape') stopBarcodeScanner(); };
        document.addEventListener('keydown', escHandler);
        setTimeout(() => { modal.addEventListener('click', e => { if (e.target === modal) stopBarcodeScanner(); }); }, 100);
        setTimeout(() => { const closeBtn = document.getElementById('scanner-close-btn'); if (closeBtn) closeBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); stopBarcodeScanner(); }; }, 100);
        setTimeout(() => {
            document.querySelectorAll('.mode-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentScanMode = btn.dataset.mode;
                    document.querySelectorAll('.mode-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const instr = document.getElementById('scanner-instruction');
                    if (instr) instr.textContent = currentScanMode === 'qr' ? 'Enfoca el codigo QR en la camara' : 'Enfoca el codigo de barras en la camara';
                });
            });
        }, 100);
        setTimeout(() => {
            const html5QrCode = new Html5Qrcode("scanner-reader");
            html5QrcodeScanner = html5QrCode;
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                (decodedText) => {
                    const statusEl = document.getElementById('scanner-status');
                    if (statusEl) statusEl.innerHTML = '<div class="scanner-result">✓ Detectado: ' + decodedText + '</div>';
                    try { new Audio('data:audio/wav;base64,UklGRl9vT1dBVkVmbXQAEAAAAA==').play().catch(() => {}); } catch(e) {}
                    if (navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => { if (scannerCallback) scannerCallback(decodedText); stopBarcodeScanner(); }, 500);
                },
                () => {}
            ).then(() => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-instruction" style="color:var(--accent-green)">Camara lista</div>';
            }).catch(err => {
                const statusEl = document.getElementById('scanner-status');
                if (statusEl) statusEl.innerHTML = '<div class="scanner-result scanner-error">Error: ' + err + '</div>';
            });
        }, 200);
    }
    function stopBarcodeScanner() {
        if (html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }).catch(() => { html5QrcodeScanner = null; }); }
        const modal = document.getElementById('barcode-scanner-modal');
        if (modal) modal.remove();
        scannerCallback = null;
    }

            if (eq.extraviado > 0)            alertas.push({ tipo:'error',   icon:'🔍', msg: eq.extraviado + ' equipo(s) extraviado(s)',         nav:() => onNavigate('equipos',{ estado:'Extraviado'}) });
            if (eq.transito > 0)              alertas.push({ tipo:'warning', icon:'🚚', msg: eq.transito + ' equipo(s) en tránsito',             nav:() => onNavigate('equipos',{ estado:'Transito'}) });

            // ── Health score ───────────────────────────────────────────────────
            let health = 100;
            health -= inv.sinStock * 10;
            health -= inv.stockBajo * 3;
            health -= eq.extraviado * 15;
            health -= eq.robado * 15;
            health -= prestamosVencidos.length * 5;
            health = Math.max(0, Math.min(100, health));
            const healthColor = health >= 80 ? '#3fb950' : health >= 55 ? '#fbbf24' : '#ef4444';
            const healthLabel = health >= 80 ? T().optimal : health >= 55 ? T().attention : 'Crítico';

            // ── Animated counters ──────────────────────────────────────────────
            React.useEffect(function() {
                if (animDone) return;
                const targets = { equipos: eq.total, asignados: eq.asignado, almacen: eq.almacen, movHoy, unidades: inv.unidades };
                const steps = 45, duration = 1200;
                let step = 0;
                const timer = setInterval(function() {
                    step++;
                    const ease = 1 - Math.pow(1 - step / steps, 3);
                    setCounters({ equipos: Math.round(targets.equipos * ease), asignados: Math.round(targets.asignados * ease), almacen: Math.round(targets.almacen * ease), movHoy: Math.round(targets.movHoy * ease), unidades: Math.round(targets.unidades * ease) });
                    if (step >= steps) { clearInterval(timer); setAnimDone(true); }
                }, duration / steps);
                return function() { clearInterval(timer); };
            }, []);

            // ── Donut ──────────────────────────────────────────────────────────
            const donutSegs = [
                { label:'Almacén',    value: eq.almacen,    color:'#3fb950' },
                { label:'Asignado',   value: eq.asignado,   color:'#58a6ff' },
                { label:'Pendiente',  value: eq.pendiente,  color:'#f97316' },
                { label:'Tránsito',   value: eq.transito,   color:'#fbbf24' },
                { label:'Reparación', value: eq.reparacion, color:'#a855f7' },
                { label:'Extraviado', value: eq.extraviado, color:'#ef4444' },
                { label:'Robado',     value: eq.robado,     color:'#dc2626' },
                { label:'Baja',       value: eq.baja,       color:'#6b7280' },
            ].filter(s => s.value > 0);
            const donutTotal = donutSegs.reduce((s, seg) => s + seg.value, 0) || 1;
            const r = 60, CX = 80, CY = 80, circ = 2 * Math.PI * r;
            let acc = 0;
            const donutPaths = donutSegs.map(seg => {
                const arcLen = (seg.value / donutTotal) * circ;
                const dashArray = arcLen + ' ' + (circ - arcLen);
                const dashOffset = circ * 0.25 - acc;
                acc += arcLen;
                return Object.assign({}, seg, { dashArray, dashOffset });
            });

            // ── 30-day line chart ─────────────────────────────────────────────
            const last30 = [];
            for (var di = 29; di >= 0; di--) {
                var d = new Date(); d.setDate(d.getDate() - di); d.setHours(0,0,0,0);
                var next = new Date(d); next.setDate(next.getDate() + 1);
                var entradas = state.history.filter(h => { var hd = new Date(h.fecha); return hd >= d && hd < next && h.tipo === 'Entrada'; }).length;
                var salidas  = state.history.filter(h => { var hd = new Date(h.fecha); return hd >= d && hd < next && h.tipo === 'Salida'; }).length;
                var total    = state.history.filter(h => { var hd = new Date(h.fecha); return hd >= d && hd < next; }).length;
                last30.push({ d, entradas, salidas, total, label: d.getDate() + '/' + (d.getMonth()+1), isToday: di === 0 });
            }
            const maxLine = Math.max.apply(null, last30.map(d => d.total).concat([1]));
            const lineW = 560, lineH = 90, padL = 6, padR = 6, padT = 8, padB = 4;
            const lx = i => padL + (i / 29) * (lineW - padL - padR);
            const ly = v => padT + (1 - v / maxLine) * (lineH - padT - padB);
            const totalPath = last30.map((d,i) => (i===0?'M':'L') + lx(i).toFixed(1) + ',' + ly(d.total).toFixed(1)).join(' ');
            const entPath   = last30.map((d,i) => (i===0?'M':'L') + lx(i).toFixed(1) + ',' + ly(d.entradas).toFixed(1)).join(' ');
            const salPath   = last30.map((d,i) => (i===0?'M':'L') + lx(i).toFixed(1) + ',' + ly(d.salidas).toFixed(1)).join(' ');
            const areaTotal = totalPath + ' L' + lx(29).toFixed(1) + ',' + lineH + ' L' + padL + ',' + lineH + ' Z';

            // ── Heatmap (últimas 12 semanas por día) ─────────────────────────

                    var date = new Date();
                    var dayOfWeek = date.getDay();
                    var mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                    date.setDate(date.getDate() + mondayOffset - w * 7 + dw);
                    date.setHours(0,0,0,0);
                    var nextD = new Date(date); nextD.setDate(nextD.getDate() + 1);
                    var cnt = state.history.filter(function(h) { var hd = new Date(h.fecha); return hd >= date && hd < nextD; }).length;
                    var isFuture = date > hoy;
                    week.push({ date: new Date(date), cnt, isFuture, label: date.getDate() + '/' + (date.getMonth()+1) });
                }
                heatData.push(week);
            }
            const heatMax = Math.max.apply(null, heatData.flat().map(d => d.cnt).concat([1]));
            const heatColor = function(cnt, isFuture) {

                if (intensity < 0.75) return '#26a047';

                var d7 = new Date(); d7.setDate(d7.getDate() - di7); d7.setHours(0,0,0,0);
                var next7 = new Date(d7); next7.setDate(next7.getDate() + 1);
                var cnt7 = state.history.filter(function(h) { var hd = new Date(h.fecha); return hd >= d7 && hd < next7; }).length;
                last7.push({ label: di7 === 0 ? 'Hoy' : ['D','L','M','X','J','V','S'][d7.getDay()], count: cnt7, isToday: di7 === 0 });
            }
            const maxDay = Math.max.apply(null, last7.map(d => d.count).concat([1]));

            const maxTech = Math.max.apply(null, techAct.map(t => t.count).concat([1]));

                    onMouseEnter: onClick ? ev => { ev.currentTarget.style.transform='translateY(-4px)'; ev.currentTarget.style.boxShadow='0 16px 40px '+color+'22'; ev.currentTarget.style.borderColor=color+'88'; } : null,

                },

                    e('div', { style:{ fontSize:'26px', marginBottom:'6px' } }, icon),

                ),

                // ── Línea 30 días + Donut ─────────────────────────────────────
                e('div', { style:{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:'18px' } },

                    // Gráfico línea 30 días
                    card(e('div', null,
                        cardTitle('📈 Actividad — Últimos 30 días', { fn: () => onNavigate('historial', {}), label: 'Ver historial →' }),

                            e('svg', { width:'100%', viewBox:'0 0 ' + lineW + ' ' + lineH, preserveAspectRatio:'none', style:{ display:'block', overflow:'visible' } },
                                e('defs', null,
                                    e('linearGradient', { id:'gradTotal', x1:'0', y1:'0', x2:'0', y2:'1' },
                                        e('stop', { offset:'0%',   stopColor:'#58a6ff', stopOpacity:'0.3' }),
                                        e('stop', { offset:'100%', stopColor:'#58a6ff', stopOpacity:'0.02' })

                                ),

                                e('div', { style:{ color:'#58a6ff' } }, '📊 Total: ' + last30[hoveredLine].total),
                                e('div', { style:{ color:'#3fb950' } }, '↑ Entradas: ' + last30[hoveredLine].entradas),
                                e('div', { style:{ color:'#ef4444' } }, '↓ Salidas: ' + last30[hoveredLine].salidas)
                            )
                        ),
                        e('div', { style:{ display:'flex', gap:'16px', marginTop:'12px', paddingTop:'12px', borderTop:'1px solid var(--border)' } },
                            [['#58a6ff','Total'], ['#3fb950','Entradas'], ['#ef4444','Salidas']].map(function(item, i) {
                                return e('div', { key:i, style:{ display:'flex', alignItems:'center', gap:'6px' } },
                                    e('div', { style:{ width:'16px', height:'2px', background:item[0], borderRadius:'1px' } }),

                    card(e('div', null,

                                        });

                                    hoveredSeg !== null && donutPaths[hoveredSeg] ?
                                        e('div', null,
                                            e('div', { style:{ fontSize:'22px', fontWeight:'800', fontFamily:'IBM Plex Mono,monospace', color:donutPaths[hoveredSeg].color, lineHeight:1 } }, donutPaths[hoveredSeg].value),
                                            e('div', { style:{ fontSize:'9px', color:'var(--text-secondary)', fontWeight:'700', marginTop:'2px' } }, donutPaths[hoveredSeg].label.toUpperCase())

                                            e('div', { style:{ fontSize:'26px', fontWeight:'800', fontFamily:'IBM Plex Mono,monospace', color:'var(--text-primary)', lineHeight:1 } }, eq.total),
                                            e('div', { style:{ fontSize:'9px', color:'var(--text-secondary)', fontWeight:'700', marginTop:'2px' } }, 'TOTAL')

                                donutPaths.map(function(seg, i) {
                                    return e('div', { key:i, style:{ display:'flex', alignItems:'center', gap:'8px', cursor:'pointer', padding:'3px 6px', borderRadius:'6px', background: hoveredSeg===i ? seg.color+'18' : 'transparent', transition:'background .15s' },
                                        onMouseEnter: () => setHoveredSeg(i), onMouseLeave: () => setHoveredSeg(null) },

                ),

                // ── Heatmap + Alertas + Garantías ─────────────────────────────
                e('div', { style:{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr', gap:'18px' } },

                    card(e('div', null,
                        cardTitle('🔥 Mapa de Actividad — Últimas 12 Semanas'),
                        e('div', { style:{ overflowX:'auto' } },
                            e('div', { style:{ display:'flex', gap:'4px', marginBottom:'6px', paddingLeft:'24px' } },
                                heatDays.map(function(d, i) {

                                        e('div', { style:{ width:'20px', fontSize:'9px', color:'var(--text-secondary)', textAlign:'right', flexShrink:0 } },
                                            wi === 0 ? week[0].date.getDate()+'/'+(week[0].date.getMonth()+1) : wi % 3 === 0 ? week[0].date.getDate()+'/'+(week[0].date.getMonth()+1) : ''
                                        ),

                                                onMouseEnter: () => setHoveredDay({ wi, di, day }),

                                e('span', { style:{ fontSize:'10px', color:'var(--text-secondary)' } }, 'Menos'),

            // Canvas
            const getCanvasPos = function(ev) {
                const canvas = canvasRef.current;
                if (!canvas) return { x: 0, y: 0 };
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width;
                const sy = canvas.height / rect.height;
                const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
                const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
                return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
            };

            const onCanvasDownRef = useRef(function(ev) {

                ctx.beginPath();

            const selectUser = function(user) {
                setFormData(function(prev) {
                    return Object.assign({}, prev, { nombreEmpleado: user.displayName || '', emailEmpleado: user.mail || '', departamento: user.department || '', puesto: user.jobTitle || '' });
                });
                setUserSearchQuery(''); setUserSearchResults([]);
            };

            // Búsqueda AD salida
            const handleSalidaSearch = function(query) {
                setSalidaUserQuery(query);
                if (salidaSearchRef.current) clearTimeout(salidaSearchRef.current);
                if (!query || query.length < 2) { setSalidaUserResults([]); return; }
                setSalidaUserLoading(true);
                salidaSearchRef.current = setTimeout(async function() {
                    try {
                        const results = await dataManager.searchUsers(query);
                        setSalidaUserResults(results);
                    } catch(err) { setSalidaUserResults([]); }
                    finally { setSalidaUserLoading(false); }
                }, 400);
            };
            const selectSalidaUser = function(user) {
                setFormData(function(prev) {
                    return Object.assign({}, prev, { usuario: user.displayName || '', emailUsuario: user.mail || '' });
                });
                setSalidaUserQuery(''); setSalidaUserResults([]);
            };

            // Añadir producto
            const addProductByBarcode = function(barcode) {
                if (!barcode) return;
                const item = state.inventory.find(function(i) { return i.barcode === barcode; });
                if (!item) { setBarcodeError('Producto no encontrado: ' + barcode); return; }
                if (item.stock <= 0) { setBarcodeError('Sin stock: ' + item.nombre); return; }
                if (selectedProducts.find(function(p) { return p.barcode === barcode; })) { setBarcodeError('Producto ya añadido'); return; }
                setSelectedProducts(function(prev) { return prev.concat([{ nombre: item.nombre, barcode: item.barcode, id: item.id, categoria: item.categoria }]); });
                setBarcodeInput(''); setBarcodeError('');
                showToast('Añadido: ' + item.nombre, 'success');
            };

            const genBarcode = function() {
                // crypto.randomUUID garantiza unicidad sin colisiones entre dispositivos simultáneos
                const unique = crypto.randomUUID().replace(/-/g, '').toUpperCase().slice(0, 10);
                upd('barcode', 'SL' + unique);
            };

            // Guardar catálogo
            const saveTipoNuevo = async function() {
                if (!formData.tipoNuevo.trim()) return;
                setSavingCatalog(true);
                try {
                    await dataManager.addToCatalog(formData.tipoNuevo.trim(), '');
                    showToast('Tipo añadido al catálogo', 'success');
                    upd('tipo', formData.tipoNuevo.trim());
                    upd('tipoNuevo', '');
                    upd('showAddTipo', false);
                    await onRefresh();
                } catch(err) { showToast('Error guardando tipo', 'error'); }
                finally { setSavingCatalog(false); }
            };
            const saveModeloNuevo = async function() {
                if (!formData.tipo || !formData.modeloNuevo.trim()) return;
                setSavingCatalog(true);
                try {
                    await dataManager.addToCatalog(formData.tipo, formData.modeloNuevo.trim());
                    showToast('Modelo añadido', 'success');
                    upd('modelo', formData.modeloNuevo.trim());
                    upd('modeloNuevo', '');
                    upd('showAddModelo', false);
                    await onRefresh();
                } catch(err) { showToast('Error guardando modelo', 'error'); }
                finally { setSavingCatalog(false); }
            };

            // Submit
            const handleSubmit = async function() {
                setLoading(true);
                try {
                    const nombreProducto = (formData.tipo && formData.modelo) ? (formData.tipo + ' - ' + formData.modelo) : (formData.tipo || '');

                    if (modalType === 'entrada' && !selectedItem) {
                        if (!formData.tipo || !formData.modelo) { showToast('Selecciona tipo y modelo', 'error'); setLoading(false); return; }
                        if (!formData.ubicacion) { showToast('Selecciona una ubicación', 'error'); setLoading(false); return; }
                        // Detectar si ya existe un producto con este tipo+modelo
                        const productoExistente = state.inventory.find(function(item) { return item.nombre === nombreProducto; });
                        if (productoExistente) {
                            const addCant = parseInt(formData.stock) || 1;
                            const newStock = productoExistente.stock + addCant;
                            await dataManager.updateInventoryItem(productoExistente.id, { Stock: newStock });
                            await dataManager.addToHistory({ tipo: 'Entrada', producto: nombreProducto, cantidad: addCant, ticket: '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                            showToast('Stock actualizado: ' + newStock + ' uds de ' + nombreProducto, 'success');
                        } else {
                            if (!formData.barcode.trim()) { showToast('El código de barras es obligatorio', 'error'); setLoading(false); return; }
                            const exists = await dataManager.checkBarcodeExists(formData.barcode);
                            if (exists) { showToast('El código de barras ya existe', 'error'); setLoading(false); return; }
                            await dataManager.createInventoryItem({ nombre: nombreProducto, categoria: formData.tipo, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });
                            if (parseInt(formData.stock) > 0) {
                                await dataManager.addToHistory({ tipo: 'Entrada', producto: nombreProducto, cantidad: parseInt(formData.stock) || 1, ticket: '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                            }
                            showToast('Producto creado: ' + nombreProducto, 'success');
                        }

                    } else if (modalType === 'entrada' && selectedItem) {
                        const addCant = parseInt(formData.cantidad) || 1;
                        const newStock = selectedItem.stock + addCant;
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: newStock });
                        await dataManager.addToHistory({ tipo: 'Entrada', producto: selectedItem.nombre, cantidad: addCant, ticket: formData.ticket || '', usuario: '', tecnico: tecnicoActual, firma: signature || '' });
                        showToast('+' + addCant + ' uds → Stock: ' + newStock, 'success');

                    } else if (modalType === 'salida') {
                        const cant = parseInt(formData.cantidad) || 1;
                        if (selectedItem.stock < cant) { showToast('Stock insuficiente (' + selectedItem.stock + ' disponibles)', 'error'); setLoading(false); return; }
                        if (!formData.usuario) { showToast('Selecciona el destinatario', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Stock: selectedItem.stock - cant });
                        await dataManager.addToHistory({ tipo: 'Salida', producto: selectedItem.nombre, cantidad: cant, ticket: formData.ticket || '', usuario: formData.usuario, tecnico: tecnicoActual, firma: signature || '' });
                        showToast('Salida: ' + cant + ' x ' + selectedItem.nombre, 'success');

                    } else if (modalType === 'editar') {
                        if (!formData.tipo || !formData.modelo) { showToast('Selecciona tipo y modelo', 'error'); setLoading(false); return; }
                        if (!formData.ubicacion) { showToast('Selecciona una ubicación', 'error'); setLoading(false); return; }
                        await dataManager.updateInventoryItem(selectedItem.id, { Title: nombreProducto, Nombre: nombreProducto, Categoria: formData.tipo, CodigoBarras: formData.barcode, Stock: parseInt(formData.stock) || 0, StockMinimo: parseInt(formData.stockMinimo) || 0, Ubicacion: formData.ubicacion, Estado: formData.estado });
                        showToast('Producto actualizado: ' + nombreProducto, 'success');

                    } else if (modalType === 'duplicar') {
                        if (!formData.barcode.trim()) { showToast('Genera un nuevo código', 'error'); setLoading(false); return; }
                        if (!formData.ubicacion) { showToast('Selecciona una ubicación', 'error'); setLoading(false); return; }
                        const dupExists = await dataManager.checkBarcodeExists(formData.barcode);
                        if (dupExists) { showToast('El código ya existe', 'error'); setLoading(false); return; }
                        await dataManager.createInventoryItem({ nombre: nombreProducto, categoria: formData.tipo, barcode: formData.barcode, stock: parseInt(formData.stock) || 0, stockMinimo: parseInt(formData.stockMinimo) || 0, ubicacion: formData.ubicacion, estado: formData.estado });
                        showToast('Producto duplicado correctamente', 'success');

                    } else if (modalType === 'tecnico') {
                        if (!formData.nombreTecnico.trim() || !formData.emailTecnico.trim()) { showToast('Nombre y email son obligatorios', 'error'); setLoading(false); return; }
                        const codigo = 'TEC' + Date.now().toString().slice(-6);
                        await dataManager.createTechnician({ nombre: formData.nombreTecnico, codigo: codigo, email: formData.emailTecnico });
                        showToast('Técnico creado. Código: ' + codigo, 'success');

                    } else if (modalType === 'nueva-asignacion' || modalType === 'nuevo-prestamo') {
                        if (!formData.nombreEmpleado.trim()) { showToast('Selecciona un empleado', 'error'); setLoading(false); return; }
                        const totalItems = selectedProducts.length + selectedEquipos.length;
                        if (totalItems === 0) { showToast('Añade al menos un producto o equipo', 'error'); setLoading(false); return; }
                        const pendientes = selectedEquipos.filter(function(eq) { return eq.pendienteEscaneo; });
                        if (pendientes.length > 0) { showToast('Faltan ' + pendientes.length + ' equipo(s) por escanear', 'error'); setLoading(false); return; }
                        // Material fungible — descuenta stock
                        for (var i = 0; i < selectedProducts.length; i++) {
                            const prod = selectedProducts[i];
                            const invItem = state.inventory.find(function(inv) { return inv.id === prod.id; });
                            if (invItem) await dataManager.updateInventoryItem(invItem.id, { Stock: invItem.stock - 1 });
                            await dataManager.addToHistory({ tipo: formData.esPrestamo ? 'Prestamo' : 'Asignacion', producto: prod.nombre, cantidad: 1, ticket: '', usuario: formData.nombreEmpleado, tecnico: tecnicoActual, firma: signature || '' });
                        }
                        // Equipos etiquetados — cambia estado a Asignado
                        for (var j = 0; j < selectedEquipos.length; j++) {
                            const eq = selectedEquipos[j];
                            await dataManager.cambiarEstadoActivo(eq.id, 'Asignado', { asignadoA: formData.nombreEmpleado, emailAsignadoA: formData.emailEmpleado, fechaAsignacion: new Date().toISOString() });
                            await dataManager.addToHistory({ tipo: formData.esPrestamo ? 'Prestamo' : 'Asignacion', producto: eq.nombre, cantidad: 1, ticket: '', usuario: formData.nombreEmpleado, tecnico: tecnicoActual, firma: signature || '', idEtiqueta: eq.idEtiqueta });
                        }
                        // Crea la asignación con todos los items
                        const equiposParaAsignacion = selectedEquipos.map(function(eq) { return { nombre: eq.nombre, idEtiqueta: eq.idEtiqueta, esEquipo: true }; });
                        await dataManager.createAssignment({ nombreEmpleado: formData.nombreEmpleado, emailEmpleado: formData.emailEmpleado, departamento: formData.departamento, puesto: formData.puesto, fechaIncorporacion: formData.fechaIncorporacion, productosAsignados: selectedProducts, equiposAsignados: equiposParaAsignacion, firmaEmpleado: signature || '', tecnicoResponsable: tecnicoActual, observaciones: formData.observaciones, esPrestamo: formData.esPrestamo });
                        showToast(formData.esPrestamo ? 'Préstamo registrado' : 'Asignación creada', 'success');

                    } else if (modalType === 'devolver-material') {
                        const toReturn = (selectedItem.productosAsignados || []).filter(function(p) { return returnSelections[p.barcode || p.idEtiqueta]; });
                        if (toReturn.length === 0) { showToast('Selecciona al menos un producto', 'warning'); setLoading(false); return; }
                        await dataManager.returnMaterial(selectedItem.id, toReturn, selectedItem.productosAsignados || [], formData.observaciones || '', tecnicoActual, state.inventory, state.activos);
                        showToast('Devolución registrada: ' + toReturn.length + ' producto(s)', 'success');

                    } else if (modalType === 'baja-empleado') {
                        if (!bajaSelected) { showToast('Selecciona un empleado', 'error'); setLoading(false); return; }
                        const asignacionesActivas = (state.assignments || []).filter(function(a) { return a.emailEmpleado.toLowerCase() === bajaSelected.emailEmpleado.toLowerCase() && a.estado === 'Activo'; });
                        const todosItemsSubmit = asignacionesActivas.flatMap(function(a) { return (a.productosAsignados || []).map(function(p) { return Object.assign({}, p, { asignacionId: a.id, asignacion: a }); }); });
                        const toReturn = todosItemsSubmit.filter(function(p) { return bajaSelections[p.barcode || p.idEtiqueta]; });
                        if (todosItemsSubmit.length > 0 && toReturn.length === 0) { showToast('Selecciona al menos un item', 'warning'); setLoading(false); return; }
                        for (const asig of asignacionesActivas) {
                            const itemsDeAsig = toReturn.filter(function(p) { return p.asignacionId === asig.id; });
                            if (itemsDeAsig.length > 0) {
                                await dataManager.returnMaterial(asig.id, itemsDeAsig, asig.productosAsignados || [], formData.observaciones || ('Baja: ' + bajaSelected.nombreEmpleado), tecnicoActual, state.inventory, state.activos);
                            } else if (itemsDeAsig.length === 0 && todosItemsSubmit.filter(function(p){return p.asignacionId===asig.id;}).length === 0) {
                                await dataManager.updateAssignmentStatus(asig.id, 'Devuelto');
                            }
                        }
                        showToast('Baja procesada: ' + toReturn.length + ' item(s) devuelto(s)', 'success');
                    }

                    onClose();
                    await onRefresh();
                } catch(error) {
                    console.error('Error en formulario:', error);
                    showToast('Error: ' + (error.message || 'Error desconocido'), 'error');
                } finally { setLoading(false); }
            };

            // Helpers de render
            const catalogo = state.catalogo || {};
            const tiposDisponibles = Object.keys(catalogo);
            const modelosDisponibles = formData.tipo ? (catalogo[formData.tipo] || []) : [];

            const fld = function(label, input, required) {
                return e('div', { className: 'form-group' },
                    e('label', { className: 'form-label' }, label, required ? e('span', { className: 'required-asterisk' }, ' *') : null),
                    input
                );
            };
            const inp = function(field, placeholder, type) {
                return e('input', { type: type || 'text', className: 'form-input', value: formData[field], placeholder: placeholder || '', onChange: function(ev) { upd(field, ev.target.value); } });
            };
            const ubicacionSelect = function() {
                return e('select', { className: 'form-select', value: formData.ubicacion, onChange: function(ev) { upd('ubicacion', ev.target.value); } },
                    e('option', { value: '' }, '-- Selecciona ubicacion --'),
                    (state.ubicaciones || []).map(function(u) { return e('option', { key: u.id, value: u.nombre }, u.nombre); })
                );
            };
            const estadoSelect = function() {
                return e('select', { className: 'form-select', value: formData.estado, onChange: function(ev) { upd('estado', ev.target.value); } },
                    e('option', { value: 'Nuevo' }, 'Nuevo'),
                    e('option', { value: 'Usado' }, 'Usado')
                );
            };
            const tipoModeloFields = function() {
                return e('div', null,
                    fld('Tipo de Material',
                        e('div', null,
                            e('div', { style: { display: 'flex', gap: '8px' } },
                                e('select', { className: 'form-select', value: formData.tipo, style: { flex: 1 }, onChange: function(ev) { upd('tipo', ev.target.value); upd('modelo', ''); upd('showAddModelo', false); } },
                                    e('option', { value: '' }, '-- Selecciona tipo --'),
                                    tiposDisponibles.map(function(t) { return e('option', { key: t, value: t }, t); })
                                ),
                                state.isAdmin ? e('button', { type: 'button', className: 'button button-secondary', onClick: function() { upd('showAddTipo', !formData.showAddTipo); }, style: { padding: '10px 14px', fontSize: '18px' } }, formData.showAddTipo ? '✕' : '+') : null
                            ),
                            state.isAdmin && formData.showAddTipo ? e('div', { style: { display: 'flex', gap: '8px', marginTop: '8px' } },
                                e('input', { type: 'text', className: 'form-input', placeholder: 'Nombre del nuevo tipo...', value: formData.tipoNuevo, onChange: function(ev) { upd('tipoNuevo', ev.target.value); }, style: { flex: 1 } }),
                                e('button', { type: 'button', className: 'button button-success', onClick: saveTipoNuevo, disabled: savingCatalog || !formData.tipoNuevo.trim(), style: { padding: '10px 16px' } }, savingCatalog ? e('span', { className: 'loading-spinner' }) : '✓ Guardar')
                            ) : null
                        ), true
                    ),
                    formData.tipo ? fld('Modelo',
                        e('div', null,
                            e('div', { style: { display: 'flex', gap: '8px' } },
                                e('select', { className: 'form-select', value: formData.modelo, style: { flex: 1 }, onChange: function(ev) { upd('modelo', ev.target.value); } },
                                    e('option', { value: '' }, '-- Selecciona modelo --'),
                                    modelosDisponibles.map(function(m) { return e('option', { key: m, value: m }, m); })
                                ),
                                state.isAdmin ? e('button', { type: 'button', className: 'button button-secondary', onClick: function() { upd('showAddModelo', !formData.showAddModelo); }, style: { padding: '10px 14px', fontSize: '18px' } }, formData.showAddModelo ? '✕' : '+') : null
                            ),
                            state.isAdmin && formData.showAddModelo ? e('div', { style: { display: 'flex', gap: '8px', marginTop: '8px' } },
                                e('input', { type: 'text', className: 'form-input', placeholder: 'Nombre del nuevo modelo...', value: formData.modeloNuevo, onChange: function(ev) { upd('modeloNuevo', ev.target.value); }, style: { flex: 1 } }),
                                e('button', { type: 'button', className: 'button button-success', onClick: saveModeloNuevo, disabled: savingCatalog || !formData.modeloNuevo.trim(), style: { padding: '10px 16px' } }, savingCatalog ? e('span', { className: 'loading-spinner' }) : '✓ Guardar')
                            ) : null
                        ), true
                    ) : null
                );
            };
            const signatureBlock = function() {
                return e('div', { className: 'signature-container' },
                    e('div', { className: 'signature-label' }, '✍️ Firma'),
                    e('canvas', { ref: canvasRef, className: 'signature-canvas', onMouseDown: onCanvasDown, onMouseMove: onCanvasMove, onMouseUp: onCanvasUp, onMouseLeave: onCanvasUp, style: { cursor: 'crosshair', touchAction: 'none', userSelect: 'none', WebkitUserSelect: 'none' } }),
                    e('div', { className: 'signature-actions' },
                        e('button', { type: 'button', className: 'button button-secondary', onClick: clearSignature, style: { fontSize: '13px', padding: '8px 16px' } }, '🗑️ Limpiar'),
                        signature ? e('span', { style: { color: 'var(--accent-green)', fontSize: '13px', alignSelf: 'center' } }, '✓ Firma capturada') : null
                    )
                );
            };
            const barcodeField = function() {
                return fld('Codigo de Barras',
                    e('div', { style: { display: 'flex', gap: '8px' } },
                        e('input', { type: 'text', className: 'form-input', value: formData.barcode, placeholder: 'Escanea o escribe', onChange: function(ev) { upd('barcode', ev.target.value); }, style: { flex: 1 } }),
                        e('button', { type: 'button', className: 'button button-primary', onClick: function() { startBarcodeScanner(function(code) { upd('barcode', code); }); } }, '📷'),
                        e('button', { type: 'button', className: 'button button-secondary', onClick: genBarcode }, '⚡ Gen')
                    ), true
                );
            };
            const tecnicoBanner = function() {
                const esAdmin = state.isAdmin;
                return e('div', { className: 'info-banner green', style: { marginBottom: '16px' } },
                    esAdmin ? '🛡️ Admin: ' : '🔧 Técnico: ', e('strong', null, tecnicoActual)
                );
            };
            const adDropdown = function(results, loading2, onSelect) {
                if (!loading2 && results.length === 0) return null;
                return e('div', { className: 'user-search-dropdown' },
                    loading2 ? e('div', { style: { padding: '12px', color: 'var(--text-secondary)', fontSize: '14px' } }, '⏳ Buscando...') : null,
                    results.map(function(user) {
                        return e('div', { key: user.id, className: 'user-search-item', onClick: function() { onSelect(user); } },
                            e('div', { style: { fontWeight: '600', fontSize: '14px' } }, user.displayName),
                            e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, user.mail),
                            (user.department || user.jobTitle) ? e('div', { style: { fontSize: '12px', color: 'var(--accent-blue)' } }, [user.department, user.jobTitle].filter(Boolean).join(' · ')) : null
                        );
                    })
                );
            };
            const productsGrid = function() {
                return e(ProductsGrid, { inventory: state.inventory, selectedProducts, onAdd: addProductByBarcode });
            };

            // Render body
            const renderBody = function() {
                // NUEVO PRODUCTO (consumible)
                if (modalType === 'entrada' && !selectedItem) {
                    return e('div', null,
                        tecnicoBanner(),
                        e('div', { className: 'info-banner blue', style: { marginBottom: '16px' } }, 'ℹ️ Usa esta entrada para ', e('strong', null, 'material consumible'), ': cables, ratones, auriculares, adaptadores... Para equipos con etiqueta (portátiles, iPads, etc.) usa la pestaña ', e('strong', null, '💻 Equipos'), '.'),
                        tipoModeloFields(),
                        barcodeField(),
                        fld('Cantidad recibida', e('input', { type: 'number', min: '1', className: 'form-input', placeholder: 'Nº de unidades', value: formData.stock, onChange: function(ev) { upd('stock', ev.target.value); } })),
                        (function() {
                            const productoExistente = state.inventory.find(function(item) { return item.nombre === (formData.tipo && formData.modelo ? formData.tipo + ' - ' + formData.modelo : ''); });
                            const cant = parseInt(formData.stock) || 0;
                            if (productoExistente && cant > 0) {
                                return e('div', { className: 'stock-result' }, '✓ Stock resultante: ', e('strong', null, productoExistente.stock + cant), ' uds (', productoExistente.stock, ' actuales + ', cant, ' nuevas)');
                            } else if (!productoExistente && cant > 0) {
                                return e('div', { className: 'stock-result' }, '✓ Se crearán ', e('strong', null, cant), ' unidades de este producto');
                            }
                            return null;
                        })(),
                        e('div', { className: 'form-row' },
                            fld('Ubicacion', ubicacionSelect(), true),
                            fld('Estado', estadoSelect())
                        )
                    );
                }
                // AÑADIR STOCK
                if (modalType === 'entrada' && selectedItem) {
                    return e('div', null,
                        tecnicoBanner(),
                        e('div', { style: { background: 'var(--bg-tertiary)', padding: '16px', borderRadius: '8px', marginBottom: '20px' } },
                            e('div', { style: { fontWeight: '700', fontSize: '18px', marginBottom: '8px' } }, selectedItem.nombre),
                            e('div', { style: { display: 'flex', gap: '24px', flexWrap: 'wrap' } },
                                e('span', null, 'Stock actual: ', e('strong', { style: { color: 'var(--accent-green)' } }, selectedItem.stock + ' uds')),
                                e('span', null, 'Codigo: ', e('strong', { style: { color: 'var(--accent-blue)', fontFamily: 'IBM Plex Mono,monospace' } }, selectedItem.barcode))
                            )
                        ),
                        e('div', { className: 'form-row' },
                            fld('Unidades a añadir', e('input', { type: 'number', min: '1', className: 'form-input', value: formData.cantidad, onChange: function(ev) { upd('cantidad', ev.target.value); } }), true),
                            fld('Ticket (opcional)', inp('ticket', 'Ej: INC-123456'))
                        ),
                        e('div', { className: 'stock-result' }, '✓ Stock resultante: ' + (selectedItem.stock + (parseInt(formData.cantidad) || 0)) + ' unidades'),
                        signatureBlock()
                    );
                }
                // SALIDA
                if (modalType === 'salida') {
                    return e('div', null,
                        tecnicoBanner(),
                        e('div', { style: { background: 'var(--bg-tertiary)', padding: '16px', borderRadius: '8px', marginBottom: '20px' } },
                            e('div', { style: { fontWeight: '700', fontSize: '18px', marginBottom: '8px' } }, selectedItem.nombre),

                    });

            };
            const totalUnidades = sublotes.reduce(function(sum, s) { return sum + (parseInt(s.cantidad) || 0); }, 0);

            // ---- Cambiar estado ----
            const handleCambiarEstado = async function() {
                if (!cambioEstado) return;
                const { equipo, nuevoEstado } = cambioEstado;
                const motivosRequeridos = ['Baja', 'Extraviado', 'Robado', 'Reparacion', 'Transito'];

                try {
                    const extra = { motivoIncidencia: cambioMotivo };

                            await dataManager.createActivo({ idEtiqueta, tipo: sublote.tipo, modelo: sublote.modelo, ubicacion: sublote.ubicacion, numSerie: '', notas: '', estado: 'Pendiente', sociedad: sublote.sociedad });

                        }
                    }

                try {
                    await dataManager.updateActivoNS(activo.id, ns);
                    setInlineNS(function(prev) { var n = Object.assign({}, prev); delete n[activo.id]; return n; });
                    await onRefresh();
                    showToast('✓ N/S guardado · Equipo listo para etiquetar', 'success');
                } catch(err) { showToast('Error guardando N/S', 'error'); }

                setSigData(null);

                // Limpiar canvas al abrir
                setTimeout(function() {
                    const c = sigCanvasRef.current;
                    if (c) { c.width = c.offsetWidth; c.height = c.offsetHeight; c.getContext('2d').clearRect(0,0,c.width,c.height); }
                }, 100);
            };
            const closeSignature = function(save) {
                if (save && sigCanvasRef.current) setSigData(sigCanvasRef.current.toDataURL());

            };
            const sigPos = function(ev, canvas) {

                    // Línea guía
                    e('div', { style: { background: '#f0f0f0', padding: '6px 16px', fontSize: '12px', color: '#666', flexShrink: 0, textAlign: 'center' } }, 'Firma en el espacio de abajo con el dedo'),
                    // Canvas
                    e('canvas', {
                        ref: sigCanvasRef,
