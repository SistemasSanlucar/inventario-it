                            }
                        }),
                        formData.nombreEmpleado && e('div', { style: { marginTop: '6px', color: 'var(--accent-green)', fontSize: '13px' } }, '✓ ' + formData.nombreEmpleado + ' · ' + formData.emailEmpleado),
                        (userSearchLoading || userSearchResults.length > 0) && e('div', { className: 'user-search-dropdown' },
                            userSearchLoading && e('div', { style: { padding: '12px', color: 'var(--text-secondary)', fontSize: '14px' } }, '⏳ Buscando...'),
                            userSearchResults.map(user => e('div', { key: user.id, className: 'user-search-item', onClick: () => selectUser(user) },
                                e('div', { style: { fontWeight: '600', fontSize: '14px' } }, user.displayName),
                                e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, user.mail),
                                (user.department || user.jobTitle) && e('div', { style: { fontSize: '12px', color: 'var(--accent-blue)' } }, [user.department, user.jobTitle].filter(Boolean).join(' · '))
                            ))
                        )
                    ),
                    formData.nombreEmpleado && e('div', null,
                        e('div', { className: 'form-row' },
                            fld('Departamento', inp('departamento', 'Dpto.')),
                            fld('Puesto', inp('puesto', 'Cargo'))
                        ),
                        fld('Fecha incorporacion', e('input', { type: 'date', className: 'form-input', value: formData.fechaIncorporacion, onChange: ev => upd('fechaIncorporacion', ev.target.value) }))
                    ),
                    // Products
                    e('div', { style: { marginBottom: '8px' } }, e('label', { className: 'form-label' }, 'Productos', e('span', { className: 'required-asterisk' }, ' *'))),
                    e('div', { style: { display: 'flex', gap: '8px', marginBottom: '8px' } },
                        e('input', {
                            type: 'text', className: 'form-input', value: barcodeInput,
                            placeholder: 'Codigo de barras del producto (Enter para añadir)...',
                            style: { flex: 1, fontFamily: 'IBM Plex Mono,monospace' },
                            onChange: ev => { setBarcodeInput(ev.target.value); setBarcodeError(''); },
                            onKeyDown: ev => { if (ev.key === 'Enter') { ev.preventDefault(); addProductByBarcode(barcodeInput.trim()); } }
                        }),
                        e('button', { type: 'button', className: 'button button-primary', onClick: () => startBarcodeScanner(code => addProductByBarcode(code)) }, '📷 Escanear'),
                        e('button', { type: 'button', className: 'button button-success', onClick: () => addProductByBarcode(barcodeInput.trim()) }, '+ Añadir')
                    ),
                    barcodeError && e('div', { style: { color: 'var(--accent-red)', fontSize: '13px', marginBottom: '8px' } }, '⚠️ ' + barcodeError),
                    selectedProducts.length > 0 && e('div', { style: { background: 'var(--bg-tertiary)', borderRadius: '8px', padding: '12px', marginBottom: '16px' } },
                        e('div', { style: { fontWeight: '600', fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '8px', textTransform: 'uppercase' } }, selectedProducts.length + ' producto(s) seleccionado(s)'),
                        selectedProducts.map((prod, idx) => e('div', { key: prod.barcode, className: 'product-row-assigned' },
                            e('div', null,
                                e('span', { style: { fontWeight: '600', marginRight: '8px' } }, (idx + 1) + '. ' + prod.nombre),
                                e('span', { style: { color: 'var(--accent-blue)', fontSize: '12px', fontFamily: 'IBM Plex Mono,monospace' } }, prod.barcode)
                            ),
                            e('button', { type: 'button', style: { background: 'none', border: 'none', color: 'var(--accent-red)', cursor: 'pointer', fontSize: '20px', padding: '0 4px', lineHeight: 1 }, onClick: () => setSelectedProducts(prev => prev.filter(p => p.barcode !== prod.barcode)) }, '×')
                        ))
                    ),
                    selectedProducts.length === 0 && e('div', { style: { color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '16px', padding: '12px', background: 'var(--bg-tertiary)', borderRadius: '8px' } }, 'Ningún producto añadido todavía. Escanea o escribe el código de barras.'),
                    e('div', { className: 'form-row' },
                        fld('Tecnico responsable', techSelect(), true),
                        fld('Observaciones', inp('observaciones', 'Opcional'))
                    ),
                    signatureBlock()
                );

                // VER ASIGNACION
                if (modalType === 'ver-asignacion' && selectedItem) return e('div', null,
                    e('div', { style: { background: 'var(--bg-tertiary)', padding: '24px', borderRadius: '12px', marginBottom: '20px' } },
                        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '16px' } },
                            e('div', null,
                                e('div', { style: { fontSize: '22px', fontWeight: '700' } }, selectedItem.nombreEmpleado),
                                e('div', { style: { color: 'var(--text-secondary)', fontSize: '14px' } }, selectedItem.emailEmpleado)
                            ),
                            e('span', { style: { background: selectedItem.esPrestamo ? 'var(--accent-orange)' : 'var(--accent-blue)', color: 'white', padding: '6px 14px', borderRadius: '6px', fontWeight: '700', fontSize: '13px' } }, selectedItem.esPrestamo ? '⏱️ PRESTAMO' : '📋 ASIGNACION')
                        ),
                        e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' } },
                            [{ label: 'Departamento', value: selectedItem.departamento }, { label: 'Puesto', value: selectedItem.puesto }, { label: 'Tecnico IT', value: selectedItem.tecnicoResponsable }, { label: 'Fecha asignacion', value: new Date(selectedItem.fechaAsignacion).toLocaleDateString('es-ES') }, { label: 'Estado', value: selectedItem.estado }].map((info, idx) =>
                                e('div', { key: idx }, e('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', textTransform: 'uppercase', marginBottom: '2px' } }, info.label), e('div', { style: { fontWeight: '600', fontSize: '14px' } }, info.value || '-'))
                            )
                        )
                    ),
                    e('div', { style: { marginBottom: '20px' } },
                        e('div', { style: { fontWeight: '700', marginBottom: '12px', textTransform: 'uppercase', fontSize: '12px', color: 'var(--text-secondary)' } }, 'Material (' + (selectedItem.productosAsignados || []).length + ' productos)'),
                        (selectedItem.productosAsignados || []).map((prod, idx) =>
                            e('div', { key: idx, style: { display: 'flex', justifyContent: 'space-between', padding: '10px 16px', background: 'var(--bg-tertiary)', borderRadius: '6px', marginBottom: '6px' } },
                                e('span', { style: { fontWeight: '500' } }, (idx + 1) + '. ' + prod.nombre),
                                e('span', { style: { fontFamily: 'IBM Plex Mono,monospace', fontSize: '12px', color: 'var(--accent-blue)' } }, prod.barcode)
                            )
                        )
                    ),
                    selectedItem.observaciones && e('div', { style: { marginBottom: '16px' } },
                        e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '4px', textTransform: 'uppercase' } }, 'Observaciones'),
                        e('div', { style: { background: 'var(--bg-tertiary)', padding: '12px', borderRadius: '8px', fontSize: '14px' } }, selectedItem.observaciones)
                    ),
                    selectedItem.firmaEmpleado && e('div', null,
                        e('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '8px', textTransform: 'uppercase' } }, 'Firma del empleado'),
                        e('img', { src: selectedItem.firmaEmpleado, style: { maxWidth: '300px', height: '80px', objectFit: 'contain', background: 'var(--bg-primary)', borderRadius: '8px', padding: '8px', border: '1px solid var(--border)' } })
                    )
                );

                // DEVOLVER MATERIAL
                if (modalType === 'devolver-material' && selectedItem) {
                    const productos = selectedItem.productosAsignados || [];
                    const selected = Object.values(returnSelections).filter(Boolean).length;
                    return e('div', null,
                        e('div', { style: { background: 'var(--bg-tertiary)', padding: '16px', borderRadius: '8px', marginBottom: '20px' } },
                            e('div', { style: { fontWeight: '700', fontSize: '16px', marginBottom: '4px' } }, selectedItem.nombreEmpleado),
                            e('div', { style: { color: 'var(--text-secondary)', fontSize: '14px' } }, selectedItem.emailEmpleado + ' · ' + selectedItem.departamento)
                        ),
                        e('div', { style: { marginBottom: '20px' } },
                            e('div', { style: { fontWeight: '700', marginBottom: '12px', textTransform: 'uppercase', fontSize: '12px', color: 'var(--text-secondary)' } }, 'Selecciona los productos a devolver'),
                            productos.map(prod => {
                                const sel = !!returnSelections[prod.barcode];
                                return e('div', { key: prod.barcode, className: 'return-row ' + (sel ? 'selected' : ''), onClick: () => setReturnSelections(prev => ({ ...prev, [prod.barcode]: !prev[prod.barcode] })) },
                                    e('input', { type: 'checkbox', checked: sel, onChange: () => {}, style: { width: '18px', height: '18px', cursor: 'pointer' } }),
                                    e('div', { style: { flex: 1 } },
                                        e('div', { style: { fontWeight: '600', fontSize: '14px' } }, prod.nombre),
                                        e('div', { style: { fontFamily: 'IBM Plex Mono,monospace', fontSize: '12px', color: 'var(--accent-blue)' } }, prod.barcode)
                                    ),
                                    sel && e('span', { style: { color: 'var(--accent-green)', fontSize: '20px' } }, '✓')
                                );
                            }),
                            e('div', { style: { marginTop: '8px', padding: '8px 12px', background: 'var(--bg-primary)', borderRadius: '6px', fontSize: '13px', color: 'var(--text-secondary)' } },
                                e('strong', { style: { color: selected > 0 ? 'var(--accent-green)' : 'var(--text-secondary)' } }, selected),
                                ' de ' + productos.length + ' productos seleccionados'
                            )
                        ),
                        e('div', { className: 'form-row' },
                            fld('Tecnico que recibe', techSelect()),
                            fld('Observaciones', inp('observaciones', 'Estado del material, accesorios...'))
                        )
                    );
                }

                return e('div', { style: { textAlign: 'center', padding: '40px', color: 'var(--text-secondary)' } }, 'Formulario no disponible');
            };

            // Modal title
            const titles = { 'entrada-new': '📦 Nuevo Producto', 'entrada-add': '➕ Anadir Stock', 'salida': '📤 Registrar Salida', 'editar': '✏️ Editar Producto', 'duplicar': '🔄 Duplicar Producto', 'tecnico': '👤 Nuevo Tecnico', 'nueva-asignacion': '📋 Nueva Asignacion', 'nuevo-prestamo': '⏱️ Prestamo de Material', 'ver-asignacion': '📄 Documento de Asignacion', 'devolver-material': '↩️ Devolucion de Material' };
            const titleKey = modalType === 'entrada' ? (selectedItem ? 'entrada-add' : 'entrada-new') : modalType;
            const modalTitle = titles[titleKey] || 'Formulario';

            const isViewOnly = modalType === 'ver-asignacion';
            const submitLabels = { 'entrada-new': 'Crear Producto', 'entrada-add': 'Anadir Stock', 'salida': 'Registrar Salida', 'editar': 'Guardar Cambios', 'duplicar': 'Duplicar Producto', 'tecnico': 'Crear Tecnico', 'nueva-asignacion': 'Crear Asignacion', 'nuevo-prestamo': 'Registrar Prestamo', 'devolver-material': 'Confirmar Devolucion' };
            const submitLabel = submitLabels[titleKey] || 'Guardar';
            const submitClass = modalType === 'salida' ? 'button-warning' : modalType === 'devolver-material' ? 'button-success' : 'button-primary';

            return e('div', { className: 'modal-overlay', onClick: ev => { if (ev.target === ev.currentTarget && !loading) onClose(); } },
                e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
                    e('div', { className: 'modal-header' },
                        e('h2', { className: 'modal-title' }, modalTitle),
                        e('button', { className: 'modal-close', onClick: () => { if (!loading) onClose(); }, disabled: loading }, '×')
                    ),
                    e('div', { className: 'modal-body' }, renderBody()),
                    e('div', { className: 'modal-footer' },
                        e('button', { type: 'button', className: 'button button-secondary', onClick: () => { if (!loading) onClose(); }, disabled: loading }, 'Cancelar'),
                        isViewOnly ?
                            e('button', { type: 'button', className: 'button button-primary', onClick: () => exportAssignmentToPDF(selectedItem) }, '📥 Descargar PDF') :
                            e('button', { type: 'button', className: 'button ' + submitClass, onClick: handleSubmit, disabled: loading },
                                loading ? e('span', { className: 'loading-spinner' }) : null, ' ', loading ? 'Guardando...' : submitLabel
                            )
                    )
                )
            );
        }

        // ---- ConfirmModal ----
        function ConfirmModal({ message, onConfirm, onCancel, loading }) {
            return e('div', { className: 'modal-overlay', onClick: ev => { if (ev.target === ev.currentTarget) onCancel(); } },
                e('div', { className: 'modal', style: { maxWidth: '500px' }, onClick: ev => ev.stopPropagation() },
                    e('div', { className: 'modal-header' }, e('h2', { className: 'modal-title' }, 'Confirmar Accion'), e('button', { className: 'modal-close', onClick: onCancel }, '×')),
                    e('div', { className: 'modal-body' },
                        e('div', { className: 'confirm-modal-icon' }, '⚠️'),
                        e('p', { style: { fontSize: '16px', color: 'var(--text-primary)', marginBottom: '24px', textAlign: 'center' } }, message),
                        e('div', { style: { background: 'rgba(239,68,68,.1)', padding: '12px', borderRadius: '8px', fontSize: '14px', color: 'var(--accent-red)', textAlign: 'center' } }, 'Esta accion es permanente y no se puede deshacer')
                    ),
                    e('div', { className: 'modal-footer' },
                        e('button', { type: 'button', className: 'button button-secondary', onClick: onCancel }, 'Cancelar'),
                        e('button', { className: 'button button-danger', onClick: onConfirm, disabled: loading }, loading ? e('span', { className: 'loading-spinner' }) : null, loading ? ' Eliminando...' : '🗑️ Si, Eliminar')
                    )
                )
            );
        }

        // ---- App ----
        function App() {
            const [state, setState] = useState({ user: null, isAdmin: false, inventory: [], technicians: [], history: [], assignments: [], catalogo: {}, activeTab: 'dashboard', loading: true, syncing: false, lastSync: null, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null });

            useEffect(() => { initializeApp(); }, []);

            const initializeApp = async () => {
                try {
                    const msalReady = await initializeMSAL();
                    if (!msalReady) throw new Error('MSAL init failed');
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length === 0) { setState(s => ({ ...s, loading: false })); return; }
                    const token = await getAccessToken();
                    if (!token) { setState(s => ({ ...s, loading: false })); return; }
                    graphClient = new GraphAPIClient(token);
                    dataManager = new DataManager(graphClient);
                    const currentUser = await graphClient.getCurrentUser();
                    const data = await dataManager.loadAllData();
                    const isAdmin = data.admins.some(a => a.Email && a.Email.toLowerCase() === currentUser.mail.toLowerCase() && (a.Activo === true || a.Activo === 'Yes'));
                    setState(s => ({ ...s, user: { name: currentUser.displayName, email: currentUser.mail }, isAdmin, inventory: data.inventory, technicians: data.technicians, history: data.history, assignments: data.assignments, catalogo: data.catalogo || {}, loading: false, syncing: false, lastSync: new Date() }));
                    showToast('Bienvenido, ' + currentUser.displayName, 'success');
                } catch(error) { console.error('Error inicializando app:', error); showToast('Error cargando la aplicacion', 'error'); setState(s => ({ ...s, loading: false })); }
            };

            const handleLogin = async () => { try { await login(); await initializeApp(); } catch(e) { showToast('Error al iniciar sesion', 'error'); } };
            const handleLogout = async () => { await logout(); setState({ user: null, isAdmin: false, inventory: [], technicians: [], history: [], assignments: [], catalogo: {}, activeTab: 'dashboard', loading: false, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null }); showToast('Sesion cerrada correctamente', 'success'); };

            const syncData = async (showMsg) => {
                if (!dataManager || state.syncing) return;
                setState(s => ({ ...s, syncing: true }));
                try {
                    const data = await dataManager.loadAllData();
                    setState(s => ({ ...s, inventory: data.inventory, technicians: data.technicians, history: data.history, assignments: data.assignments, catalogo: data.catalogo || {}, syncing: false, lastSync: new Date() }));
                    if (showMsg) showToast('Sincronizado correctamente', 'success');
                } catch(e) { setState(s => ({ ...s, syncing: false })); }
            };

            const handleTabChange = async tab => { setState(s => ({ ...s, activeTab: tab })); await syncData(false); };
            const handleOpenModal = (type, item) => { syncData(false); setState(s => ({ ...s, modalType: type, selectedItem: item })); };
            const handleCloseModal = () => setState(s => ({ ...s, modalType: null, selectedItem: null, showConfirm: false, confirmAction: null }));

            const handleConfirmAction = async () => {
                const { confirmAction, selectedItem } = state;
                try {
                    if (confirmAction.type === 'eliminar-producto') { await dataManager.deleteInventoryItem(confirmAction.item.id); showToast('Producto eliminado', 'success'); }
                    else if (confirmAction.type === 'eliminar-historial') { await dataManager.deleteHistoryItem(confirmAction.item.id); showToast('Registro eliminado', 'success'); }
                    else if (confirmAction.type === 'toggle-tecnico') { await dataManager.toggleTechnicianStatus(confirmAction.item.id, confirmAction.item.activo); showToast('Estado actualizado', 'success'); }
                    else if (confirmAction.type === 'eliminar-asignacion') { await dataManager.deleteAssignment(confirmAction.item.id); showToast('Asignacion eliminada', 'success'); }
                    setState(s => ({ ...s, showConfirm: false, confirmAction: null }));
                    const data = await dataManager.loadAllData();
                    setState(s => ({ ...s, inventory: data.inventory, history: data.history, technicians: data.technicians, assignments: data.assignments, catalogo: data.catalogo || {} }));
                } catch(error) { console.error('Error:', error); showToast('Error: ' + error.message, 'error'); }
            };

            useEffect(() => {
                if (!state.modalType) return;
                const confirmTypes = { 'eliminar-producto': 'eliminar-producto', 'eliminar-historial': 'eliminar-historial', 'toggle-tecnico': 'toggle-tecnico', 'eliminar-asignacion': 'eliminar-asignacion' };
                if (confirmTypes[state.modalType]) {
                    setState(s => ({ ...s, showConfirm: true, confirmAction: { type: confirmTypes[s.modalType], item: s.selectedItem }, modalType: null }));
                }
            }, [state.modalType]);

            const getLastSyncText = () => { if (!state.lastSync) return ''; const diff = Math.floor((new Date() - state.lastSync) / 1000); if (diff < 60) return 'Hace un momento'; if (diff < 3600) return 'Hace ' + Math.floor(diff/60) + ' min'; return 'Hace ' + Math.floor(diff/3600) + 'h'; };

            if (state.loading) return e('div', { className: 'global-loading' }, e('div', { className: 'loading-spinner' }), e('p', { className: 'global-loading-text' }, 'Cargando sistema...'));
            if (!state.user) return e(LoginScreen, { onLogin: handleLogin });

            const stats = { totalProductos: state.inventory.length, totalUnidades: state.inventory.reduce((s,i) => s+i.stock, 0), stockBajo: state.inventory.filter(i => i.stock > 0 && i.stock <= i.stockMinimo).length, movimientosHoy: state.history.filter(h => new Date(h.fecha).toDateString() === new Date().toDateString()).length };
            const formModalTypes = ['entrada', 'salida', 'editar', 'tecnico', 'nueva-asignacion', 'nuevo-prestamo', 'ver-asignacion', 'devolver-material', 'duplicar'];

            return e('div', { className: 'app-container' },
                e('header', { className: 'header' },
                    e('div', { className: 'header-left' },
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
                            e('span', { className: 'header-icon' }, '📦'),
                            e('h1', null, 'Sistema de Inventario IT'),
                            e('span', { style: { fontSize: '12px', padding: '4px 8px', background: 'rgba(88,166,255,.15)', color: 'var(--accent-blue)', borderRadius: '6px', fontFamily: 'IBM Plex Mono,monospace', fontWeight: '600' } }, 'v' + CONFIG.version)
                        ),
                        e('div', { className: 'user-badges' }, e('span', { className: 'user-badge ' + (state.isAdmin ? 'admin' : 'technician') }, state.isAdmin ? '🛡️ Admin' : '🔧 Tecnico', ': ', state.user.name))
                    ),
                    e('div', { className: 'header-stats' },
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Productos'), e('div', { className: 'stat-value blue' }, stats.totalProductos)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Unidades'), e('div', { className: 'stat-value green' }, stats.totalUnidades)),
                        e('div', { className: 'stat-item' }, e('div', { className: 'stat-label' }, 'Stock Bajo'), e('div', { className: 'stat-value orange' }, stats.stockBajo)),
                        e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: 'var(--bg-tertiary)', borderRadius: '8px' } },
                            state.lastSync && e('span', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, getLastSyncText()),
                            e('button', { onClick: () => syncData(true), disabled: state.syncing, style: { background: state.syncing ? 'var(--bg-secondary)' : 'var(--accent-blue)', border: 'none', color: 'white', padding: '6px 12px', borderRadius: '6px', cursor: state.syncing ? 'wait' : 'pointer', fontSize: '14px', fontWeight: '600' } }, state.syncing ? '⏳ Sync...' : '🔄 Sync')
                        ),
                        e('button', { className: 'button button-secondary', onClick: handleLogout }, 'Salir')
                    )
                ),
                e('nav', { className: 'nav-tabs' },
                    ['dashboard', 'inventario', 'asignaciones', 'historial'].map(tab =>
                        e('button', { key: tab, className: 'tab-button ' + (state.activeTab === tab ? 'active' : ''), onClick: () => handleTabChange(tab) }, { dashboard: '📊 Dashboard', inventario: '📦 Inventario', asignaciones: '📋 Asignaciones', historial: '📜 Historial' }[tab])
                    ),
                    state.isAdmin && e('button', { className: 'tab-button ' + (state.activeTab === 'tecnicos' ? 'active' : ''), onClick: () => handleTabChange('tecnicos') }, '👤 Tecnicos')
                ),
                e('div', { className: 'content-section' },
                    state.activeTab === 'dashboard' && e(Dashboard, { state }),
                    state.activeTab === 'inventario' && e(InventoryView, { state, onRefresh: initializeApp, onOpenModal: handleOpenModal }),
                    state.activeTab === 'asignaciones' && e(AssignmentsView, { state, onRefresh: initializeApp, onOpenModal: handleOpenModal }),
                    state.activeTab === 'historial' && e(HistoryView, { state, onRefresh: initializeApp, onOpenModal: handleOpenModal }),
                    state.activeTab === 'tecnicos' && state.isAdmin && e(TechniciansView, { state, onRefresh: initializeApp, onOpenModal: handleOpenModal })
                ),
                state.modalType && !state.showConfirm && formModalTypes.includes(state.modalType) &&
                    e(FormModal, { state, modalType: state.modalType, selectedItem: state.selectedItem, onClose: handleCloseModal, onRefresh: initializeApp }),
                state.showConfirm && e(ConfirmModal, {
                    message: state.confirmAction?.type === 'eliminar-producto' ? '¿Eliminar "' + state.selectedItem?.nombre + '"?' :
                             state.confirmAction?.type === 'eliminar-historial' ? '¿Eliminar el registro del ' + new Date(state.selectedItem?.fecha).toLocaleDateString() + '?' :
                             state.confirmAction?.type === 'eliminar-asignacion' ? '¿Eliminar la asignacion de ' + state.selectedItem?.nombreEmpleado + '?' :
                             '¿' + (state.selectedItem?.activo ? 'Desactivar' : 'Activar') + ' a ' + state.selectedItem?.nombre + '?',
                    onConfirm: handleConfirmAction, onCancel: handleCloseModal, loading: false
                })
            );
        }

        ReactDOM.render(e(App), document.getElementById('root'));
    });
    </script>
</body>
</html>
